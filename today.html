<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Jarvis — Shepard Ventures Command Deck</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --blush: #F5E6E0;
      --blush-deep: #D4A0A0;
      --sage: #8BA888;
      --gold: #C9A96E;
      --navy: #1A1A2E;
      --navy-mid: #20203a;
      --coral: #E8836B;
      --coral-deep: #d96d52;
      --cyan: #00d9ff;
      --surface: rgba(255, 255, 255, 0.04);
      --surface-hover: rgba(255, 255, 255, 0.07);
      --border: rgba(245, 230, 224, 0.10);
      --border-hover: rgba(245, 230, 224, 0.22);
      --text-dim: rgba(245, 230, 224, 0.55);
      --text-faint: rgba(245, 230, 224, 0.35);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100vh;
      background: var(--navy);
      background-image: radial-gradient(circle, #2a2a3a 1px, transparent 1px);
      background-size: 24px 24px;
      color: var(--blush);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 16px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      padding-bottom: env(safe-area-inset-bottom);
      overflow-x: hidden;
    }

    /* ---- Auth gate ---- */
    #auth-gate {
      display: none;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
      padding: 24px;
      text-align: center;
    }
    #auth-gate.visible { display: flex; }
    #auth-gate h1 { font-family: "Cormorant Garamond", serif; color: var(--gold); font-weight: 600; font-size: 2rem; }
    #auth-gate p { color: var(--text-dim); font-size: 0.95rem; max-width: 320px; }
    #auth-gate input {
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--navy-mid);
      color: var(--blush);
      width: min(320px, 90vw);
      font-size: 1rem;
      font-family: inherit;
    }
    #auth-gate input:focus { outline: 1px solid var(--gold); border-color: var(--gold); }
    #auth-gate button {
      padding: 12px 20px;
      border-radius: 10px;
      border: none;
      background: var(--coral);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      font-size: 1rem;
      width: min(320px, 90vw);
    }
    #auth-gate button:hover { background: var(--coral-deep); }
    #auth-gate .err { color: var(--coral); font-size: 0.85rem; min-height: 1em; }

    #app { display: none; }
    #app.visible { display: flex; flex-direction: column; height: 100vh; }

    /* ---- 3D Canvas Scene ---- */
    #three-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      z-index: 0;
    }
    canvas { display: block; }

    /* ---- Mission Banner (top overlay) ---- */
    .mission-banner {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: linear-gradient(180deg, rgba(26, 26, 46, 0.9) 0%, rgba(26, 26, 46, 0.7) 100%);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      backdrop-filter: blur(8px);
      font-family: "Cormorant Garamond", serif;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .mission-text {
      color: var(--gold);
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .mission-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--sage);
      box-shadow: 0 0 8px rgba(139,168,136,0.8), 0 0 16px rgba(139,168,136,0.4);
      animation: pulse-mission 1.4s ease-in-out infinite;
    }
    @keyframes pulse-mission {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.75); }
    }

    /* ---- Main content area ---- */
    .content-wrapper {
      position: relative;
      z-index: 10;
      flex: 1;
      overflow-y: auto;
      padding-top: 80px;
      padding-bottom: 24px;
    }

    .page {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 16px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      grid-auto-rows: max-content;
    }

    /* ---- Section styling ---- */
    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
    }
    .section-title {
      font-family: "Cormorant Garamond", serif;
      font-weight: 600;
      font-size: 1.05rem;
      color: var(--gold);
      letter-spacing: 0.02em;
    }
    .section-count {
      background: rgba(201, 169, 110, 0.15);
      color: var(--gold);
      font-size: 0.75rem;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 4px;
      letter-spacing: 0.05em;
    }

    /* ---- Todo List ---- */
    .todo-item {
      background: var(--surface-hover);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      cursor: grab;
      transition: all 0.2s;
      position: relative;
      touch-action: pan-y;
    }
    .todo-item:active { cursor: grabbing; }
    .todo-item.swiping-out {
      opacity: 0;
      transform: translateX(100px) rotate(5deg);
      transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }
    .todo-item:hover {
      background: var(--surface-hover);
      border-color: var(--border-hover);
    }
    .todo-checkbox {
      width: 20px;
      height: 20px;
      border: 2px solid var(--gold);
      border-radius: 4px;
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 2px;
      transition: all 0.2s;
    }
    .todo-checkbox:hover {
      border-color: var(--coral);
      background: rgba(232, 131, 107, 0.1);
    }
    .todo-checkbox.checked {
      background: var(--coral);
      border-color: var(--coral);
      color: #fff;
      font-weight: bold;
    }
    .todo-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .todo-text {
      color: var(--blush);
      font-size: 0.92rem;
      line-height: 1.4;
      word-break: break-word;
    }
    .todo-meta {
      color: var(--text-dim);
      font-size: 0.75rem;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .todo-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }
    .todo-action-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-dim);
      padding: 4px 8px;
      font-size: 0.7rem;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .todo-action-btn:hover {
      border-color: var(--gold);
      color: var(--gold);
    }
    .todo-empty {
      color: var(--text-dim);
      text-align: center;
      padding: 20px 12px;
      font-size: 0.88rem;
    }

    /* ---- Toast ---- */
    #toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(120%);
      background: var(--navy-mid);
      color: var(--blush);
      padding: 12px 18px;
      border-radius: 10px;
      border: 1px solid var(--border-hover);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      font-size: 0.88rem;
      transition: transform 0.25s ease-out;
      z-index: 50;
      max-width: 88vw;
      text-align: center;
    }
    #toast.visible { transform: translateX(-50%) translateY(0); }
    #toast.err { border-color: var(--coral); color: var(--coral); }
    #toast.ok { border-color: var(--sage); color: var(--sage); }

    /* ---- Footer nav ---- */
    .nav-back {
      margin-top: 20px;
      text-align: center;
      font-size: 0.78rem;
      grid-column: 1 / -1;
    }
    .nav-back a { color: var(--text-dim); text-decoration: none; padding: 8px 12px; border-radius: 6px; }
    .nav-back a:hover { color: var(--gold); }

    /* ---- Responsive grid ---- */
    @media (max-width: 768px) {
      .page {
        grid-template-columns: 1fr;
      }
      .mission-banner {
        font-size: 0.95rem;
      }
    }

    /* ---- Scrollbar styling ---- */
    .content-wrapper::-webkit-scrollbar {
      width: 8px;
    }
    .content-wrapper::-webkit-scrollbar-track {
      background: transparent;
    }
    .content-wrapper::-webkit-scrollbar-thumb {
      background: rgba(245, 230, 224, 0.2);
      border-radius: 4px;
    }
    .content-wrapper::-webkit-scrollbar-thumb:hover {
      background: rgba(245, 230, 224, 0.4);
    }
  </style>
</head>
<body>
  <!-- Auth gate -->
  <div id="auth-gate">
    <h1>Jarvis</h1>
    <p>Mission control — sign in as heath.</p>
    <input id="email" type="email" placeholder="email" autocomplete="email" value="heath.shepard@kw.com">
    <input id="password" type="password" placeholder="password" autocomplete="current-password">
    <button id="signin-btn">Sign in</button>
    <div class="err" id="auth-err"></div>
  </div>

  <!-- Main app -->
  <div id="app">
    <!-- 3D Canvas -->
    <div id="three-container"></div>

    <!-- Mission Banner -->
    <div class="mission-banner">
      <div class="mission-text">
        <span class="mission-dot"></span>
        <span id="mission-text">Working on: Jarvis V5 initialization</span>
      </div>
    </div>

    <!-- Content -->
    <div class="content-wrapper">
      <div class="page">
        <!-- Heath TODO List -->
        <div class="section">
          <div class="section-head">
            <div class="section-title">Today's Work</div>
            <div class="section-count" id="todo-count">0</div>
          </div>
          <div id="todo-list" style="display: flex; flex-direction: column; gap: 8px;"></div>
        </div>

        <!-- Placeholder section for Round 2 (merge list) -->
        <div class="section" style="opacity: 0.5;">
          <div class="section-head">
            <div class="section-title">Ready to merge</div>
            <div class="section-count">—</div>
          </div>
          <div style="color: var(--text-dim); text-align: center; padding: 20px 12px; font-size: 0.88rem;">
            Round 2 coming soon
          </div>
        </div>

        <div class="nav-back">
          <a href="/ventures">&larr; ventures dashboard</a>
          &nbsp;&middot;&nbsp;
          <a href="#" id="signout-link">sign out</a>
        </div>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js"
      }
    }
  </script>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
    import * as THREE from 'three';

    let supabase = null;
    let _token = null;
    let _pollTimer = null;
    const POLL_MS = 30_000;
    let _scene = null;
    let _orb = null;
    let _camera = null;
    let _renderer = null;
    const _todoItems = new Map();
    const _todoTouchStarts = new Map();

    async function bootstrap() {
      let config;
      try {
        config = await fetch('/api/config').then(r => r.json());
      } catch {
        showError('Could not load config.');
        document.getElementById('auth-gate').classList.add('visible');
        return;
      }
      if (!config.supabaseUrl || !config.supabaseKey) {
        showError('Supabase env missing.');
        document.getElementById('auth-gate').classList.add('visible');
        return;
      }
      supabase = createClient(config.supabaseUrl, config.supabaseKey, {
        auth: {
          persistSession: true,
          autoRefreshToken: true,
          detectSessionInUrl: false,
          storage: window.localStorage,
          storageKey: 'ventures.auth.token',
          flowType: 'pkce',
        },
      });
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) { showLogin(); return; }
      revealApp(session.access_token);
    }

    function showLogin() {
      document.getElementById('auth-gate').classList.add('visible');
      document.getElementById('app').classList.remove('visible');
    }

    function revealApp(token) {
      _token = token;
      document.getElementById('auth-gate').classList.remove('visible');
      document.getElementById('app').classList.add('visible');
      initThreeScene();
      refresh();
      _pollTimer = setInterval(refresh, POLL_MS);

      // Wire up mission banner click to voice command (Round 5)
      document.querySelector('.mission-text').addEventListener('click', async () => {
        toast('Voice command not yet available (Round 5)', 'err');
      });

      // Wire up footer
      document.getElementById('signout-link').addEventListener('click', async (e) => {
        e.preventDefault();
        await supabase.auth.signOut();
        showLogin();
      });
    }

    function showError(msg) {
      const el = document.getElementById('auth-err');
      if (el) el.textContent = msg || '';
    }

    function toast(msg, kind = '') {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = '';
      el.classList.add('visible');
      if (kind) el.classList.add(kind);
      clearTimeout(toast._t);
      toast._t = setTimeout(() => { el.classList.remove('visible'); }, 3500);
    }

    // ========== THREE.JS SCENE ==========
    function initThreeScene() {
      const container = document.getElementById('three-container');
      const w = window.innerWidth;
      const h = window.innerHeight;

      // Setup camera
      _camera = new THREE.PerspectiveCamera(75, w / h, 0.1, 1000);
      _camera.position.z = 3;

      // Setup renderer
      _renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      _renderer.setSize(w, h);
      _renderer.setClearColor(0x1a1a2e, 0);
      _renderer.setPixelRatio(window.devicePixelRatio);
      container.appendChild(_renderer.domElement);

      // Setup scene
      _scene = new THREE.Scene();
      _scene.fog = new THREE.Fog(0x1a1a2e, 10, 20);

      // Ambient light
      const ambLight = new THREE.AmbientLight(0xffffff, 0.3);
      _scene.add(ambLight);

      // Directional light
      const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
      dirLight.position.set(5, 5, 5);
      _scene.add(dirLight);

      // Create the orb
      createOrb();

      // Handle window resize
      window.addEventListener('resize', onWindowResize);

      // Animation loop
      function animate() {
        requestAnimationFrame(animate);
        if (_orb) {
          _orb.rotation.x += 0.0003;
          _orb.rotation.y += 0.0005;
        }
        _renderer.render(_scene, _camera);
      }
      animate();
    }

    function createOrb() {
      const geometry = new THREE.IcosahedronGeometry(1, 8);

      // Create shader material for smooth gradient orb
      const material = new THREE.ShaderMaterial({
        uniforms: {
          time: { value: 0 },
        },
        vertexShader: `
          varying vec3 vNormal;
          varying vec3 vPosition;
          void main() {
            vNormal = normalize(normalMatrix * normal);
            vPosition = position;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          varying vec3 vNormal;
          varying vec3 vPosition;
          uniform float time;
          void main() {
            vec3 color = mix(vec3(0.13, 0.85, 1.0), vec3(0.8, 0.4, 0.3), length(vPosition) * 0.3);
            float fresnel = pow(1.0 - abs(dot(normalize(vNormal), normalize(vec3(0, 0, 1)))), 2.0);
            color += vec3(0.2, 0.9, 1.0) * fresnel * 0.5;
            gl_FragColor = vec4(color, 1.0);
          }
        `,
      });

      _orb = new THREE.Mesh(geometry, material);
      _scene.add(_orb);
    }

    function onWindowResize() {
      const w = window.innerWidth;
      const h = window.innerHeight;
      _camera.aspect = w / h;
      _camera.updateProjectionMatrix();
      _renderer.setSize(w, h);
    }

    // ========== DATA FETCHING ==========
    async function authFetch(url, init = {}) {
      return fetch(url, {
        ...init,
        headers: {
          'Authorization': `Bearer ${_token}`,
          'Content-Type': 'application/json',
          ...(init.headers || {}),
        },
      });
    }

    async function refresh() {
      try {
        await Promise.all([
          refreshTodoList(),
        ]);
        document.getElementById('last-updated') && (document.getElementById('last-updated').textContent = new Date().toLocaleTimeString());
      } catch (err) {
        console.error('Refresh error:', err);
      }
    }

    async function refreshTodoList() {
      try {
        const { data, error } = await supabase
          .from('heath_todo')
          .select('id, title, priority, due_at, snooze_until, status')
          .eq('status', 'active')
          .order('priority', { ascending: false })
          .order('due_at', { ascending: true });

        if (error) throw error;

        const container = document.getElementById('todo-list');
        const count = data.length;
        document.getElementById('todo-count').textContent = count;

        // Diff: remove deleted items
        const incomingIds = new Set(data.map(t => t.id));
        for (const id of _todoItems.keys()) {
          if (!incomingIds.has(id)) {
            const el = document.getElementById(`todo-${id}`);
            if (el) el.remove();
            _todoItems.delete(id);
          }
        }

        // Add or update items
        for (const todo of data) {
          if (!_todoItems.has(todo.id)) {
            const todoEl = createTodoElement(todo);
            container.appendChild(todoEl);
            _todoItems.set(todo.id, todoEl);
          }
        }

        if (count === 0) {
          container.innerHTML = '<div class="todo-empty">No active work. Nice.</div>';
        }
      } catch (err) {
        console.error('Todo fetch error:', err);
      }
    }

    function createTodoElement(todo) {
      const el = document.createElement('div');
      el.id = `todo-${todo.id}`;
      el.className = 'todo-item';

      const dueText = todo.due_at ? new Date(todo.due_at).toLocaleDateString() : '—';
      const priorityLabel = todo.priority || 'normal';

      el.innerHTML = `
        <div class="todo-checkbox" data-id="${todo.id}" data-action="check"></div>
        <div class="todo-body">
          <div class="todo-text">${escapeHtml(todo.title)}</div>
          <div class="todo-meta">
            <span>${priorityLabel}</span>
            <span>${dueText}</span>
          </div>
        </div>
        <div class="todo-actions">
          <button class="todo-action-btn" data-id="${todo.id}" data-action="snooze">Snooze</button>
          <button class="todo-action-btn" data-id="${todo.id}" data-action="hide">Hide</button>
        </div>
      `;

      // Event handlers
      const checkbox = el.querySelector('.todo-checkbox');
      checkbox.addEventListener('click', async (e) => {
        e.stopPropagation();
        await completeTodo(todo.id, el);
      });

      el.querySelectorAll('.todo-action-btn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          const action = e.target.dataset.action;
          const id = e.target.dataset.id;
          if (action === 'snooze') {
            await snoozeTodo(id, el);
          } else if (action === 'hide') {
            await hideTodo(id, el);
          }
        });
      });

      // Touch swipe support
      let touchStart = 0;
      el.addEventListener('touchstart', (e) => {
        touchStart = e.touches[0].clientX;
      }, false);
      el.addEventListener('touchmove', (e) => {
        if (!touchStart) return;
        const touchEnd = e.touches[0].clientX;
        const diff = touchStart - touchEnd;
        if (diff > 80) {
          el.classList.add('swiping-out');
          setTimeout(() => completeTodo(todo.id, el), 300);
          touchStart = 0;
        }
      }, false);

      return el;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    async function completeTodo(id, el) {
      try {
        el.classList.add('swiping-out');
        setTimeout(async () => {
          const { error } = await supabase
            .from('heath_todo')
            .update({ status: 'done', completed_at: new Date().toISOString() })
            .eq('id', id);
          if (error) throw error;
          el.remove();
          _todoItems.delete(id);
          toast('Done!', 'ok');
        }, 200);
      } catch (err) {
        console.error('Complete error:', err);
        el.classList.remove('swiping-out');
        toast('Error', 'err');
      }
    }

    async function snoozeTodo(id, el) {
      try {
        const snoozeUntil = new Date();
        snoozeUntil.setHours(snoozeUntil.getHours() + 2);
        const { error } = await supabase
          .from('heath_todo')
          .update({ snooze_until: snoozeUntil.toISOString() })
          .eq('id', id);
        if (error) throw error;
        el.classList.add('swiping-out');
        setTimeout(() => {
          el.remove();
          _todoItems.delete(id);
          toast('Snoozed 2h', 'ok');
        }, 200);
      } catch (err) {
        console.error('Snooze error:', err);
        toast('Error', 'err');
      }
    }

    async function hideTodo(id, el) {
      try {
        const { error } = await supabase
          .from('heath_todo')
          .update({ status: 'hidden' })
          .eq('id', id);
        if (error) throw error;
        el.classList.add('swiping-out');
        setTimeout(() => {
          el.remove();
          _todoItems.delete(id);
          toast('Hidden', 'ok');
        }, 200);
      } catch (err) {
        console.error('Hide error:', err);
        toast('Error', 'err');
      }
    }

    // Initialize
    bootstrap();
  </script>
</body>
</html>
