<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Jarvis — Shepard Ventures Command Deck</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --blush: #F5E6E0;
      --blush-deep: #D4A0A0;
      --sage: #8BA888;
      --gold: #C9A96E;
      --navy: #1A1A2E;
      --navy-mid: #20203a;
      --coral: #E8836B;
      --coral-deep: #d96d52;
      --cyan: #00d9ff;
      --surface: rgba(255, 255, 255, 0.04);
      --surface-hover: rgba(255, 255, 255, 0.07);
      --border: rgba(245, 230, 224, 0.10);
      --border-hover: rgba(245, 230, 224, 0.22);
      --text-dim: rgba(245, 230, 224, 0.55);
      --text-faint: rgba(245, 230, 224, 0.35);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100vh;
      background-color: #020817;
      background-image: radial-gradient(ellipse at 50% 0%, #0a1f3a 0%, #020817 65%);
      color: var(--blush);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 16px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      padding-bottom: env(safe-area-inset-bottom);
      overflow-x: hidden;
    }

    /* V5 R2.2: hex grid overlay layered BETWEEN the three.js canvas and the content.
       Avoids UnrealBloomPass opaque-alpha issue that hides body backgrounds. */
    .hex-bg {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 1;
      pointer-events: none;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='60' height='52' viewBox='0 0 60 52'><g fill='none' stroke='%234dd4ff' stroke-opacity='0.18' stroke-width='1'><path d='M15 1 L45 1 L60 26 L45 51 L15 51 L0 26 Z'/><path d='M45 1 L75 1 L90 26 L75 51 L45 51 L60 26 Z'/><path d='M-15 1 L15 1 L30 26 L15 51 L-15 51 L-30 26 Z'/></g></svg>");
      background-repeat: repeat;
      background-size: 60px 52px;
      mix-blend-mode: screen;
      opacity: 0.85;
    }

    /* ---- Auth gate ---- */
    #auth-gate {
      display: none;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
      padding: 24px;
      text-align: center;
    }
    #auth-gate.visible { display: flex; }
    #auth-gate h1 { font-family: "Cormorant Garamond", serif; color: var(--gold); font-weight: 600; font-size: 2rem; }
    #auth-gate p { color: var(--text-dim); font-size: 0.95rem; max-width: 320px; }
    #auth-gate input {
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--navy-mid);
      color: var(--blush);
      width: min(320px, 90vw);
      font-size: 1rem;
      font-family: inherit;
    }
    #auth-gate input:focus { outline: 1px solid var(--gold); border-color: var(--gold); }
    #auth-gate button {
      padding: 12px 20px;
      border-radius: 10px;
      border: none;
      background: var(--coral);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      font-size: 1rem;
      width: min(320px, 90vw);
    }
    #auth-gate button:hover { background: var(--coral-deep); }
    #auth-gate .err { color: var(--coral); font-size: 0.85rem; min-height: 1em; }

    #app { display: none; }
    #app.visible { display: flex; flex-direction: column; height: 100vh; }

    /* ---- 3D Canvas Scene ---- */
    #three-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      z-index: 0;
    }
    canvas { display: block; }

    /* ---- Mission Banner (top overlay) ---- */
    .mission-banner {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: linear-gradient(180deg, rgba(26, 26, 46, 0.9) 0%, rgba(26, 26, 46, 0.7) 100%);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      backdrop-filter: blur(8px);
      font-family: "Cormorant Garamond", serif;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .mission-text {
      color: var(--gold);
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .mission-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--sage);
      box-shadow: 0 0 8px rgba(139,168,136,0.8), 0 0 16px rgba(139,168,136,0.4);
      animation: pulse-mission 1.4s ease-in-out infinite;
    }
    @keyframes pulse-mission {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.75); }
    }

    /* ---- Main content area ---- */
    .content-wrapper {
      position: relative;
      z-index: 10;
      flex: 1;
      overflow-y: auto;
      padding-top: 80px;
      padding-bottom: 24px;
    }

    .page {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 16px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      grid-auto-rows: max-content;
    }

    /* ---- Section styling ---- */
    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
    }
    .section-title {
      font-family: "Cormorant Garamond", serif;
      font-weight: 600;
      font-size: 1.05rem;
      color: var(--gold);
      letter-spacing: 0.02em;
    }
    .section-count {
      background: rgba(201, 169, 110, 0.15);
      color: var(--gold);
      font-size: 0.75rem;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 4px;
      letter-spacing: 0.05em;
    }

    /* ---- Todo List ---- */
    .todo-item {
      background: var(--surface-hover);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      cursor: grab;
      transition: all 0.2s;
      position: relative;
      touch-action: pan-y;
    }
    .todo-item:active { cursor: grabbing; }
    .todo-item.swiping-out {
      opacity: 0;
      transform: translateX(100px) rotate(5deg);
      transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }
    .todo-item:hover {
      background: var(--surface-hover);
      border-color: var(--border-hover);
    }
    .todo-checkbox {
      width: 20px;
      height: 20px;
      border: 2px solid var(--gold);
      border-radius: 4px;
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 2px;
      transition: all 0.2s;
    }
    .todo-checkbox:hover {
      border-color: var(--coral);
      background: rgba(232, 131, 107, 0.1);
    }
    .todo-checkbox.checked {
      background: var(--coral);
      border-color: var(--coral);
      color: #fff;
      font-weight: bold;
    }
    .todo-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .todo-text {
      color: var(--blush);
      font-size: 0.92rem;
      line-height: 1.4;
      word-break: break-word;
    }
    .todo-meta {
      color: var(--text-dim);
      font-size: 0.75rem;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .todo-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }
    .todo-action-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-dim);
      padding: 4px 8px;
      font-size: 0.7rem;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .todo-action-btn:hover {
      border-color: var(--gold);
      color: var(--gold);
    }
    .todo-empty {
      color: var(--text-dim);
      text-align: center;
      padding: 20px 12px;
      font-size: 0.88rem;
    }

    /* ---- Toast ---- */
    #toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(120%);
      background: var(--navy-mid);
      color: var(--blush);
      padding: 12px 18px;
      border-radius: 10px;
      border: 1px solid var(--border-hover);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      font-size: 0.88rem;
      transition: transform 0.25s ease-out;
      z-index: 50;
      max-width: 88vw;
      text-align: center;
    }
    #toast.visible { transform: translateX(-50%) translateY(0); }
    #toast.err { border-color: var(--coral); color: var(--coral); }
    #toast.ok { border-color: var(--sage); color: var(--sage); }

    /* ---- Footer nav ---- */
    .nav-back {
      margin-top: 20px;
      text-align: center;
      font-size: 0.78rem;
      grid-column: 1 / -1;
    }
    .nav-back a { color: var(--text-dim); text-decoration: none; padding: 8px 12px; border-radius: 6px; }
    .nav-back a:hover { color: var(--gold); }

    /* ---- Responsive grid ---- */
    @media (max-width: 768px) {
      .page {
        grid-template-columns: 1fr;
      }
      .mission-banner {
        font-size: 0.95rem;
      }
    }

    /* ---- Scrollbar styling ---- */
    .content-wrapper::-webkit-scrollbar {
      width: 8px;
    }
    .content-wrapper::-webkit-scrollbar-track {
      background: transparent;
    }
    .content-wrapper::-webkit-scrollbar-thumb {
      background: rgba(245, 230, 224, 0.2);
      border-radius: 4px;
    }
    .content-wrapper::-webkit-scrollbar-thumb:hover {
      background: rgba(245, 230, 224, 0.4);
    }

    /* ---- Merge/Agent/Decision items ---- */
    .queue-item {
      background: var(--surface-hover);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      transition: all 0.2s;
      position: relative;
    }
    .queue-item:hover {
      background: var(--surface-hover);
      border-color: var(--border-hover);
    }
    .queue-item-head {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .queue-item-title {
      color: var(--blush);
      font-size: 0.92rem;
      font-weight: 500;
      word-break: break-word;
    }
    .queue-item-meta {
      color: var(--text-dim);
      font-size: 0.75rem;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .queue-item-status {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      background: rgba(139, 168, 136, 0.15);
      color: var(--sage);
    }
    .queue-item-status.pending {
      background: rgba(201, 169, 110, 0.15);
      color: var(--gold);
    }
    .queue-item-status.error {
      background: rgba(232, 131, 107, 0.15);
      color: var(--coral);
    }
    .queue-item-action {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-dim);
      padding: 4px 10px;
      font-size: 0.7rem;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      flex-shrink: 0;
    }
    .queue-item-action:hover {
      border-color: var(--gold);
      color: var(--gold);
    }
    .queue-empty {
      color: var(--text-dim);
      text-align: center;
      padding: 20px 12px;
      font-size: 0.88rem;
    }
  </style>
</head>
<body>
  <!-- Auth gate -->
  <div id="auth-gate">
    <h1>Jarvis</h1>
    <p>Mission control — sign in as heath.</p>
    <input id="signin-email" type="email" placeholder="email" autocomplete="email" value="heath.shepard@kw.com">
    <input id="signin-password" type="password" placeholder="password" autocomplete="current-password">
    <button id="signin-btn">Sign in</button>
    <div class="err" id="signin-error"></div>
  </div>

  <!-- Main app -->
  <div id="app">
    <!-- 3D Canvas (z-index 0) -->
    <div id="three-container"></div>

    <!-- Hex grid overlay (z-index 1) -->
    <div class="hex-bg"></div>

    <!-- Mission Banner -->
    <div class="mission-banner">
      <div class="mission-text">
        <span class="mission-dot"></span>
        <span id="mission-text">Working on: Jarvis V5 initialization</span>
      </div>
    </div>

    <!-- Content -->
    <div class="content-wrapper">
      <div class="page">
        <!-- Heath TODO List -->
        <div class="section">
          <div class="section-head">
            <div class="section-title">Today's Work</div>
            <div class="section-count" id="todo-count">0</div>
          </div>
          <div id="todo-list" style="display: flex; flex-direction: column; gap: 8px;"></div>
        </div>

        <!-- Merge Queue -->
        <div class="section">
          <div class="section-head">
            <div class="section-title">Merge Queue</div>
            <div class="section-count" id="merge-count">0</div>
          </div>
          <div id="merge-list" style="display: flex; flex-direction: column; gap: 8px;"></div>
        </div>

        <!-- Agent Activity -->
        <div class="section">
          <div class="section-head">
            <div class="section-title">Agent Activity</div>
            <div class="section-count" id="agent-count">0</div>
          </div>
          <div id="agent-list" style="display: flex; flex-direction: column; gap: 8px;"></div>
        </div>

        <!-- Decision Queue -->
        <div class="section" style="grid-column: 1 / -1;">
          <div class="section-head">
            <div class="section-title">Decisions Awaiting</div>
            <div class="section-count" id="decision-count">0</div>
          </div>
          <div id="decision-list" style="display: flex; flex-direction: column; gap: 8px;"></div>
        </div>

        <div class="nav-back">
          <a href="/ventures">&larr; ventures dashboard</a>
          &nbsp;&middot;&nbsp;
          <a href="#" id="signout-link">sign out</a>
        </div>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
    import * as THREE from 'three';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    let supabase = null;
    let _token = null;
    let _pollTimer = null;
    const POLL_MS = 30_000;
    let _scene = null;
    let _orb = null;          // Earth group (sphere + wireframe + lanes)
    let _earthMesh = null;    // textured sphere (night lights)
    let _earthWire = null;    // cyan wireframe overlay
    let _shippingLanes = null;
    let _clock = null;        // THREE.Clock for time-based, seamless rotation
    let _camera = null;
    let _renderer = null;
    let _composer = null;
    let _bloomPass = null;
    let _starfield = null;
    const _todoItems = new Map();
    const _todoTouchStarts = new Map();
    let _atmosphereShell = null;

    async function bootstrap() {
      let config;
      try {
        config = await fetch('/api/config').then(r => r.json());
      } catch {
        showError('Could not load config.');
        document.getElementById('auth-gate').classList.add('visible');
        return;
      }
      if (!config.supabaseUrl || !config.supabaseKey) {
        showError('Supabase env missing.');
        document.getElementById('auth-gate').classList.add('visible');
        return;
      }
      supabase = createClient(config.supabaseUrl, config.supabaseKey, {
        auth: {
          persistSession: true,
          autoRefreshToken: true,
          detectSessionInUrl: false,
          storage: window.localStorage,
          storageKey: 'ventures.auth.token',
          flowType: 'pkce',
        },
      });
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) { showLogin(); return; }
      if (session.user.email !== 'heath.shepard@kw.com') {
        await supabase.auth.signOut();
        document.getElementById('signin-error').textContent = 'Access denied — this page is Heath only.';
        showLogin();
        return;
      }
      revealApp(session.access_token);
    }

    function showLogin() {
      document.getElementById('auth-gate').classList.add('visible');
      document.getElementById('app').classList.remove('visible');
      document.getElementById('signin-btn').addEventListener('click', handleSignIn);
    }

    async function handleSignIn() {
      const email = document.getElementById('signin-email').value;
      const password = document.getElementById('signin-password').value;
      const errorEl = document.getElementById('signin-error');
      errorEl.textContent = '';
      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) {
        errorEl.textContent = error.message;
        return;
      }
      if (data.session.user.email !== 'heath.shepard@kw.com') {
        await supabase.auth.signOut();
        errorEl.textContent = 'Access denied — this page is Heath only.';
        return;
      }
      revealApp(data.session.access_token);
    }

    function revealApp(token) {
      _token = token;
      document.getElementById('auth-gate').classList.remove('visible');
      document.getElementById('app').classList.add('visible');
      initThreeScene();
      refresh();
      _pollTimer = setInterval(refresh, POLL_MS);

      // Wire up mission banner click to voice command (Round 5)
      document.querySelector('.mission-text').addEventListener('click', async () => {
        toast('Voice command not yet available (Round 5)', 'err');
      });

      // Wire up footer
      document.getElementById('signout-link').addEventListener('click', async (e) => {
        e.preventDefault();
        await supabase.auth.signOut();
        showLogin();
      });
    }

    function showError(msg) {
      const el = document.getElementById('auth-err');
      if (el) el.textContent = msg || '';
    }

    function toast(msg, kind = '') {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = '';
      el.classList.add('visible');
      if (kind) el.classList.add(kind);
      clearTimeout(toast._t);
      toast._t = setTimeout(() => { el.classList.remove('visible'); }, 3500);
    }

    // ========== THREE.JS SCENE ==========
    function initThreeScene() {
      const container = document.getElementById('three-container');
      const w = window.innerWidth;
      const h = window.innerHeight;

      // Setup camera
      _camera = new THREE.PerspectiveCamera(75, w / h, 0.1, 1000);
      _camera.position.z = 3;

      // Setup renderer
      _renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      _renderer.setSize(w, h);
      _renderer.setClearColor(0x1a1a2e, 0);
      _renderer.setPixelRatio(window.devicePixelRatio);
      _renderer.shadowMap.enabled = true;
      container.appendChild(_renderer.domElement);

      // Setup post-processing with bloom
      _composer = new EffectComposer(_renderer);
      const renderPass = new RenderPass(_scene = new THREE.Scene(), _camera);
      _composer.addPass(renderPass);
      _bloomPass = new UnrealBloomPass(
        new THREE.Vector2(w, h),
        0.85,   // strength — reduced so atmosphere doesn't blow out
        0.55,   // radius
        0.78    // threshold
      );
      _composer.addPass(_bloomPass);

      // Setup scene — deep navy fog matched to body background
      _scene = new THREE.Scene();
      _scene.fog = new THREE.Fog(0x020817, 8, 22);

      // Ambient light — kept dim so night-lights emissive map can shine
      const ambLight = new THREE.AmbientLight(0xffffff, 0.18);
      _scene.add(ambLight);

      // Directional light — sun, soft and warm
      const dirLight = new THREE.DirectionalLight(0xfff0d0, 0.55);
      dirLight.position.set(5, 3, 5);
      _scene.add(dirLight);

      // Clock for seamless time-based animation (V5 R2.2 — no period restart, no += jumps)
      _clock = new THREE.Clock();

      // Create starfield background
      createStarfield();

      // Create the Earth orb (sphere + cyan wireframe + atmosphere + shipping lanes)
      createOrb();
      updateOrbPosition();

      // Update composer render pass scene reference
      _composer.passes[0].scene = _scene;

      // Handle window resize
      window.addEventListener('resize', onWindowResize);

      // Animation loop — time-based for seamless infinite rotation
      function animate() {
        requestAnimationFrame(animate);
        const elapsed = _clock.getElapsedTime();
        if (_orb) {
          // Seamless: pure multiplication of elapsed time. No modulo, no +=.
          _orb.rotation.y = elapsed * 0.05;
          // Slight axial tilt feel — static, not animated, so no seam
          _orb.rotation.x = 0.18;
        }
        if (_starfield) {
          _starfield.rotation.y = elapsed * 0.005;
          _starfield.rotation.x = elapsed * 0.003;
        }
        _composer.render();
      }
      animate();
    }

    function createStarfield() {
      const starGeometry = new THREE.BufferGeometry();
      const starCount = 1500;
      const positions = new Float32Array(starCount * 3);
      for (let i = 0; i < starCount * 3; i += 3) {
        positions[i] = (Math.random() - 0.5) * 100;
        positions[i + 1] = (Math.random() - 0.5) * 100;
        positions[i + 2] = (Math.random() - 0.5) * 100;
      }
      starGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      const starMaterial = new THREE.PointsMaterial({ color: 0x888899, size: 0.05 });
      _starfield = new THREE.Points(starGeometry, starMaterial);
      _scene.add(_starfield);
    }

    // ========== V5 R2.2 — EARTH ORB ==========
    // Replaces the cyan icosahedron. Layers:
    //   1. Dark sphere with NASA night-lights as emissive map (cities glow)
    //   2. Cyan wireframe overlay (slightly larger radius)
    //   3. Atmosphere fresnel shell (BackSide)
    //   4. Shipping lanes — great-circle arcs across oceans
    // All children added to _orb (a THREE.Group) so a single rotation.y drives the entire planet.
    function createOrb() {
      // Group is the rotation anchor. Position + scale applied to the group.
      _orb = new THREE.Group();
      _orb.scale.set(0.35, 0.35, 0.35);
      _orb.position.set(2.3, -0.5, 0);
      _scene.add(_orb);

      // ---- Layer 1: Earth sphere with night-lights emissive map ----
      // Procedural fallback texture renders immediately; NASA texture upgrades it if it loads.
      const proceduralLights = makeProceduralCityLightsTexture();
      const earthGeo = new THREE.SphereGeometry(1, 96, 64);
      const earthMat = new THREE.MeshStandardMaterial({
        color: 0x0a1428,            // near-black ocean / land base
        emissive: 0xffd180,          // warm city-light amber
        emissiveMap: proceduralLights,
        emissiveIntensity: 1.6,
        roughness: 0.92,
        metalness: 0.0,
      });
      _earthMesh = new THREE.Mesh(earthGeo, earthMat);
      _orb.add(_earthMesh);

      // Upgrade to NASA night-lights texture (threejs.org-hosted, CORS-safe).
      // If it fails, we still have the procedural fallback already rendering.
      const loader = new THREE.TextureLoader();
      loader.setCrossOrigin('anonymous');
      loader.load(
        'https://threejs.org/examples/textures/planets/earth_lights_2048.png',
        (tex) => {
          tex.colorSpace = THREE.SRGBColorSpace;
          tex.anisotropy = 8;
          earthMat.emissiveMap = tex;
          earthMat.emissiveIntensity = 1.2;
          earthMat.needsUpdate = true;
        },
        undefined,
        (err) => {
          console.warn('[earth] night-lights texture failed, keeping procedural', err);
        }
      );

      // ---- Layer 2: Cyan globe wireframe (parallels + meridians) ----
      // Drawn as discrete lat/lon lines for a clean Pinterest-Earth aesthetic
      // (not WireframeGeometry's triangulated mesh — that reads as noise).
      _earthWire = makeGlobeWireframe(1.008, 16, 24);
      _orb.add(_earthWire);

      // ---- Layer 3: Atmosphere fresnel shell (BackSide) ----
      // Tighter fresnel power + lower max alpha so the halo reads as atmosphere,
      // not a hard cyan ring overwhelming the city lights.
      const shellGeo = new THREE.SphereGeometry(1.15, 64, 64);
      const shellMat = new THREE.ShaderMaterial({
        uniforms: {
          color: { value: new THREE.Color(0x00d4ff) }, // V5 spec primary cyan
        },
        vertexShader: `
          varying vec3 vNormal;
          varying vec3 vViewDir;
          void main() {
            vNormal = normalize(normalMatrix * normal);
            vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
            vViewDir = normalize(-mvPos.xyz);
            gl_Position = projectionMatrix * mvPos;
          }
        `,
        fragmentShader: `
          uniform vec3 color;
          varying vec3 vNormal;
          varying vec3 vViewDir;
          void main() {
            float fresnel = pow(1.0 - max(dot(vNormal, vViewDir), 0.0), 3.4);
            gl_FragColor = vec4(color, fresnel * 0.55);
          }
        `,
        transparent: true,
        blending: THREE.AdditiveBlending,
        side: THREE.BackSide,
        depthWrite: false,
      });
      _atmosphereShell = new THREE.Mesh(shellGeo, shellMat);
      // Shell goes on the GROUP so it tracks orb position but NOT rotation
      // (atmosphere should be static so glow doesn't visibly spin)
      _orb.add(_atmosphereShell);

      // ---- Layer 4: Shipping lanes (great-circle arcs across oceans) ----
      _shippingLanes = makeShippingLanes();
      _orb.add(_shippingLanes);
    }

    // Clean globe wireframe — parallels (lat) + meridians (lon) as separate line loops.
    // Reads as an Earth grid, not triangulated mesh.
    function makeGlobeWireframe(radius, parallels, meridians) {
      const group = new THREE.Group();
      const mat = new THREE.LineBasicMaterial({
        color: 0x00d4ff,
        transparent: true,
        opacity: 0.32,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
      });

      // Parallels (horizontal circles, excluding poles)
      for (let i = 1; i < parallels; i++) {
        const lat = (i / parallels) * Math.PI - Math.PI / 2; // -π/2..π/2
        const y = Math.sin(lat) * radius;
        const r = Math.cos(lat) * radius;
        const segs = 96;
        const pts = [];
        for (let j = 0; j <= segs; j++) {
          const a = (j / segs) * Math.PI * 2;
          pts.push(new THREE.Vector3(Math.cos(a) * r, y, Math.sin(a) * r));
        }
        const geo = new THREE.BufferGeometry().setFromPoints(pts);
        group.add(new THREE.Line(geo, mat));
      }

      // Meridians (vertical half-circles from pole to pole)
      for (let i = 0; i < meridians; i++) {
        const lon = (i / meridians) * Math.PI * 2;
        const segs = 64;
        const pts = [];
        for (let j = 0; j <= segs; j++) {
          const lat = (j / segs) * Math.PI - Math.PI / 2;
          pts.push(new THREE.Vector3(
            Math.cos(lat) * Math.cos(lon) * radius,
            Math.sin(lat) * radius,
            Math.cos(lat) * Math.sin(lon) * radius
          ));
        }
        const geo = new THREE.BufferGeometry().setFromPoints(pts);
        group.add(new THREE.Line(geo, mat));
      }

      return group;
    }

    // Procedural city-lights texture — used immediately + as fallback if NASA texture 404s.
    // Generates a 1024x512 equirectangular map with bright dots clustered roughly where landmasses sit,
    // so the orb glows like inhabited Earth at night before the real texture loads.
    function makeProceduralCityLightsTexture() {
      const W = 1024, H = 512;
      const canvas = document.createElement('canvas');
      canvas.width = W;
      canvas.height = H;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, W, H);

      // Rough landmass centers in equirectangular (lon -180..180 → x 0..W, lat -90..90 → y H..0)
      // Each entry: [lonDeg, latDeg, spreadDeg, densityWeight]
      const regions = [
        // North America east coast (NYC/Boston/DC)
        [-74, 40, 8, 1.0],
        // North America Midwest (Chicago/Toronto)
        [-87, 41, 10, 0.7],
        // North America west coast (LA/SF/Seattle)
        [-118, 36, 9, 0.8],
        // Mexico City
        [-99, 19, 5, 0.5],
        // South America (Sao Paulo / Rio / Buenos Aires)
        [-58, -27, 18, 0.6],
        // Western Europe (London/Paris/Amsterdam/Frankfurt)
        [5, 50, 10, 1.0],
        // Italy / Spain
        [12, 42, 8, 0.6],
        // Eastern Europe (Moscow/Warsaw)
        [35, 53, 14, 0.5],
        // Middle East (Istanbul/Tel Aviv/Dubai/Riyadh)
        [38, 32, 12, 0.7],
        // India (Delhi/Mumbai/Bangalore)
        [78, 22, 14, 0.9],
        // Southeast Asia (Bangkok/Jakarta/Singapore)
        [105, 5, 16, 0.7],
        // China east coast (Beijing/Shanghai/Guangzhou)
        [115, 30, 14, 1.0],
        // Japan/Korea (Tokyo/Seoul/Osaka)
        [138, 36, 6, 0.9],
        // Africa west (Lagos/Accra)
        [3, 7, 8, 0.5],
        // Africa east (Cairo/Nairobi/Joburg)
        [32, 5, 18, 0.5],
        // Australia east coast (Sydney/Melbourne/Brisbane)
        [148, -32, 8, 0.5],
      ];

      function lonLatToXY(lonDeg, latDeg) {
        const x = ((lonDeg + 180) / 360) * W;
        const y = ((90 - latDeg) / 180) * H;
        return [x, y];
      }

      // Draw clustered city dots per region
      for (const [lon, lat, spread, weight] of regions) {
        const dotCount = Math.floor(180 * weight);
        for (let i = 0; i < dotCount; i++) {
          // Gaussian-ish offset
          const r = Math.pow(Math.random(), 1.5) * spread;
          const theta = Math.random() * Math.PI * 2;
          const dLon = r * Math.cos(theta);
          const dLat = r * Math.sin(theta) * 0.6; // squash latitudinally
          const [x, y] = lonLatToXY(lon + dLon, lat + dLat);
          const size = Math.random() * 1.4 + 0.4;
          const alpha = 0.55 + Math.random() * 0.45;
          ctx.fillStyle = `rgba(255, ${200 + Math.floor(Math.random() * 40)}, ${110 + Math.floor(Math.random() * 60)}, ${alpha})`;
          ctx.fillRect(x | 0, y | 0, size, size);
          // Soft halo on brighter ones
          if (Math.random() < 0.18) {
            ctx.fillStyle = `rgba(255, 210, 140, ${alpha * 0.25})`;
            ctx.fillRect((x | 0) - 1, (y | 0) - 1, 3, 3);
          }
        }
      }

      const tex = new THREE.CanvasTexture(canvas);
      tex.colorSpace = THREE.SRGBColorSpace;
      tex.anisotropy = 8;
      return tex;
    }

    // Shipping lanes — curved great-circle arcs across major ocean trade routes.
    // Drawn as additive cyan lines that sit on the rotation group so they spin WITH the Earth.
    function makeShippingLanes() {
      const group = new THREE.Group();

      // Major shipping lanes (lon, lat) endpoint pairs
      // Endpoints chosen to arc across oceans, not land
      const lanes = [
        // Trans-Atlantic: NYC ↔ London
        [[-74, 40], [0, 51]],
        // Trans-Pacific: Long Beach ↔ Shanghai
        [[-118, 33], [121, 31]],
        // Suez: Rotterdam ↔ Singapore
        [[4, 51], [103, 1]],
        // Cape route: Singapore ↔ Cape Town
        [[103, 1], [18, -33]],
        // Panama: NYC ↔ Long Beach (via Panama, simplified arc)
        [[-74, 40], [-118, 33]],
        // Indian Ocean: Mumbai ↔ Dubai
        [[72, 18], [55, 25]],
        // South Atlantic: Sao Paulo ↔ Cape Town
        [[-46, -23], [18, -33]],
        // Pacific: Tokyo ↔ Long Beach
        [[139, 35], [-118, 33]],
        // North Sea: London ↔ Hamburg ↔ St Petersburg
        [[0, 51], [30, 59]],
      ];

      function lonLatToVec3(lon, lat, r) {
        const phi = (90 - lat) * Math.PI / 180;
        const theta = (lon + 180) * Math.PI / 180;
        return new THREE.Vector3(
          -r * Math.sin(phi) * Math.cos(theta),
          r * Math.cos(phi),
          r * Math.sin(phi) * Math.sin(theta)
        );
      }

      for (const [a, b] of lanes) {
        const start = lonLatToVec3(a[0], a[1], 1.015);
        const end = lonLatToVec3(b[0], b[1], 1.015);
        // Midpoint pushed outward → curves above surface
        const mid = start.clone().add(end).multiplyScalar(0.5).normalize().multiplyScalar(1.18);
        const curve = new THREE.QuadraticBezierCurve3(start, mid, end);
        const points = curve.getPoints(60);
        const geo = new THREE.BufferGeometry().setFromPoints(points);
        const mat = new THREE.LineBasicMaterial({
          color: 0x4dd4ff,
          transparent: true,
          opacity: 0.45,
          blending: THREE.AdditiveBlending,
          depthWrite: false,
        });
        const line = new THREE.Line(geo, mat);
        group.add(line);
      }

      return group;
    }

    
    function updateOrbPosition() {
      const w = window.innerWidth;
      const h = window.innerHeight;
      const isMobile = w < 768;

      if (!_orb) return;

      if (isMobile) {
        // Mobile: NDC unproject to top-right corner (85% width, 15% height)
        const screenX = 0.85;
        const screenY = 0.15;
        const ndcX = screenX * 2 - 1;
        const ndcY = -(screenY * 2 - 1);
        const v = new THREE.Vector3(ndcX, ndcY, 0.5);
        v.unproject(_camera);
        const dir = v.sub(_camera.position).normalize();
        const distance = _camera.position.z;
        const target = _camera.position.clone().add(dir.multiplyScalar(distance));
        _orb.position.set(target.x, target.y, 0);
        _orb.scale.set(0.22, 0.22, 0.22);
      } else {
        // Desktop: right gutter (X = 2.3), keep Y at -0.5 — LOCKED
        _orb.position.set(2.3, -0.5, 0);
        _orb.scale.set(0.35, 0.35, 0.35);
      }
      // Atmosphere shell is a child of _orb (V5 R2.2) — no separate update needed
    }

    function onWindowResize() {
      const w = window.innerWidth;
      const h = window.innerHeight;
      _camera.aspect = w / h;
      _camera.updateProjectionMatrix();
      _renderer.setSize(w, h);
      _composer.setSize(w, h);
      updateOrbPosition();
    }

    // ========== DATA FETCHING ==========
    async function authFetch(url, init = {}) {
      return fetch(url, {
        ...init,
        headers: {
          'Authorization': `Bearer ${_token}`,
          'Content-Type': 'application/json',
          ...(init.headers || {}),
        },
      });
    }

    async function refresh() {
      try {
        await Promise.all([
          refreshTodoList(),
          refreshMergeQueue(),
          refreshAgentActivity(),
          refreshDecisionQueue(),
        ]);
        document.getElementById('last-updated') && (document.getElementById('last-updated').textContent = new Date().toLocaleTimeString());
      } catch (err) {
        console.error('Refresh error:', err);
      }
    }

    async function refreshTodoList() {
      try {
        const { data, error } = await supabase
          .from('heath_todo')
          .select('id, title, priority, deadline, snoozed_until, status')
          .eq('status', 'pending')
          .order('priority', { ascending: true })
          .order('deadline', { ascending: true });

        if (error) throw error;

        const container = document.getElementById('todo-list');
        const count = data.length;
        document.getElementById('todo-count').textContent = count;

        // Diff: remove deleted items
        const incomingIds = new Set(data.map(t => t.id));
        for (const id of _todoItems.keys()) {
          if (!incomingIds.has(id)) {
            const el = document.getElementById(`todo-${id}`);
            if (el) el.remove();
            _todoItems.delete(id);
          }
        }

        // Add or update items
        for (const todo of data) {
          if (!_todoItems.has(todo.id)) {
            const todoEl = createTodoElement(todo);
            container.appendChild(todoEl);
            _todoItems.set(todo.id, todoEl);
          }
        }

        if (count === 0) {
          container.innerHTML = '<div class="todo-empty">No active work. Nice.</div>';
        }
      } catch (err) {
        console.error('Todo fetch error:', err);
      }
    }

    function createTodoElement(todo) {
      const el = document.createElement('div');
      el.id = `todo-${todo.id}`;
      el.className = 'todo-item';

      const dueText = todo.deadline ? new Date(todo.deadline).toLocaleDateString() : '—';
      const priorityLabel = ['critical', 'high', 'normal', 'low', 'background'][todo.priority - 1] || 'normal';

      el.innerHTML = `
        <div class="todo-checkbox" data-id="${todo.id}" data-action="check"></div>
        <div class="todo-body">
          <div class="todo-text">${escapeHtml(todo.title)}</div>
          <div class="todo-meta">
            <span>${priorityLabel}</span>
            <span>${dueText}</span>
          </div>
        </div>
        <div class="todo-actions">
          <button class="todo-action-btn" data-id="${todo.id}" data-action="snooze">Snooze</button>
          <button class="todo-action-btn" data-id="${todo.id}" data-action="hide">Hide</button>
        </div>
      `;

      // Event handlers
      const checkbox = el.querySelector('.todo-checkbox');
      checkbox.addEventListener('click', async (e) => {
        e.stopPropagation();
        await completeTodo(todo.id, el);
      });

      el.querySelectorAll('.todo-action-btn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          const action = e.target.dataset.action;
          const id = e.target.dataset.id;
          if (action === 'snooze') {
            await snoozeTodo(id, el);
          } else if (action === 'hide') {
            await hideTodo(id, el);
          }
        });
      });

      // Touch swipe support
      let touchStart = 0;
      el.addEventListener('touchstart', (e) => {
        touchStart = e.touches[0].clientX;
      }, false);
      el.addEventListener('touchmove', (e) => {
        if (!touchStart) return;
        const touchEnd = e.touches[0].clientX;
        const diff = touchStart - touchEnd;
        if (diff > 80) {
          el.classList.add('swiping-out');
          setTimeout(() => completeTodo(todo.id, el), 300);
          touchStart = 0;
        }
      }, false);

      return el;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    async function completeTodo(id, el) {
      try {
        el.classList.add('swiping-out');
        setTimeout(async () => {
          const { error } = await supabase
            .from('heath_todo')
            .update({ status: 'done', completed_at: new Date().toISOString() })
            .eq('id', id);
          if (error) throw error;
          el.remove();
          _todoItems.delete(id);
          toast('Done!', 'ok');
          await refreshTodoList();
        }, 200);
      } catch (err) {
        console.error('Complete error:', err);
        el.classList.remove('swiping-out');
        toast('Error', 'err');
      }
    }

    async function snoozeTodo(id, el) {
      try {
        const snoozeUntil = new Date();
        snoozeUntil.setHours(snoozeUntil.getHours() + 2);
        const { error } = await supabase
          .from('heath_todo')
          .update({ status: 'snoozed', snoozed_until: snoozeUntil.toISOString() })
          .eq('id', id);
        if (error) throw error;
        el.classList.add('swiping-out');
        setTimeout(() => {
          el.remove();
          _todoItems.delete(id);
          toast('Snoozed 2h', 'ok');
        }, 200);
      } catch (err) {
        console.error('Snooze error:', err);
        toast('Error', 'err');
      }
    }

    async function hideTodo(id, el) {
      try {
        const { error } = await supabase
          .from('heath_todo')
          .update({ status: 'skipped' })
          .eq('id', id);
        if (error) throw error;
        el.classList.add('swiping-out');
        setTimeout(() => {
          el.remove();
          _todoItems.delete(id);
          toast('Hidden', 'ok');
        }, 200);
      } catch (err) {
        console.error('Hide error:', err);
        toast('Error', 'err');
      }
    }

    // ========== MERGE QUEUE ==========
    async function refreshMergeQueue() {
      try {
        const res = await authFetch('/api/merge-queue-status');
        const container = document.getElementById('merge-list');

        if (!res.ok) {
          const errorData = await res.json();
          document.getElementById('merge-count').textContent = '—';
          container.innerHTML = `<div class="queue-empty" style="color: var(--coral);">Merge queue unavailable: ${escapeHtml(errorData.message || errorData.error)}</div>`;
          return;
        }

        const commits = await res.json();
        const count = commits.length;
        document.getElementById('merge-count').textContent = count;

        if (count === 0) {
          container.innerHTML = '<div class="queue-empty">No commits pending merge</div>';
          return;
        }

        container.innerHTML = '';
        for (const commit of commits) {
          const el = document.createElement('div');
          el.className = 'queue-item';
          const date = new Date(commit.date).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
          el.innerHTML = `
            <div class="queue-item-head">
              <div class="queue-item-title">${escapeHtml(commit.message.split('\n')[0])}</div>
              <div class="queue-item-meta">
                <span class="queue-item-status pending">APV PASS</span>
                <span>${escapeHtml(commit.author)}</span>
                <span>${date}</span>
              </div>
            </div>
            <button class="queue-item-action" data-hash="${commit.hash}" data-action="merge">Merge</button>
          `;
          el.querySelector('button').addEventListener('click', (e) => {
            e.stopPropagation();
            toast('Merge triggered — check git log', 'ok');
          });
          container.appendChild(el);
        }
      } catch (err) {
        console.error('Merge queue error:', err);
        const container = document.getElementById('merge-list');
        document.getElementById('merge-count').textContent = '—';
        container.innerHTML = '<div class="queue-empty" style="color: var(--coral);">Merge queue unavailable</div>';
      }
    }

    // ========== AGENT ACTIVITY ==========
    async function refreshAgentActivity() {
      try {
        const { data, error } = await supabase
          .from('agent_state')
          .select('agent_name, status, last_heartbeat_at')
          .order('last_heartbeat_at', { ascending: false });

        if (error) throw error;

        const container = document.getElementById('agent-list');
        const count = data ? data.length : 0;
        document.getElementById('agent-count').textContent = count;

        if (count === 0) {
          container.innerHTML = '<div class="queue-empty">No agents active</div>';
          return;
        }

        container.innerHTML = '';
        for (const agent of data) {
          const el = document.createElement('div');
          el.className = 'queue-item';
          const lastSeen = agent.last_heartbeat_at ? getTimeAgo(agent.last_heartbeat_at) : '—';
          const statusClass = agent.status === 'working' ? '' : agent.status === 'error' ? 'error' : 'pending';
          el.innerHTML = `
            <div class="queue-item-head">
              <div class="queue-item-title">${escapeHtml(agent.agent_name)}</div>
              <div class="queue-item-meta">
                <span class="queue-item-status ${statusClass}">${agent.status}</span>
                <span>Last seen ${lastSeen}</span>
              </div>
            </div>
          `;
          container.appendChild(el);
        }
      } catch (err) {
        console.error('Agent activity error:', err);
      }
    }

    // ========== DECISION QUEUE ==========
    async function refreshDecisionQueue() {
      try {
        const { data, error } = await supabase
          .from('decision_queue')
          .select('id, decision_type, title, status, created_at')
          .eq('status', 'pending')
          .order('created_at', { ascending: true });

        if (error) throw error;

        const container = document.getElementById('decision-list');
        const count = data ? data.length : 0;
        document.getElementById('decision-count').textContent = count;

        if (count === 0) {
          container.innerHTML = '<div class="queue-empty">No decisions pending</div>';
          return;
        }

        container.innerHTML = '';
        for (const decision of data) {
          const el = document.createElement('div');
          el.className = 'queue-item';
          const date = new Date(decision.created_at).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
          el.innerHTML = `
            <div class="queue-item-head">
              <div class="queue-item-title">${escapeHtml(decision.title)}</div>
              <div class="queue-item-meta">
                <span class="queue-item-status pending">${decision.decision_type.toUpperCase()}</span>
                <span>${date}</span>
              </div>
            </div>
            <button class="queue-item-action" data-id="${decision.id}" data-action="view">View</button>
          `;
          el.querySelector('button').addEventListener('click', (e) => {
            e.stopPropagation();
            toast('Decision details coming in Round 3', 'ok');
          });
          container.appendChild(el);
        }
      } catch (err) {
        console.error('Decision queue error:', err);
      }
    }

    function getTimeAgo(timestamp) {
      const now = new Date();
      const then = new Date(timestamp);
      const diffMs = now - then;
      const diffMins = Math.floor(diffMs / 60000);
      if (diffMins < 1) return 'now';
      if (diffMins < 60) return `${diffMins}m ago`;
      const diffHours = Math.floor(diffMins / 60);
      if (diffHours < 24) return `${diffHours}h ago`;
      const diffDays = Math.floor(diffHours / 24);
      return `${diffDays}d ago`;
    }

    // Initialize
    bootstrap();
  </script>
