<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome to Dossie — Complete Your Profile</title>
<meta name="description" content="Complete your Dossie founding member profile.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #FDFCFA; --bg-warm: #F9F6F1; --bg-card: #FFFFFF;
  --border: #E8E2D9; --border-light: #F0EBE3;
  --text-primary: #2D2A26; --text-secondary: #7A7468; --text-light: #A39E94;
  --blush: #D4A0A0; --blush-light: #F2E4E4; --blush-deep: #C08080;
  --sage: #8FAF8F; --sage-light: #E4EDE2; --sage-deep: #6B8E68;
  --gold: #C9A84C; --gold-light: #F5EDD8; --gold-deep: #A48531;
  --coral: #E8836B; --coral-light: #FAE5DD; --coral-deep: #D66F59;
}
html { scroll-behavior: smooth; }
body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-primary); -webkit-font-smoothing: antialiased; min-height: 100vh; display: flex; flex-direction: column; }

@keyframes fadeInUp { from { opacity: 0; transform: translateY(22px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.04); opacity: 0.92; } }

.shell { flex: 1; display: flex; align-items: center; justify-content: center; padding: 64px 28px; position: relative; overflow: hidden; }
.shell::before { content: ''; position: absolute; top: -200px; right: -160px; width: 560px; height: 560px; background: radial-gradient(circle, var(--blush-light) 0%, transparent 65%); pointer-events: none; opacity: 0.85; }
.shell::after { content: ''; position: absolute; bottom: -200px; left: -120px; width: 540px; height: 540px; background: radial-gradient(circle, var(--gold-light) 0%, transparent 65%); pointer-events: none; opacity: 0.7; }

.card { position: relative; z-index: 1; max-width: 560px; width: 100%; background: var(--bg-card); border: 1px solid var(--border); border-radius: 32px; padding: 56px 48px; text-align: center; box-shadow: 0 30px 80px rgba(45,42,38,0.1); animation: fadeInUp 0.55s ease-out both; }
.mark { width: 76px; height: 76px; border-radius: 24px; margin: 0 auto 28px; background: linear-gradient(135deg, var(--blush) 0%, var(--gold) 100%); display: flex; align-items: center; justify-content: center; font-family: 'Cormorant Garamond', serif; font-weight: 600; color: #fff; font-size: 36px; box-shadow: 0 14px 38px rgba(212,160,160,0.32); animation: pulse 3s ease-in-out infinite; }
.eyebrow { font-size: 12px; letter-spacing: 2.2px; text-transform: uppercase; font-weight: 700; color: var(--gold-deep); margin-bottom: 18px; }
h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(36px, 5.6vw, 54px); font-weight: 600; line-height: 1.05; letter-spacing: -1.2px; color: var(--text-primary); }
h1 em { font-style: italic; color: var(--blush-deep); }
.sub { margin: 22px auto 0; max-width: 440px; color: var(--text-secondary); font-size: 16px; line-height: 1.7; }

.form { margin-top: 36px; text-align: left; }
.form-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
.form-label { font-size: 11px; letter-spacing: 1.6px; text-transform: uppercase; font-weight: 700; color: var(--text-secondary); }
.form-input { width: 100%; border: 1px solid var(--border); border-radius: 14px; padding: 13px 16px; font-family: inherit; font-size: 15px; background: #fff; color: var(--text-primary); transition: border-color 0.2s, box-shadow 0.2s; }
.form-input:focus { outline: none; border-color: var(--coral); box-shadow: 0 0 0 3px var(--coral-light); }
.form-input:disabled { opacity: 0.6; background: var(--bg-warm); cursor: not-allowed; }

.cta-primary { width: 100%; margin-top: 24px; padding: 16px 32px; border: none; border-radius: 999px; background: #C17B5C; color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; box-shadow: 0 16px 38px rgba(193,123,92,0.28); transition: transform 0.2s, box-shadow 0.2s, background 0.2s; }
.cta-primary:hover:not(:disabled) { transform: translateY(-2px); background: #B06A4F; box-shadow: 0 20px 42px rgba(193,123,92,0.36); }
.cta-primary:disabled { opacity: 0.65; cursor: progress; }

.status-message { margin-top: 16px; padding: 12px 16px; border-radius: 12px; font-size: 14px; text-align: center; line-height: 1.55; display: none; }
.status-message.is-success { background: var(--sage-light); color: var(--sage-deep); display: block; }
.status-message.is-error { background: var(--coral-light); color: var(--coral-deep); display: block; }
.status-message.is-loading { background: var(--gold-light); color: var(--gold-deep); display: block; }

footer { padding: 32px 28px; text-align: center; border-top: 1px solid var(--border-light); }
.footer-text { font-size: 13px; color: var(--text-light); }
.footer-text a { color: var(--text-secondary); text-decoration: none; }
.footer-text a:hover { color: var(--text-primary); }

@media (max-width: 600px) {
  .shell { padding: 56px 18px; }
  .card { padding: 44px 28px; border-radius: 24px; }
  .mark { width: 64px; height: 64px; font-size: 30px; }
}
</style>
</head>
<body>

<main class="shell">
  <div class="card">
    <div class="mark">D</div>
    <div class="eyebrow">🔒 Founding Member</div>
    <h1>Welcome to Dossie. <em>You're in.</em></h1>
    <p class="sub">Your payment is confirmed. Complete your profile below and we'll send your login credentials within a few minutes.</p>

    <form class="form" id="onboarding-form" novalidate>
      <div class="form-field">
        <label class="form-label" for="name">Full name</label>
        <input class="form-input" id="name" name="name" type="text" placeholder="Your full name" required>
      </div>
      <div class="form-field">
        <label class="form-label" for="email">Email</label>
        <input class="form-input" id="email" name="email" type="email" placeholder="Loading..." required>
      </div>
      <div class="form-field">
        <label class="form-label" for="brokerage">Brokerage</label>
        <input class="form-input" id="brokerage" name="brokerage" type="text" placeholder="e.g. Keller Williams" required>
      </div>
      <div class="form-field">
        <label class="form-label" for="market">Texas market</label>
        <input class="form-input" id="market" name="market" type="text" placeholder="e.g. San Antonio, Austin, DFW..." required>
      </div>
      <button class="cta-primary" type="submit" id="submit-button">Complete Setup</button>
      <div class="status-message" id="status-message"></div>
    </form>
  </div>
</main>

<footer>
  <div class="footer-text">
    Questions? <a href="mailto:heath@meetdossie.com">heath@meetdossie.com</a> · © 2026 Dossie AI
  </div>
</footer>

<script>
(async function () {
  var form = document.getElementById("onboarding-form");
  var nameInput = document.getElementById("name");
  var emailInput = document.getElementById("email");
  var brokerageInput = document.getElementById("brokerage");
  var marketInput = document.getElementById("market");
  var submitButton = document.getElementById("submit-button");
  var status = document.getElementById("status-message");

  // Extract session_id from URL query params
  var params = new URLSearchParams(window.location.search);
  var sessionId = params.get("session_id");

  if (!sessionId) {
    status.textContent = "No session found. Please contact support at heath@meetdossie.com";
    status.classList.add("is-error");
    submitButton.disabled = true;
    return;
  }

  // Fetch email from Stripe session and pre-fill with 3-second timeout
  var sessionFetched = false;

  // Start the fetch
  var fetchPromise = fetch("/api/get-checkout-session?session_id=" + encodeURIComponent(sessionId))
    .then(function(res) { return res.json(); })
    .then(function(sessionData) {
      sessionFetched = true;
      emailInput.placeholder = "you@brokerage.com";
      if (sessionData.ok && sessionData.email) {
        emailInput.value = sessionData.email;
        if (sessionData.name) {
          nameInput.value = sessionData.name;
        }
      }
    })
    .catch(function(err) {
      console.error("[welcome] failed to fetch session:", err && err.message);
      sessionFetched = true;
      emailInput.placeholder = "you@brokerage.com";
    });

  // 3-second timeout fallback
  setTimeout(function() {
    if (!sessionFetched) {
      console.warn("[welcome] session fetch timeout - falling back to manual entry");
      emailInput.placeholder = "you@brokerage.com";
    }
  }, 3000);

  function showStatus(message, kind) {
    status.textContent = message;
    status.classList.remove("is-success", "is-error", "is-loading");
    if (kind) status.classList.add("is-" + kind);
  }

  function isValidEmail(e) {
    return typeof e === "string" && /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);
  }

  form.addEventListener("submit", async function (event) {
    event.preventDefault();

    var name = (nameInput.value || "").trim();
    var email = (emailInput.value || "").trim().toLowerCase();
    var brokerage = (brokerageInput.value || "").trim();
    var market = (marketInput.value || "").trim();

    if (!name) { showStatus("Please enter your full name.", "error"); return; }
    if (!isValidEmail(email)) { showStatus("That email looks off. Please check it.", "error"); return; }
    if (!brokerage) { showStatus("Please enter your brokerage name.", "error"); return; }
    if (!market) { showStatus("Please enter your Texas market.", "error"); return; }

    submitButton.disabled = true;
    submitButton.textContent = "Setting up your account...";
    showStatus("Creating your account...", "loading");

    try {
      var res = await fetch("/api/complete-onboarding", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          session_id: sessionId,
          name: name,
          email: email,
          brokerage: brokerage,
          market: market,
        }),
      });

      var data = await res.json();
      if (!res.ok || !data.ok) {
        throw new Error(data.error || "Onboarding failed.");
      }

      showStatus("Account created! Check your email for login instructions.", "success");
      submitButton.textContent = "Setup Complete ✓";

      // Redirect to app after 3 seconds
      setTimeout(function () {
        window.location.href = "/app.html";
      }, 3000);
    } catch (err) {
      console.error("[welcome] onboarding error:", err && err.message);
      showStatus(err && err.message || "Could not complete setup. Try again or contact heath@meetdossie.com.", "error");
      submitButton.disabled = false;
      submitButton.textContent = "Complete Setup";
    }
  });
})();
</script>

</body>
</html>
