<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, minimum-scale=1, user-scalable=yes">
  <meta name="theme-color" content="#0a0a14">
  <meta name="robots" content="noindex, nofollow">
  <title>Jarvis — Shepard Ventures Command Center</title>
  <link rel="icon" href="/icons/jarvis-192.svg">
  <link rel="apple-touch-icon" href="/icons/jarvis-192.svg">
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --blush: #F5E6E0;
      --blush-deep: #D4A0A0;
      --sage: #8BA888;
      --gold: #C9A96E;
      --navy: #1A1A2E;
      --navy-dark: #0a0a14;
      --navy-mid: #20203a;
      --coral: #E8836B;
      --coral-deep: #d96d52;
      --cyan: #5BD9E6;
      --surface: rgba(255, 255, 255, 0.04);
      --surface-hover: rgba(255, 255, 255, 0.07);
      --border: rgba(245, 230, 224, 0.10);
      --border-hover: rgba(245, 230, 224, 0.22);
      --text-dim: rgba(245, 230, 224, 0.55);
      --text-faint: rgba(245, 230, 224, 0.35);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100vh;
      min-height: 100dvh;
      background: var(--navy-dark);
      background-image: radial-gradient(circle, #1a1a2a 1px, transparent 1px);
      background-size: 24px 24px;
      color: var(--blush);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 16px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      padding-bottom: env(safe-area-inset-bottom);
      overflow-x: hidden;
    }

    /* ---- Auth gate ---- */
    #auth-gate {
      display: none;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
      padding: 24px;
      text-align: center;
    }
    #auth-gate.visible { display: flex; }
    #auth-gate h1 {
      font-family: "Cormorant Garamond", serif;
      color: var(--gold);
      font-weight: 600;
      font-size: 2rem;
    }
    #auth-gate p { color: var(--text-dim); font-size: 0.95rem; max-width: 320px; }
    #auth-gate input {
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--navy-mid);
      color: var(--blush);
      width: min(320px, 90vw);
      font-size: 1rem;
      font-family: inherit;
    }
    #auth-gate input:focus { outline: 1px solid var(--gold); border-color: var(--gold); }
    #auth-gate button {
      padding: 12px 20px;
      border-radius: 10px;
      border: none;
      background: var(--coral);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      font-size: 1rem;
      width: min(320px, 90vw);
    }
    #auth-gate button:hover { background: var(--coral-deep); }
    #auth-gate .err { color: var(--coral); font-size: 0.85rem; min-height: 1em; }

    #app { display: none; }
    #app.visible { display: block; }

    /* ---- Main layout (3-column desktop, single-column mobile) ---- */
    .page {
      min-height: 100dvh;
      display: grid;
      grid-template-columns: 1fr;
      gap: 0;
      padding: 0;
    }

    /* Desktop: 3-column layout */
    @media (min-width: 1024px) {
      .page {
        grid-template-columns: 280px 1fr 280px;
        gap: 16px;
        padding: 16px;
        overflow-x: hidden;
      }
    }

    /* ---- Top bar (fixed, full-width) ---- */
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: rgba(10, 10, 20, 0.85);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      z-index: 40;
      height: 52px;
    }

    .topbar-title {
      font-family: "Cormorant Garamond", serif;
      font-weight: 600;
      font-size: 1rem;
      color: var(--blush);
      letter-spacing: 0.04em;
    }

    .topbar-system {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.65rem;
      color: var(--cyan);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    .topbar-system-dot {
      width: 5px;
      height: 5px;
      background: var(--cyan);
      border-radius: 50%;
      animation: sysOnline 2s ease-in-out infinite;
    }

    @keyframes sysOnline {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .topbar-time {
      font-size: 0.65rem;
      color: var(--cyan);
      text-align: right;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      letter-spacing: 0.02em;
    }

    /* ---- Left panel (ventures) ---- */
    .sidebar-left {
      display: none;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
      padding-top: 64px;
      padding-bottom: 20px;
    }

    @media (min-width: 1024px) {
      .sidebar-left {
        display: flex;
      }
    }

    /* ---- Right panel (agent activity) ---- */
    .sidebar-right {
      display: none;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
      padding-top: 64px;
      padding-bottom: 20px;
    }

    @media (min-width: 1024px) {
      .sidebar-right {
        display: flex;
      }
    }

    /* ---- Center column (orb + ventures mobile) ---- */
    .center-column {
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding-top: 64px;
      padding-bottom: 20px;
    }

    @media (min-width: 1024px) {
      .center-column {
        padding: 64px 0 20px;
      }
    }

    /* ---- Orb hero section ---- */
    .orb-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      position: relative;
      padding: 20px;
    }

    #orb-container {
      width: 240px;
      height: 240px;
      position: relative;
    }

    @media (max-width: 768px) {
      #orb-container {
        width: 180px;
        height: 180px;
      }
    }

    /* ---- Orb status indicator ---- */
    .orb-status {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.72rem;
      color: var(--cyan);
      text-align: center;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      min-height: 1em;
      margin-bottom: 8px;
    }

    .orb-tap-hint {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.7rem;
      color: var(--text-dim);
      text-align: center;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    /* ---- KPI ring around orb ---- */
    .orb-kpis {
      display: none;
      position: absolute;
      width: 100%;
      height: 100%;
      pointer-events: none;
      font-size: 0.65rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      color: var(--cyan);
    }

    @media (min-width: 1024px) {
      .orb-kpis {
        display: block;
      }
    }

    .kpi-badge {
      position: absolute;
      background: rgba(10, 10, 20, 0.8);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
      text-align: center;
      white-space: nowrap;
      box-shadow: 0 0 12px rgba(91, 217, 230, 0.1);
    }

    .kpi-badge-label {
      display: block;
      font-size: 0.6rem;
      color: var(--text-faint);
      margin-bottom: 2px;
    }

    .kpi-badge-value {
      font-weight: 700;
      color: var(--cyan);
    }

    /* ---- Panel styling (ventures, agents) ---- */
    .hud-panel {
      background: rgba(32, 32, 58, 0.4);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      position: relative;
      box-shadow: 0 0 16px rgba(91, 217, 230, 0.08);
    }

    .hud-panel::before,
    .hud-panel::after {
      content: '';
      position: absolute;
      width: 8px;
      height: 8px;
      border: 1px solid var(--cyan);
    }

    .hud-panel::before {
      top: 8px;
      left: 8px;
      border-right: none;
      border-bottom: none;
    }

    .hud-panel::after {
      bottom: 8px;
      right: 8px;
      border-left: none;
      border-top: none;
    }

    .panel-title {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.7rem;
      color: var(--cyan);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    /* ---- Mobile ventures section (below orb on mobile) ---- */
    .ventures-section-mobile {
      display: block;
    }

    @media (min-width: 1024px) {
      .ventures-section-mobile {
        display: none;
      }
    }

    /* ---- Agents working section ---- */
    .section {
      margin-bottom: 0;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      padding: 0;
    }

    .section-title {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-weight: 700;
      font-size: 0.7rem;
      color: var(--cyan);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .section-count {
      font-size: 0.65rem;
      color: var(--cyan);
      background: transparent;
      padding: 0;
      border: none;
      font-weight: 700;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    /* ---- Agent activity cards ---- */
    .agent-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .agent-card {
      background: rgba(32, 32, 58, 0.5);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      display: flex;
      gap: 10px;
      align-items: center;
      font-size: 0.75rem;
    }

    .agent-status {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .agent-status.working {
      background: var(--sage);
      box-shadow: 0 0 8px rgba(139, 168, 136, 0.7);
      animation: pulse 1.8s ease-in-out infinite;
    }

    .agent-status.idle {
      background: var(--text-faint);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    .agent-info {
      flex: 1;
      min-width: 0;
    }

    .agent-name {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-weight: 700;
      font-size: 0.75rem;
      color: var(--blush);
      letter-spacing: 0.01em;
      text-transform: uppercase;
    }

    .agent-task {
      font-size: 0.7rem;
      color: var(--text-dim);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ---- Company tile section (ventures panel) ---- */
    .ventures-panel {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .company-tile {
      background: rgba(32, 32, 58, 0.5);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .company-tile:active {
      transform: scale(0.98);
      background: var(--surface-hover);
    }

    .company-tile-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 8px;
    }

    .company-name {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-weight: 700;
      font-size: 0.8rem;
      color: var(--cyan);
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .company-status {
      font-size: 0.65rem;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    .company-stat {
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-bottom: 3px;
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }

    .company-stat-label {
      color: var(--text-faint);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    .company-stat-value {
      color: var(--cyan);
      font-weight: 700;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    /* ---- Pending merges ---- */
    .merge-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .merge-card {
      background: rgba(32, 32, 58, 0.5);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 11px 12px;
      display: flex;
      gap: 10px;
      align-items: center;
      transition: all 0.15s;
    }

    .merge-card:active {
      border-color: var(--border-hover);
      background: var(--surface-hover);
    }

    .merge-info {
      flex: 1;
      min-width: 0;
    }

    .merge-msg {
      color: var(--blush);
      font-weight: 500;
      font-size: 0.8rem;
      line-height: 1.3;
      word-break: break-word;
      margin-bottom: 3px;
    }

    .merge-meta {
      color: var(--text-dim);
      font-size: 0.65rem;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .merge-sha {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      color: var(--cyan);
    }

    .merge-btn {
      background: var(--coral);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 12px;
      font-weight: 700;
      font-size: 0.7rem;
      cursor: pointer;
      transition: all 0.15s;
      min-width: 60px;
      flex-shrink: 0;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .merge-btn:active {
      background: var(--coral-deep);
      transform: scale(0.96);
    }

    .merge-btn[disabled] {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ---- Toast ---- */
    #toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(120%);
      background: var(--navy-mid);
      color: var(--blush);
      padding: 12px 18px;
      border-radius: 6px;
      border: 1px solid var(--border-hover);
      box-shadow: 0 0 16px rgba(91, 217, 230, 0.2);
      font-size: 0.8rem;
      transition: transform 0.25s ease-out;
      z-index: 50;
      max-width: 88vw;
      text-align: center;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    #toast.visible {
      transform: translateX(-50%) translateY(0);
    }

    #toast.err {
      border-color: var(--coral);
      color: var(--coral);
    }

    #toast.ok {
      border-color: var(--sage);
      color: var(--sage);
    }

    /* ---- Scan line animation ---- */
    @keyframes scanLine {
      0% {
        transform: translateY(-100%);
      }
      100% {
        transform: translateY(100vh);
      }
    }

    .page::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      animation: scanLine 20s linear infinite;
      z-index: 30;
      pointer-events: none;
      opacity: 0.4;
    }

    /* ---- Mobile responsive ---- */
    @media (max-width: 768px) {
      .page {
        grid-template-columns: 1fr;
      }

      .topbar {
        padding: 10px 14px;
        height: 50px;
      }

      .topbar-title {
        font-size: 0.95rem;
      }

      .center-column {
        padding: 60px 16px 20px;
        gap: 16px;
      }

      .orb-section {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <!-- Auth gate -->
  <div id="auth-gate">
    <h1>Jarvis</h1>
    <p>Shepard Ventures mission control — sign in as heath.</p>
    <input id="email" type="email" placeholder="email" autocomplete="email" value="heath.shepard@kw.com">
    <input id="password" type="password" placeholder="password" autocomplete="current-password">
    <button id="signin-btn">Sign in</button>
    <div class="err" id="auth-err"></div>
  </div>

  <!-- Main app -->
  <div id="app">
    <!-- Top bar (fixed, full-width) -->
    <div class="topbar">
      <div style="display: flex; align-items: center; gap: 8px;">
        <div class="topbar-system">
          <div class="topbar-system-dot"></div>
          <span>SYSTEM ONLINE</span>
        </div>
      </div>
      <div class="topbar-title">SHEPARD VENTURES</div>
      <div class="topbar-time" id="topbar-time"></div>
    </div>

    <!-- 3-column layout -->
    <div class="page">
      <!-- LEFT PANEL: Ventures (desktop only) -->
      <div class="sidebar-left">
        <div class="hud-panel" id="ventures-panel-left-outer">
          <div class="panel-title">VENTURES</div>
          <div class="ventures-panel" id="ventures-panel-left"></div>
        </div>
      </div>

      <!-- CENTER: Orb + Ventures mobile -->
      <div class="center-column">
        <!-- Orb hero -->
        <div class="orb-section">
          <div class="orb-status" id="orb-status">STANDING BY</div>
          <div id="orb-container"></div>
          <div class="orb-kpis" id="orb-kpis"></div>
          <div class="orb-tap-hint" id="orb-hint">ENGAGE — TAP TO TALK</div>
        </div>

        <!-- Ventures section (mobile only) -->
        <div class="ventures-section-mobile">
          <div class="hud-panel" id="ventures-panel-mobile-outer">
            <div class="panel-title">VENTURES</div>
            <div class="ventures-panel" id="ventures-panel-mobile"></div>
          </div>
        </div>

        <!-- Agents working -->
        <div class="section hud-panel" id="section-agents">
          <div class="section-head">
            <div class="section-title">AGENTS WORKING</div>
            <div class="section-count" id="agent-count">0</div>
          </div>
          <div id="agent-list" class="agent-list"></div>
        </div>

        <!-- Pending merges -->
        <div class="section hud-panel" id="section-merges">
          <div class="section-head">
            <div class="section-title">PENDING MERGES</div>
            <div class="section-count" id="merge-count">0</div>
          </div>
          <div id="merge-list" class="merge-list"></div>
        </div>
      </div>

      <!-- RIGHT PANEL: Agent activity (desktop only) -->
      <div class="sidebar-right">
        <div class="hud-panel" id="activity-panel-right">
          <div class="panel-title">ACTIVITY LOG</div>
          <div id="activity-list" class="agent-list"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    let supabase = null;
    let _token = null;
    const _confirming = new Set();

    // Time display (24-hour format like Iron Man HUD)
    function updateTime() {
      const now = new Date();
      const pad = (n) => String(n).padStart(2, '0');
      const timeStr = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
      const tzStr = 'CDT';
      document.getElementById('topbar-time').textContent = `${timeStr} ${tzStr}`;
    }
    setInterval(updateTime, 1000);
    updateTime();

    // Orb SVG with concentric rotating rings
    function initOrb() {
      const container = document.getElementById('orb-container');
      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.setAttribute('viewBox', '0 0 280 280');
      svg.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
      svg.style.width = '100%';
      svg.style.height = '100%';

      const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');

      // Radial gradient for orb
      const radialGradient = document.createElementNS('http://www.w3.org/2000/svg', 'radialGradient');
      radialGradient.setAttribute('id', 'orbGrad');
      radialGradient.setAttribute('cx', '50%');
      radialGradient.setAttribute('cy', '50%');
      radialGradient.setAttribute('r', '50%');

      const stop1 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
      stop1.setAttribute('offset', '0%');
      stop1.setAttribute('stop-color', '#C9A96E');
      stop1.setAttribute('stop-opacity', '0.95');

      const stop2 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
      stop2.setAttribute('offset', '100%');
      stop2.setAttribute('stop-color', '#E8836B');
      stop2.setAttribute('stop-opacity', '0.85');

      radialGradient.appendChild(stop1);
      radialGradient.appendChild(stop2);

      // Glow filter
      const filter = document.createElementNS('http://www.w3.org/2000/svg', 'filter');
      filter.setAttribute('id', 'orbGlow');
      const feGaussianBlur = document.createElementNS('http://www.w3.org/2000/svg', 'feGaussianBlur');
      feGaussianBlur.setAttribute('stdDeviation', '8');
      const feMerge = document.createElementNS('http://www.w3.org/2000/svg', 'feMerge');
      const feMergeNode1 = document.createElementNS('http://www.w3.org/2000/svg', 'feMergeNode');
      feMergeNode1.setAttribute('in', 'SourceGraphic');
      feMerge.appendChild(feMergeNode1);
      filter.appendChild(feGaussianBlur);
      filter.appendChild(feMerge);

      defs.appendChild(radialGradient);
      defs.appendChild(filter);
      svg.appendChild(defs);

      const style = document.createElement('style');
      style.textContent = `
        @keyframes ring1Rotate {
          from { transform: rotate(0deg); }
          to { transform: rotate(360deg); }
        }
        @keyframes ring2Rotate {
          from { transform: rotate(360deg); }
          to { transform: rotate(0deg); }
        }
        @keyframes ring3Rotate {
          from { transform: rotate(0deg); }
          to { transform: rotate(360deg); }
        }
        @keyframes orbPulse {
          0%, 100% { r: 50px; opacity: 0.9; }
          50% { r: 53px; opacity: 0.95; }
        }
      `;
      svg.appendChild(style);

      // Create a group for rings
      const ringsGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      ringsGroup.setAttribute('transform', 'translate(140, 140)');

      // Ring 1 (outer, cyan, slowest, clockwise)
      const ring1 = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      ring1.setAttribute('cx', '0');
      ring1.setAttribute('cy', '0');
      ring1.setAttribute('r', '130');
      ring1.setAttribute('fill', 'none');
      ring1.setAttribute('stroke', '#5BD9E6');
      ring1.setAttribute('stroke-width', '1.5');
      ring1.setAttribute('opacity', '0.3');
      const ring1Group = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      ring1Group.style.animation = 'ring1Rotate 20s linear infinite';
      ring1Group.setAttribute('transform', 'translate(140, 140)');
      ring1Group.appendChild(ring1);

      // Ring 2 (middle, cyan, faster, counter-clockwise)
      const ring2 = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      ring2.setAttribute('cx', '0');
      ring2.setAttribute('cy', '0');
      ring2.setAttribute('r', '100');
      ring2.setAttribute('fill', 'none');
      ring2.setAttribute('stroke', '#5BD9E6');
      ring2.setAttribute('stroke-width', '1.5');
      ring2.setAttribute('opacity', '0.5');
      const ring2Group = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      ring2Group.style.animation = 'ring2Rotate 12s linear infinite';
      ring2Group.setAttribute('transform', 'translate(140, 140)');
      ring2Group.appendChild(ring2);

      // Ring 3 (inner, cyan, moderate, clockwise)
      const ring3 = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      ring3.setAttribute('cx', '0');
      ring3.setAttribute('cy', '0');
      ring3.setAttribute('r', '70');
      ring3.setAttribute('fill', 'none');
      ring3.setAttribute('stroke', '#5BD9E6');
      ring3.setAttribute('stroke-width', '1');
      ring3.setAttribute('opacity', '0.4');
      const ring3Group = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      ring3Group.style.animation = 'ring3Rotate 16s linear infinite';
      ring3Group.setAttribute('transform', 'translate(140, 140)');
      ring3Group.appendChild(ring3);

      svg.appendChild(ring1Group);
      svg.appendChild(ring2Group);
      svg.appendChild(ring3Group);

      // Central orb
      const orbGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      orbGroup.setAttribute('transform', 'translate(140, 140)');

      const orb = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      orb.setAttribute('cx', '0');
      orb.setAttribute('cy', '0');
      orb.setAttribute('r', '50');
      orb.setAttribute('fill', 'url(#orbGrad)');
      orb.setAttribute('filter', 'url(#orbGlow)');
      orb.style.animation = 'orbPulse 2.5s ease-in-out infinite';

      orbGroup.appendChild(orb);
      svg.appendChild(orbGroup);

      container.appendChild(svg);

      // Tap handler
      container.style.cursor = 'pointer';
      container.addEventListener('click', () => {
        toast('Voice coming soon', 'ok');
      });
    }

    // Create KPI badges around orb
    function initOrbKPIs() {
      const kpisContainer = document.getElementById('orb-kpis');
      if (!kpisContainer) return;
      kpisContainer.innerHTML = '';

      const kpis = [
        { label: 'AGENTS', value: '0', pos: 'top: -20px; left: 50%; transform: translateX(-50%);' },
        { label: 'MRR', value: '$349', pos: 'top: 50%; right: -80px; transform: translateY(-50%);' },
        { label: 'MERGES', value: '0', pos: 'bottom: -20px; left: 50%; transform: translateX(-50%);' },
        { label: 'BUGS', value: '0', pos: 'top: 50%; left: -80px; transform: translateY(-50%);' }
      ];

      kpis.forEach(kpi => {
        const badge = document.createElement('div');
        badge.className = 'kpi-badge';
        badge.style.cssText = kpi.pos;
        badge.innerHTML = `
          <div class="kpi-badge-label">${kpi.label}</div>
          <div class="kpi-badge-value">${kpi.value}</div>
        `;
        kpisContainer.appendChild(badge);
      });
    }

    function toast(msg, kind = '') {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = '';
      el.classList.add('visible');
      if (kind) el.classList.add(kind);
      clearTimeout(toast._t);
      toast._t = setTimeout(() => { el.classList.remove('visible'); }, 3500);
    }

    async function authFetch(url, init = {}) {
      return fetch(url, {
        ...init,
        headers: {
          'Authorization': `Bearer ${_token}`,
          'Content-Type': 'application/json',
          ...(init.headers || {}),
        },
      });
    }

    function showError(msg) {
      const el = document.getElementById('auth-err');
      if (el) el.textContent = msg || '';
    }

    function showLogin() {
      document.getElementById('auth-gate').classList.add('visible');
      document.getElementById('app').classList.remove('visible');
    }

    function revealApp(token) {
      _token = token;
      document.getElementById('auth-gate').classList.remove('visible');
      document.getElementById('app').classList.add('visible');
      initOrb();
      initOrbKPIs();
      refresh();
    }

    async function bootstrap() {
      let config;
      try {
        config = await fetch('/api/config').then(r => r.json());
      } catch {
        showError('Could not load config.');
        showLogin();
        return;
      }
      if (!config.supabaseUrl || !config.supabaseKey) {
        showError('Supabase env missing.');
        showLogin();
        return;
      }
      supabase = createClient(config.supabaseUrl, config.supabaseKey, {
        auth: {
          persistSession: true,
          autoRefreshToken: true,
          detectSessionInUrl: false,
          storage: window.localStorage,
          storageKey: 'jarvis.auth.token',
          flowType: 'pkce',
        },
      });
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) { showLogin(); return; }
      revealApp(session.access_token);
    }

    async function refresh() {
      try {
        await Promise.all([loadAgents(), loadCompanies(), loadMerges()]);
      } catch (err) {
        console.error('Refresh error:', err);
        toast('Refresh failed', 'err');
      }
    }

    async function loadAgents() {
      const { data, error } = await supabase
        .from('agent_activity')
        .select('agent_name, status, task_summary')
        .order('agent_name');
      if (error) throw error;

      const agents = data || [];
      document.getElementById('agent-count').textContent = agents.length;

      // Render center panel
      const agentList = document.getElementById('agent-list');
      agentList.innerHTML = '';
      agents.forEach(agent => {
        const card = document.createElement('div');
        card.className = 'agent-card';
        const statusClass = agent.status === 'working' ? 'working' : 'idle';
        card.innerHTML = `
          <div class="agent-status ${statusClass}"></div>
          <div class="agent-info">
            <div class="agent-name">${agent.agent_name || 'Unknown'}</div>
            <div class="agent-task">${agent.task_summary || 'idle'}</div>
          </div>
        `;
        agentList.appendChild(card);
      });

      // Render right panel (activity log) - show last 5 agents
      const activityList = document.getElementById('activity-list');
      if (activityList) {
        activityList.innerHTML = '';
        agents.slice(0, 5).forEach(agent => {
          const card = document.createElement('div');
          card.className = 'agent-card';
          const statusClass = agent.status === 'working' ? 'working' : 'idle';
          card.innerHTML = `
            <div class="agent-status ${statusClass}"></div>
            <div class="agent-info">
              <div class="agent-name">${agent.agent_name || 'Unknown'}</div>
              <div class="agent-task">${agent.task_summary || 'idle'}</div>
            </div>
          `;
          activityList.appendChild(card);
        });
      }
    }

    async function loadCompanies() {
      const companies = [
        {
          name: 'DOSSIE',
          status: 'Operational',
          stats: [
            { label: 'MRR', value: '$349' },
            { label: 'Founding', value: '12/50' }
          ]
        },
        {
          name: 'PARALEGAL',
          status: 'Research',
          stats: [
            { label: 'Partner', value: 'Joshua' }
          ]
        },
        {
          name: 'AGENTS',
          status: 'Pre-launch',
          stats: [
            { label: 'Beachhead', value: 'Travel' }
          ]
        }
      ];

      const renderVenturesPanel = (panelId) => {
        const panel = document.getElementById(panelId);
        if (!panel) return;
        panel.innerHTML = '';

        companies.forEach(comp => {
          const card = document.createElement('div');
          card.className = 'company-tile';
          card.innerHTML = `
            <div class="company-tile-header">
              <div class="company-name">${comp.name}</div>
              <div class="company-status">${comp.status}</div>
            </div>
            ${comp.stats.map(s => `
              <div class="company-stat">
                <div class="company-stat-label">${s.label}</div>
                <div class="company-stat-value">${s.value}</div>
              </div>
            `).join('')}
          `;
          panel.appendChild(card);
        });
      };

      renderVenturesPanel('ventures-panel-left');
      renderVenturesPanel('ventures-panel-mobile');
    }

    async function loadMerges() {
      // V1: stub. Would fetch from GitHub API with GITHUB_TOKEN.
      // For now, show placeholder.
      const mergeList = document.getElementById('merge-list');
      mergeList.innerHTML = '';
      document.getElementById('merge-count').textContent = 0;
    }

    // Init on load
    document.addEventListener('DOMContentLoaded', bootstrap);
    document.getElementById('signin-btn')?.addEventListener('click', async () => {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      if (!email || !password) {
        showError('Email and password required.');
        return;
      }
      try {
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) throw error;
        revealApp(data.session.access_token);
      } catch (err) {
        showError(err.message || 'Sign in failed.');
      }
    });
  </script>
</body>
</html>
