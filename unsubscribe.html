<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unsubscribe · Dossie</title>
<meta name="description" content="Manage your email preferences.">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
 --bg: #FDFCFA; --bg-warm: #F9F6F1; --bg-card: #FFFFFF;
 --border: #E8E2D9; --border-light: #F0EBE3;
 --text-primary: #2D2A26; --text-secondary: #7A7468; --text-light: #A39E94;
 --blush: #D4A0A0; --blush-light: #F2E4E4; --blush-deep: #C08080;
 --sage: #8BA888; --sage-light: #E4EDE2; --sage-deep: #6B8E68;
 --gold: #C9A84C;
}
html { scroll-behavior: smooth; }
body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-primary); -webkit-font-smoothing: antialiased; line-height: 1.7; }

nav { position: fixed; top: 0; left: 0; right: 0; padding: 14px 28px; display: flex; justify-content: space-between; align-items: center; z-index: 100; background: rgba(253,252,250,0.92); backdrop-filter: blur(24px); border-bottom: 1px solid var(--border-light); }
.nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
.nav-mark { width: 38px; height: 38px; border-radius: 12px; background: linear-gradient(135deg, var(--blush) 0%, var(--sage) 100%); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 15px; color: #fff; font-family: 'Cormorant Garamond', serif; }
.nav-name { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.3px; }

main { max-width: 480px; margin: 0 auto; padding: 140px 28px 80px; }
h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(32px, 6vw, 48px); font-weight: 600; line-height: 1.05; letter-spacing: -1px; color: var(--text-primary); margin-bottom: 8px; }
.subhead { font-size: 16px; color: var(--text-secondary); margin-bottom: 32px; }

.form-group { margin-bottom: 24px; }
label { display: block; font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 8px; }
input, select { width: 100%; padding: 12px 14px; font-size: 15px; border: 1px solid var(--border); border-radius: 10px; font-family: 'Plus Jakarta Sans', sans-serif; color: var(--text-primary); background: var(--bg-card); }
input:focus, select:focus { outline: none; border-color: var(--sage); box-shadow: 0 0 0 3px var(--sage-light); }
input::placeholder { color: var(--text-light); }

.reason-group { margin-top: 24px; }
.reason-label { display: block; font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 8px; }

button { width: 100%; padding: 14px 18px; font-size: 15px; font-weight: 600; border: none; border-radius: 10px; background: var(--sage); color: #fff; cursor: pointer; transition: background 0.2s; font-family: 'Plus Jakarta Sans', sans-serif; }
button:hover { background: var(--sage-deep); }
button:disabled { background: var(--text-light); cursor: not-allowed; opacity: 0.6; }

.error { color: #C84B31; font-size: 14px; margin-top: 8px; }
.success { display: none; text-align: center; padding: 40px 0; }
.success h2 { font-family: 'Cormorant Garamond', serif; font-size: 28px; color: var(--sage); margin-bottom: 12px; }
.success p { font-size: 15px; color: var(--text-secondary); }

@media (max-width: 560px) {
 main { padding: 120px 22px 60px; }
 h1 { font-size: 28px; }
}
</style>
</head>
<body>

<nav>
 <a href="/" class="nav-logo">
  <div class="nav-mark">D</div>
  <span class="nav-name">Dossie</span>
 </a>
</nav>

<main>
 <div id="form-container">
  <h1>Unsubscribe</h1>
  <p class="subhead">We won't email you again from this list.</p>

  <form id="unsubscribe-form">
   <div class="form-group">
    <label for="email">Email address</label>
    <input type="email" id="email" name="email" placeholder="you@example.com" required>
    <div id="email-error" class="error"></div>
   </div>

   <div class="reason-group">
    <label for="reason" class="reason-label">Why are you unsubscribing? (optional)</label>
    <select id="reason" name="reason">
     <option value="">— Select a reason —</option>
     <option value="too_many">Too many emails</option>
     <option value="not_interested">Not interested</option>
     <option value="wrong_audience">Wrong audience for my business</option>
     <option value="other">Other</option>
    </select>
   </div>

   <button type="submit" id="submit-btn">Unsubscribe</button>
  </form>
 </div>

 <div id="success-container" class="success">
  <h2>You're unsubscribed</h2>
  <p id="success-email"></p>
 </div>
</main>

<script>
(function() {
  const params = new URLSearchParams(window.location.search);
  const emailParam = params.get('email');
  if (emailParam) {
    document.getElementById('email').value = decodeURIComponent(emailParam);
  }

  document.getElementById('unsubscribe-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const reason = document.getElementById('reason').value || null;
    const errorEl = document.getElementById('email-error');
    const submitBtn = document.getElementById('submit-btn');

    errorEl.textContent = '';

    if (!email) {
      errorEl.textContent = 'Email is required.';
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Unsubscribing...';

    try {
      const res = await fetch('/api/unsubscribe', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, reason }),
      });

      if (!res.ok) {
        const data = await res.json();
        errorEl.textContent = data.error || 'An error occurred. Please try again.';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Unsubscribe';
        return;
      }

      document.getElementById('form-container').style.display = 'none';
      document.getElementById('success-container').style.display = 'block';
      document.getElementById('success-email').textContent = email + ' won\'t receive any more cold-outreach emails from Heath Shepard / Dossie LLC.';
    } catch (err) {
      errorEl.textContent = 'Network error. Please try again.';
      submitBtn.disabled = false;
      submitBtn.textContent = 'Unsubscribe';
    }
  });
})();
</script>

</body>
</html>
