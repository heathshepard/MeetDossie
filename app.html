<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enter Dossie</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #FDFCFA; --bg-warm: #F9F6F1; --card: rgba(255,255,255,0.94);
  --border: #E8E2D9; --border-light: #F0EBE3;
  --text: #2D2A26; --text-soft: #7A7468; --text-light: #A39E94;
  --blush: #D4A0A0; --blush-deep: #C08080;
  --sage: #8BA888; --sage-light: #E4EDE2; --sage-deep: #6B8E68;
  --red: #D95C52;
}
body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: linear-gradient(180deg, #FDFCFA 0%, #F7F1EC 100%);
  color: var(--text);
  min-height: 100vh;
}
.page { min-height: 100vh; padding: 28px; display: flex; flex-direction: column; }
.nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 40px; }
.brand { display: inline-flex; align-items: center; gap: 10px; text-decoration: none; color: inherit; }
.mark { width: 40px; height: 40px; border-radius: 12px; display: grid; place-items: center; background: linear-gradient(135deg, var(--blush) 0%, var(--sage) 100%); color: white; font-family: 'Cormorant Garamond', serif; font-size: 16px; font-weight: 700; }
.brand-name { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 600; }
.back-link { text-decoration: none; color: var(--text-soft); font-size: 14px; font-weight: 600; }
.main { flex: 1; display: grid; place-items: center; }
.card { width: 100%; max-width: 480px; background: var(--card); border: 1px solid var(--border); border-radius: 32px; box-shadow: 0 26px 80px rgba(26,26,46,0.08); padding: 42px; }
.eyebrow { font-size: 12px; text-transform: uppercase; letter-spacing: 1.8px; font-weight: 800; color: var(--blush-deep); margin-bottom: 18px; }
.title { font-family: 'Cormorant Garamond', serif; font-size: 48px; line-height: 0.98; letter-spacing: -1.5px; margin-bottom: 16px; }
.sub { color: var(--text-soft); font-size: 14px; line-height: 1.9; margin-bottom: 28px; }
.mode-tabs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 20px; }
.tab { padding: 10px; border: 1px solid var(--border); border-radius: 999px; background: white; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }
.tab.active { background: var(--sage-deep); color: white; border-color: var(--sage-deep); }
.field { display: flex; flex-direction: column; gap: 7px; margin-bottom: 14px; }
.field label { font-size: 12px; font-weight: 700; color: var(--text-soft); }
.field input { width: 100%; border: 1px solid var(--border); border-radius: 16px; padding: 14px 16px; font-size: 14px; font-family: inherit; color: var(--text); background: white; outline: none; }
.field input:focus { border-color: var(--sage); box-shadow: 0 0 0 4px rgba(139,168,136,0.12); }
.btn { display: flex; align-items: center; justify-content: center; width: 100%; border: none; border-radius: 999px; padding: 15px 18px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; margin-top: 8px; text-decoration: none; }
.btn-primary { background: var(--sage-deep); color: white; }
.btn-primary:disabled { opacity: 0.7; cursor: wait; }
.btn-secondary { background: white; border: 1px solid var(--border); color: var(--text); }
.notice { margin-top: 14px; padding: 12px 14px; border-radius: 14px; font-size: 13px; line-height: 1.6; display: none; }
.notice.error { background: #FCE8E6; color: var(--red); }
.notice.success { background: var(--sage-light); color: var(--sage-deep); }
.footer { margin-top: 28px; text-align: center; color: var(--text-light); font-size: 12px; }
</style>
</head>
<body>
<div class="page">
  <div class="nav">
    <a href="/" class="brand">
      <div class="mark">D</div>
      <span class="brand-name">Dossie</span>
    </a>
    <a href="/" class="back-link">← Back to homepage</a>
  </div>
  <main class="main">
    <div class="card" id="auth-card">
      <div class="eyebrow">Secure Access</div>
      <h1 class="title">Welcome back.</h1>
      <p class="sub">Sign in to enter your Dossie workspace.</p>
      <div class="mode-tabs">
        <button class="tab active" id="tab-magic" type="button">Magic Link</button>
        <button class="tab" id="tab-password" type="button">Password</button>
        <button class="tab" id="tab-signup" type="button">Sign Up</button>
      </div>
      <form id="auth-form">
        <div class="field">
          <label>Email</label>
          <input id="email" type="email" placeholder="you@example.com" autocomplete="email" required>
        </div>
        <div id="password-wrap" style="display:none;">
          <div class="field">
            <label>Password</label>
            <input id="password" type="password" placeholder="Enter password" autocomplete="current-password">
          </div>
        </div>
        <div id="confirm-wrap" style="display:none;">
          <div class="field">
            <label>Confirm Password</label>
            <input id="confirm" type="password" placeholder="Confirm password" autocomplete="new-password">
          </div>
        </div>
        <div id="notice" class="notice"></div>
        <button id="submit-btn" class="btn btn-primary" type="submit">Email Me a Magic Link</button>
        <a class="btn btn-secondary" href="/">Back to homepage</a>
      </form>
    </div>
    <div class="card" id="loading-card" style="display:none; text-align:center; padding: 60px 42px;">
      <h2 style="font-family:'Cormorant Garamond',serif; font-size:36px; margin-bottom:12px;">Welcome back.</h2>
      <p style="color:var(--text-soft);">Loading your workspace...</p>
    </div>
  </main>
  <div class="footer">Built by a Texas REALTOR® who needed a better way. © 2026 Dossie AI.</div>
</div>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

  // ── Only run auth logic if we are on app.html ──
  if (window.location.pathname.includes('workspace')) {
    // Already in workspace, do nothing
  } else {

    const supabase = createClient(
      'https://pgwoitbdiyubjugwufhk.supabase.co',
      'sb_publishable_a3t_ACtLUtat2lEmodNvzg_0bm-eUqP',
      { auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true, flowType: 'pkce' } }
    );

    const authCard    = document.getElementById('auth-card');
    const loadingCard = document.getElementById('loading-card');
    const form        = document.getElementById('auth-form');
    const emailEl     = document.getElementById('email');
    const passwordEl  = document.getElementById('password');
    const confirmEl   = document.getElementById('confirm');
    const passwordWrap = document.getElementById('password-wrap');
    const confirmWrap  = document.getElementById('confirm-wrap');
    const submitBtn   = document.getElementById('submit-btn');
    const noticeEl    = document.getElementById('notice');
    const tabMagic    = document.getElementById('tab-magic');
    const tabPassword = document.getElementById('tab-password');
    const tabSignup   = document.getElementById('tab-signup');

    let mode = 'magic';
    let going = false;

    const notify = (msg, type='') => {
      noticeEl.textContent = msg;
      noticeEl.className = 'notice' + (type ? ' '+type : '');
      noticeEl.style.display = msg ? 'block' : 'none';
    };

    const goToWorkspace = () => {
      if (going) return;
      going = true;
      authCard.style.display = 'none';
      loadingCard.style.display = 'block';
      window.location.replace('/workspace.html');
    };

    const setMode = (m) => {
      mode = m;
      tabMagic.className    = 'tab' + (m==='magic'    ? ' active' : '');
      tabPassword.className = 'tab' + (m==='password' ? ' active' : '');
      tabSignup.className   = 'tab' + (m==='signup'   ? ' active' : '');
      passwordWrap.style.display = (m==='password'||m==='signup') ? 'block' : 'none';
      confirmWrap.style.display  = m==='signup' ? 'block' : 'none';
      submitBtn.textContent = m==='password' ? 'Sign In with Password' : m==='signup' ? 'Create Account' : 'Email Me a Magic Link';
      notify('');
    };

    tabMagic.onclick    = () => setMode('magic');
    tabPassword.onclick = () => setMode('password');
    tabSignup.onclick   = () => setMode('signup');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email    = emailEl.value.trim();
      const password = passwordEl.value;
      const confirm  = confirmEl.value;
      if (!email) { notify('Enter your email.', 'error'); return; }
      submitBtn.disabled = true;

      if (mode === 'signup') {
        if (!password) { notify('Enter a password.', 'error'); submitBtn.disabled=false; return; }
        if (password !== confirm) { notify('Passwords do not match.', 'error'); submitBtn.disabled=false; return; }
        submitBtn.textContent = 'Creating...';
        const { data, error } = await supabase.auth.signUp({ email, password });
        if (error) { notify(error.message, 'error'); submitBtn.disabled=false; submitBtn.textContent='Create Account'; return; }
        if (data?.session) { goToWorkspace(); return; }
        notify('Account created — check your email to confirm.', 'success');
        submitBtn.disabled=false;
        setMode('password');
        return;
      }

      if (mode === 'password') {
        if (!password) { notify('Enter your password.', 'error'); submitBtn.disabled=false; return; }
        submitBtn.textContent = 'Signing in...';
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) { notify(error.message, 'error'); submitBtn.disabled=false; submitBtn.textContent='Sign In with Password'; return; }
        goToWorkspace();
        return;
      }

      // magic link
      submitBtn.textContent = 'Sending...';
      const { error } = await supabase.auth.signInWithOtp({
        email,
        options: { emailRedirectTo: 'https://meetdossie.com/workspace.html' }
      });
      if (error) { notify(error.message, 'error'); submitBtn.disabled=false; submitBtn.textContent='Email Me a Magic Link'; return; }
      notify('Magic link sent — check your email.', 'success');
      submitBtn.disabled=false;
      submitBtn.textContent='Email Me a Magic Link';
    });

    // Check for existing session on load
    const { data } = await supabase.auth.getSession();
    if (data?.session) {
      goToWorkspace();
    }
  }
</script>
</body>
</html>
