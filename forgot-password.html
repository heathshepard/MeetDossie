<!DOCTYPE html>
<html lang="en">
<head>
<script>
(function() {
  var hash = window.location.hash || '';
  if (hash.indexOf('access_token=') !== -1 && hash.indexOf('type=recovery') !== -1) {
    window.location.replace('/set-password.html' + hash);
  }
  else if (hash.indexOf('access_token=') !== -1 && (hash.indexOf('type=invite') !== -1 || hash.indexOf('type=signup') !== -1)) {
    window.location.replace('/set-password.html' + hash);
  }
})();
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Your Dossie Password</title>
<meta name="description" content="Request a reset link for your Dossie account.">
<meta name="robots" content="noindex">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23E8927C'/><text y='.9em' font-size='90' x='10'>D</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #FDFCFA; --bg-warm: #F9F6F1; --bg-card: #FFFFFF;
  --border: #E8E2D9; --border-light: #F0EBE3;
  --text-primary: #2D2A26; --text-secondary: #7A7468; --text-light: #A39E94;
  --blush: #D4A0A0; --blush-light: #F2E4E4; --blush-deep: #C08080;
  --sage: #8FAF8F; --sage-light: #E4EDE2; --sage-deep: #6B8E68;
  --gold: #C9A84C; --gold-light: #F5EDD8; --gold-deep: #A48531;
  --error: #B85546;
}
html { scroll-behavior: smooth; }
body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-primary); -webkit-font-smoothing: antialiased; min-height: 100vh; display: flex; flex-direction: column; }

@keyframes fadeInUp { from { opacity: 0; transform: translateY(22px); } to { opacity: 1; transform: translateY(0); } }

.shell { flex: 1; display: flex; align-items: center; justify-content: center; padding: 64px 28px; position: relative; overflow: hidden; }
.shell::before { content: ''; position: absolute; top: -200px; right: -160px; width: 560px; height: 560px; background: radial-gradient(circle, var(--blush-light) 0%, transparent 65%); pointer-events: none; opacity: 0.85; }
.shell::after { content: ''; position: absolute; bottom: -200px; left: -120px; width: 540px; height: 540px; background: radial-gradient(circle, var(--gold-light) 0%, transparent 65%); pointer-events: none; opacity: 0.7; }

.card { position: relative; z-index: 1; max-width: 480px; width: 100%; background: var(--bg-card); border: 1px solid var(--border); border-radius: 32px; padding: 48px 44px; box-shadow: 0 30px 80px rgba(45,42,38,0.1); animation: fadeInUp 0.55s ease-out both; }
.mark-row { display: flex; justify-content: center; margin-bottom: 20px; }
.mark { width: 60px; height: 60px; border-radius: 18px; background: linear-gradient(135deg, var(--blush) 0%, var(--gold) 100%); display: flex; align-items: center; justify-content: center; font-family: 'Cormorant Garamond', serif; font-weight: 600; color: #fff; font-size: 28px; box-shadow: 0 12px 30px rgba(212,160,160,0.32); }
.eyebrow { font-size: 11px; letter-spacing: 2.2px; text-transform: uppercase; font-weight: 700; color: var(--gold-deep); margin-bottom: 14px; text-align: center; }
h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(32px, 4.6vw, 42px); font-weight: 600; line-height: 1.1; letter-spacing: -0.6px; color: var(--text-primary); text-align: center; }
.sub { margin: 14px auto 28px; max-width: 360px; color: var(--blush-deep); font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 18px; line-height: 1.5; text-align: center; }

.field { margin-bottom: 16px; }
.field-label { display: block; font-size: 12px; font-weight: 700; color: var(--text-secondary); letter-spacing: 0.4px; margin-bottom: 6px; }
.field-input { width: 100%; padding: 14px 16px; border: 1px solid var(--border); border-radius: 14px; font-size: 14px; font-family: inherit; color: var(--text-primary); background: #fff; transition: border-color 0.15s, box-shadow 0.15s; }
.field-input:focus { outline: none; border-color: var(--blush); box-shadow: 0 0 0 3px rgba(212,160,160,0.18); }

.cta { display: inline-flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 16px 22px; border-radius: 999px; border: none; background: var(--blush); color: #fff; font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer; box-shadow: 0 14px 32px rgba(212,160,160,0.28); transition: transform 0.15s, box-shadow 0.15s, background 0.15s; margin-top: 6px; }
.cta:hover:not(:disabled) { transform: translateY(-1px); background: var(--blush-deep); box-shadow: 0 18px 38px rgba(192,128,128,0.34); }
.cta:disabled { opacity: 0.6; cursor: not-allowed; }
.cta-arrow { transition: transform 0.15s; }
.cta:hover:not(:disabled) .cta-arrow { transform: translateX(3px); }

.alert { margin-top: 16px; padding: 12px 14px; border-radius: 12px; font-size: 13px; line-height: 1.55; display: none; }
.alert.is-visible { display: block; }
.alert.is-error { background: #FCE8E6; color: var(--error); border: 1px solid #F4C8C2; }
.alert.is-success { background: var(--sage-light); color: var(--sage-deep); border: 1px solid #C5DBC2; }
.alert.is-info { background: var(--gold-light); color: var(--gold-deep); border: 1px solid #E8DAA8; }

.aux-row { margin-top: 22px; text-align: center; font-size: 13px; color: var(--text-secondary); }
.aux-row a { color: var(--blush-deep); font-weight: 700; text-decoration: none; }
.aux-row a:hover { text-decoration: underline; }

footer { padding: 24px 28px; text-align: center; border-top: 1px solid var(--border-light); }
.footer-text { font-size: 13px; color: var(--text-light); }
.footer-text a { color: var(--text-secondary); text-decoration: none; }
.footer-text a:hover { color: var(--text-primary); }

@media (max-width: 600px) {
  .shell { padding: 48px 18px; }
  .card { padding: 36px 24px; border-radius: 24px; }
}
</style>
</head>
<body>

<main class="shell">
  <div class="card">
    <div class="mark-row"><div class="mark">D</div></div>
    <div class="eyebrow">DOSSIE</div>
    <h1>Reset your password</h1>
    <p class="sub">Tell us your email and we'll send a reset link.</p>

    <form id="reset-form" novalidate>
      <div class="field">
        <label class="field-label" for="reset-email">Email</label>
        <input class="field-input" id="reset-email" type="email" autocomplete="email" placeholder="you@meetdossie.com" required>
      </div>
      <button type="submit" class="cta" id="reset-submit">
        <span class="cta-label">Send Reset Link</span>
        <span class="cta-arrow">→</span>
      </button>
    </form>
    <div id="reset-alert" class="alert" role="status" aria-live="polite"></div>

    <p class="aux-row">Remembered it? <a href="/signin.html">Sign in</a></p>
  </div>
</main>

<footer>
  <div class="footer-text">
    Questions? <a href="mailto:heath@meetdossie.com">heath@meetdossie.com</a> · © 2026 Dossie AI
  </div>
</footer>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SUPABASE_URL = 'https://pgwoitbdiyubjugwufhk.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_a3t_ACtLUtat2lEmodNvzg_0bm-eUqP';

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: { persistSession: false, autoRefreshToken: false, detectSessionInUrl: false },
});

const form = document.getElementById('reset-form');
const emailField = document.getElementById('reset-email');
const submitBtn = document.getElementById('reset-submit');
const submitLabel = submitBtn.querySelector('.cta-label');
const alertBox = document.getElementById('reset-alert');

function setAlert(message, kind) {
  alertBox.textContent = message || '';
  alertBox.classList.remove('is-error', 'is-success', 'is-info', 'is-visible');
  if (message) {
    alertBox.classList.add('is-visible');
    if (kind) alertBox.classList.add('is-' + kind);
  }
}

form.addEventListener('submit', async (event) => {
  event.preventDefault();
  setAlert('', null);
  const email = (emailField.value || '').trim();
  if (!email || !/^.+@.+\..+$/.test(email)) {
    setAlert('Enter a valid email so we can send a reset link.', 'error');
    return;
  }
  submitBtn.disabled = true;
  submitLabel.textContent = 'Sending...';
  setAlert('Sending your reset link...', 'info');
  try {
    // Always show the same success message regardless of whether the email
    // is registered — do not leak account existence.
    await supabase.auth.resetPasswordForEmail(email, {
      redirectTo: 'https://meetdossie.com/set-password.html',
    });
    setAlert('If that email is registered, we just sent a reset link. Check your inbox.', 'success');
    submitLabel.textContent = 'Send Reset Link';
    submitBtn.disabled = false;
    form.reset();
  } catch (err) {
    console.error('[forgot-password] resetPasswordForEmail threw:', err);
    // Keep the response indistinguishable in the success path so we don't
    // leak that an email exists. Surface a generic problem only on a
    // network/transport failure.
    setAlert('If that email is registered, we just sent a reset link. Check your inbox.', 'success');
    submitLabel.textContent = 'Send Reset Link';
    submitBtn.disabled = false;
  }
});
</script>

</body>
</html>
