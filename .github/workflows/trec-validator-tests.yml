name: TREC 20-18 validator tests

# Runs Heath's hand-built regression suite (scripts/run-tests.js) plus the
# pipeline integration + retry-loop tests. No future change can silently
# break a golden case — CI will block the PR.
#
# Golden + broken cases live at scripts/golden-case-*.json and are NEVER
# regenerated by an agent. The validator at scripts/trec-validator.js is
# Heath's source of truth. Atlas wires them into the pipeline at
# api/_lib/trec-20-18-pipeline.js; tests run all three layers together.

on:
  push:
    branches: [main, staging]
    paths:
      - 'scripts/trec-validator.js'
      - 'scripts/trec-20-18-field-rules.json'
      - 'scripts/golden-case-*.json'
      - 'scripts/run-tests.js'
      - 'scripts/pipeline-integration-test.js'
      - 'scripts/pipeline-retry-test.js'
      - 'scripts/artifact-integrity-check.js'
      - 'api/_lib/trec-20-18-pipeline.js'
      - 'api/_lib/trec-validator.js'
      - 'api/_lib/trec-20-18-field-rules.json'
      - 'api/fill-form.js'
      - 'api/fill-forms-batch.js'
      - '.github/workflows/trec-validator-tests.yml'
  pull_request:
    branches: [main, staging]
    paths:
      - 'scripts/trec-validator.js'
      - 'scripts/trec-20-18-field-rules.json'
      - 'scripts/golden-case-*.json'
      - 'scripts/run-tests.js'
      - 'scripts/pipeline-integration-test.js'
      - 'scripts/pipeline-retry-test.js'
      - 'scripts/artifact-integrity-check.js'
      - 'api/_lib/trec-20-18-pipeline.js'
      - 'api/_lib/trec-validator.js'
      - 'api/_lib/trec-20-18-field-rules.json'
      - 'api/fill-form.js'
      - 'api/fill-forms-batch.js'

jobs:
  validator-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Artifact integrity (scripts/ source-of-truth == api/_lib/ deploy copies)
        run: node scripts/artifact-integrity-check.js

      # Heath's run-tests.js uses relative paths and must run from scripts/.
      - name: Standalone golden + broken regression (Heath's run-tests.js)
        working-directory: scripts
        run: node run-tests.js

      - name: Pipeline integration (legacy fv -> mapper -> validate)
        run: node scripts/pipeline-integration-test.js

      - name: Pipeline retry loop (self-correction; no fabrication)
        run: node scripts/pipeline-retry-test.js
