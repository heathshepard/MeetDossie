<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Shepard Ventures</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --blush: #F5E6E0;
      --blush-deep: #D4A0A0;
      --sage: #8BA888;
      --gold: #C9A96E;
      --navy: #1A1A2E;
      --coral: #E8836B;
      --surface: rgba(255, 255, 255, 0.04);
      --border: rgba(245, 230, 224, 0.10);
      --text-dim: rgba(245, 230, 224, 0.55);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100vh;
      background: var(--navy);
      color: var(--blush);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 16px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ---- Auth gate ---- */
    #auth-gate {
      display: none;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      padding: 24px;
      text-align: center;
    }
    #auth-gate.visible { display: flex; }
    #auth-gate p { color: var(--text-dim); font-size: 0.9rem; }

    /* ---- Shell ---- */
    #app { display: none; }
    #app.visible { display: block; }

    /* ---- Layout ---- */
    .page {
      max-width: 860px;
      margin: 0 auto;
      padding: 28px 18px 60px;
    }

    /* ---- Hero ---- */
    .hero {
      padding: 24px 0 20px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 28px;
    }
    .hero-title {
      font-family: "Cormorant Garamond", serif;
      font-weight: 600;
      font-size: clamp(2.1rem, 7vw, 3rem);
      color: var(--blush);
      letter-spacing: -0.01em;
      line-height: 1.1;
    }
    .hero-tagline {
      font-family: "Cormorant Garamond", serif;
      font-style: italic;
      color: var(--gold);
      font-size: 1.05rem;
      margin-top: 6px;
    }

    /* ---- Stat ticker ---- */
    .stat-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 24px;
      margin-top: 20px;
      align-items: baseline;
    }
    .stat-chip {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .stat-label {
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim);
      font-weight: 600;
    }
    .stat-value {
      font-family: "Cormorant Garamond", serif;
      font-size: 1.85rem;
      font-weight: 600;
      color: var(--gold);
      line-height: 1;
    }
    .stat-value.dim {
      color: var(--blush-deep);
      font-size: 1.5rem;
    }

    /* ---- Section headers ---- */
    .section-header {
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-header::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ---- Company cards ---- */
    .company-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
      margin-bottom: 32px;
    }
    .company-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }
    .company-card.live {
      border-color: rgba(139, 168, 136, 0.30);
    }
    .company-card.planning {
      opacity: 0.55;
    }
    .company-card-accent {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--coral), var(--gold));
      border-radius: 14px 14px 0 0;
    }
    .company-card.planning .company-card-accent {
      background: var(--border);
    }
    .company-name {
      font-family: "Cormorant Garamond", serif;
      font-size: 1.45rem;
      font-weight: 600;
      color: var(--blush);
      margin-bottom: 2px;
    }
    .company-tagline {
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-bottom: 16px;
    }
    .company-stats {
      display: flex;
      gap: 20px;
    }
    .company-stat-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .company-stat-val {
      font-family: "Cormorant Garamond", serif;
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--gold);
      line-height: 1;
    }
    .company-stat-lbl {
      font-size: 0.7rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-dim);
      font-weight: 600;
    }
    .company-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 9px;
      border-radius: 999px;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      position: absolute;
      top: 18px;
      right: 16px;
    }
    .company-badge.live {
      background: rgba(139, 168, 136, 0.18);
      color: var(--sage);
      border: 1px solid rgba(139, 168, 136, 0.35);
    }
    .company-badge.planning {
      background: rgba(245, 230, 224, 0.06);
      color: var(--text-dim);
      border: 1px solid var(--border);
    }
    .badge-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: currentColor;
    }

    /* ---- Agent strip ---- */
    .agent-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 32px;
    }
    .agent-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 9px;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--blush);
      white-space: nowrap;
    }
    .agent-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--text-dim);
      flex-shrink: 0;
    }
    .agent-dot.idle { background: var(--text-dim); }
    .agent-dot.active { background: var(--sage); box-shadow: 0 0 6px var(--sage); }
    .agent-dot.busy { background: var(--gold); box-shadow: 0 0 6px var(--gold); }
    .agent-dot.error { background: var(--coral); box-shadow: 0 0 6px var(--coral); }
    .agent-role {
      font-size: 0.72rem;
      color: var(--text-dim);
      margin-left: 2px;
    }

    /* ---- Footer ---- */
    .footer {
      margin-top: 36px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }
    .footer-text {
      font-size: 0.75rem;
      color: var(--text-dim);
    }
    .footer-burn {
      font-size: 0.75rem;
      color: var(--text-dim);
    }

    /* ---- Skeleton ---- */
    .skeleton {
      background: linear-gradient(90deg, rgba(245,230,224,0.06) 25%, rgba(245,230,224,0.10) 50%, rgba(245,230,224,0.06) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
      height: 1em;
      display: inline-block;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .skel-mrr { width: 80px; height: 1.85rem; }
    .skel-cust { width: 48px; height: 1.85rem; }
    .skel-stat { width: 56px; height: 1.5rem; }

    /* ---- Error banner ---- */
    .error-banner {
      display: none;
      margin-bottom: 18px;
      padding: 10px 14px;
      background: rgba(232, 131, 107, 0.12);
      border: 1px solid rgba(232, 131, 107, 0.30);
      border-radius: 8px;
      color: var(--coral);
      font-size: 0.85rem;
    }
    .error-banner.visible { display: block; }

    /* ---- Last-updated ---- */
    .updated-label {
      font-size: 0.72rem;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .refresh-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--sage);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .refresh-dot.ping { opacity: 1; }

    /* Safe-area on iPhone notch/home bar */
    body { padding-bottom: env(safe-area-inset-bottom, 0px); }

    /* ---- Tasks panel ---- */
    .tasks-header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .btn-new-task {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 13px;
      background: rgba(201, 169, 110, 0.14);
      border: 1px solid rgba(201, 169, 110, 0.35);
      border-radius: 7px;
      color: var(--gold);
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      letter-spacing: 0.03em;
    }
    .btn-new-task:hover { background: rgba(201, 169, 110, 0.24); }

    .task-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 32px;
    }
    .task-row {
      display: grid;
      grid-template-columns: auto 1fr auto auto;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .task-row:hover { border-color: rgba(245, 230, 224, 0.22); }
    .task-row.expanded { border-color: rgba(201, 169, 110, 0.30); }
    .task-agent-badge {
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 0.66rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: rgba(245, 230, 224, 0.08);
      color: var(--text-dim);
      border: 1px solid var(--border);
      white-space: nowrap;
    }
    .task-title-text {
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--blush);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .task-status-badge {
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .task-status-badge.pending    { background: rgba(245,230,224,0.08); color: var(--text-dim); border: 1px solid var(--border); }
    .task-status-badge.in_progress{ background: rgba(201,169,110,0.14); color: var(--gold);     border: 1px solid rgba(201,169,110,0.30); }
    .task-status-badge.blocked    { background: rgba(232,131,107,0.14); color: var(--coral);    border: 1px solid rgba(232,131,107,0.30); }
    .task-status-badge.completed  { background: rgba(139,168,136,0.14); color: var(--sage);     border: 1px solid rgba(139,168,136,0.30); }
    .task-age {
      font-size: 0.7rem;
      color: var(--text-dim);
      white-space: nowrap;
    }
    .task-detail {
      display: none;
      grid-column: 1 / -1;
      padding: 8px 0 4px;
      font-size: 0.82rem;
      color: var(--text-dim);
      border-top: 1px solid var(--border);
      margin-top: 6px;
    }
    .task-detail.open { display: block; }
    .task-detail-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    .btn-task-action {
      padding: 4px 11px;
      border-radius: 6px;
      font-size: 0.74rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--blush);
      transition: background 0.12s;
    }
    .btn-task-action:hover { background: rgba(245,230,224,0.08); }
    .btn-task-action.complete { border-color: rgba(139,168,136,0.40); color: var(--sage); }
    .btn-task-action.complete:hover { background: rgba(139,168,136,0.12); }
    .task-empty {
      padding: 16px;
      text-align: center;
      font-size: 0.82rem;
      color: var(--text-dim);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
    }

    /* ---- Task modal ---- */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(26, 26, 46, 0.82);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .modal-backdrop.open { display: flex; }
    .modal-box {
      background: #1e1e34;
      border: 1px solid rgba(245,230,224,0.15);
      border-radius: 16px;
      padding: 24px;
      width: 100%;
      max-width: 440px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-title {
      font-family: "Cormorant Garamond", serif;
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--blush);
      margin-bottom: 18px;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-bottom: 14px;
    }
    .form-label {
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim);
      font-weight: 600;
    }
    .form-input, .form-select, .form-textarea {
      background: rgba(245,230,224,0.05);
      border: 1px solid rgba(245,230,224,0.15);
      border-radius: 8px;
      padding: 9px 12px;
      color: var(--blush);
      font-size: 0.9rem;
      font-family: inherit;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      border-color: rgba(201,169,110,0.50);
    }
    .form-select option { background: #1e1e34; }
    .form-textarea { resize: vertical; min-height: 72px; }
    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 20px;
    }
    .btn-cancel {
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
    }
    .btn-submit {
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      background: rgba(201,169,110,0.20);
      border: 1px solid rgba(201,169,110,0.40);
      color: var(--gold);
    }
    .btn-submit:hover { background: rgba(201,169,110,0.32); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>

  <!-- Auth gate — shown only when not logged in -->
  <div id="auth-gate">
    <div style="font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:600;color:var(--gold);margin-bottom:4px;">SV</div>
    <div style="font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:var(--text-dim);margin-bottom:24px;letter-spacing:0.06em;">Shepard Ventures</div>
    <form id="login-form" style="width:100%;max-width:340px;display:flex;flex-direction:column;gap:16px;" onsubmit="return false;">
      <div class="form-group">
        <label class="form-label" for="login-email">Email</label>
        <input class="form-input" id="login-email" type="email" autocomplete="email" placeholder="heath@example.com" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="login-password">Password</label>
        <input class="form-input" id="login-password" type="password" autocomplete="current-password" placeholder="••••••••" required />
      </div>
      <button class="btn-submit" id="login-btn" type="submit" style="width:100%;padding:10px 18px;font-size:0.9rem;">Sign In</button>
      <div style="display:flex;align-items:center;gap:10px;margin:4px 0;">
        <div style="flex:1;height:1px;background:var(--border);"></div>
        <span style="font-size:0.72rem;color:var(--text-dim);">or</span>
        <div style="flex:1;height:1px;background:var(--border);"></div>
      </div>
      <button id="google-btn" type="button" onclick="signInWithGoogle()" style="width:100%;padding:10px 18px;font-size:0.9rem;background:rgba(255,255,255,0.06);border:1px solid rgba(245,230,224,0.18);border-radius:8px;color:var(--blush);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;font-family:inherit;" onmouseover="this.style.background='rgba(255,255,255,0.10)'" onmouseout="this.style.background='rgba(255,255,255,0.06)'">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615Z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18Z" fill="#34A853"/><path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332Z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58Z" fill="#EA4335"/></svg>
        Continue with Google
      </button>
      <div id="login-error" style="display:none;color:#e8836b;font-size:0.82rem;text-align:center;"></div>
    </form>
  </div>

  <!-- Main app shell — hidden until auth confirmed -->
  <div id="app">
    <div class="page">

      <!-- Hero -->
      <header class="hero">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;">
          <div>
            <h1 class="hero-title">Shepard Ventures</h1>
            <div class="hero-tagline">Build the rails. Run the portfolio.</div>
          </div>
          <button id="signout-btn" onclick="signOut()" style="margin-top:6px;padding:5px 12px;font-size:0.75rem;background:transparent;border:1px solid rgba(245,230,224,0.2);border-radius:6px;color:rgba(245,230,224,0.45);cursor:pointer;white-space:nowrap;font-family:inherit;" onmouseover="this.style.borderColor='rgba(245,230,224,0.4)';this.style.color='rgba(245,230,224,0.7)'" onmouseout="this.style.borderColor='rgba(245,230,224,0.2)';this.style.color='rgba(245,230,224,0.45)'">Sign out</button>
        </div>

        <div class="stat-bar">
          <div class="stat-chip">
            <span class="stat-label">Portfolio MRR</span>
            <span class="stat-value" id="stat-mrr"><span class="skeleton skel-mrr"></span></span>
          </div>
          <div class="stat-chip">
            <span class="stat-label">Customers</span>
            <span class="stat-value" id="stat-customers"><span class="skeleton skel-cust"></span></span>
          </div>
          <div class="stat-chip">
            <span class="stat-label">Monthly Burn</span>
            <span class="stat-value dim" id="stat-burn"><span class="skeleton skel-stat"></span></span>
            <span class="stat-footnote" id="burn-footnote" style="display:none;font-size:0.65rem;color:var(--text-dim);margin-top:2px;">Fixed only. Stripe fees + API usage additional.</span>
          </div>
          <div class="stat-chip">
            <span class="stat-label">Net</span>
            <span class="stat-value dim" id="stat-net"><span class="skeleton skel-stat"></span></span>
          </div>
        </div>
      </header>

      <!-- Error banner -->
      <div class="error-banner" id="error-banner"></div>

      <!-- Companies -->
      <section>
        <div class="section-header">Portfolio</div>
        <div class="company-grid" id="company-grid">
          <!-- Skeleton cards -->
          <div class="company-card">
            <div class="skeleton" style="width:100px;height:1.4rem;margin-bottom:8px;"></div>
            <div class="skeleton" style="width:70%;height:0.8rem;margin-bottom:18px;"></div>
            <div style="display:flex;gap:20px;">
              <div><div class="skeleton" style="width:60px;height:1.5rem;"></div></div>
              <div><div class="skeleton" style="width:40px;height:1.5rem;"></div></div>
            </div>
          </div>
          <div class="company-card planning">
            <div class="skeleton" style="width:130px;height:1.4rem;margin-bottom:8px;"></div>
            <div class="skeleton" style="width:65%;height:0.8rem;margin-bottom:18px;"></div>
          </div>
        </div>
      </section>

      <!-- Agents -->
      <section>
        <div class="section-header">Agents</div>
        <div class="agent-row" id="agent-row">
          <!-- Populated by JS -->
        </div>
      </section>

      <!-- Tasks -->
      <section>
        <div class="tasks-header-row">
          <div class="section-header" style="margin-bottom:0;flex:1;">Open Tasks</div>
          <button class="btn-new-task" id="btn-new-task">+ New Task</button>
        </div>
        <div class="task-list" id="task-list">
          <div class="task-empty">Loading tasks…</div>
        </div>
      </section>

      <!-- Footer -->
      <footer class="footer">
        <div class="updated-label">
          <span class="refresh-dot" id="refresh-dot"></span>
          <span id="updated-at">Loading…</span>
        </div>
        <div class="footer-burn" id="footer-burn"></div>
      </footer>

    </div><!-- /page -->
  </div><!-- /app -->

  <!-- New Task Modal -->
  <div class="modal-backdrop" id="task-modal">
    <div class="modal-box">
      <div class="modal-title">New Task</div>
      <div class="form-group">
        <label class="form-label" for="task-title">Title</label>
        <input class="form-input" id="task-title" type="text" placeholder="What needs to get done?" maxlength="200">
      </div>
      <div class="form-group">
        <label class="form-label" for="task-desc">Description (optional)</label>
        <textarea class="form-textarea" id="task-desc" placeholder="Context, links, acceptance criteria…"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label" for="task-agent">Assign to</label>
        <select class="form-select" id="task-agent">
          <option value="">-- Unassigned --</option>
          <option value="cole">Cole (Chief of Staff)</option>
          <option value="hadley">Hadley (General Counsel)</option>
          <option value="pierce">Pierce (Growth + CS)</option>
          <option value="atlas">Atlas (Platform Eng)</option>
          <option value="carter">Carter (Product Eng)</option>
          <option value="sage">Sage (Social Media)</option>
          <option value="content_verifier">Content Verifier (Fact Check)</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label" for="task-product">Company scope</label>
        <select class="form-select" id="task-product">
          <option value="dossie">Dossie</option>
          <option value="cross">Cross-portfolio</option>
          <option value="paralegal">Paralegal SaaS</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label" for="task-priority">Priority</label>
        <select class="form-select" id="task-priority">
          <option value="1">High (P1)</option>
          <option value="2">Medium-High (P2)</option>
          <option value="3" selected>Medium (P3)</option>
          <option value="4">Low (P4)</option>
          <option value="5">Someday (P5)</option>
        </select>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" id="task-cancel">Cancel</button>
        <button class="btn-submit" id="task-submit">Create Task</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const POLL_INTERVAL_MS = 30_000;
    let supabase = null;
    let pollTimer = null;

    // ---- Bootstrap ----
    async function bootstrap() {
      // 1. Fetch Supabase config (same pattern as studio.html)
      let config;
      try {
        config = await fetch('/api/config').then(r => r.json());
      } catch (e) {
        showError('Failed to load configuration. Please refresh.');
        document.getElementById('auth-gate').classList.add('visible');
        return;
      }

      supabase = createClient(config.supabaseUrl, config.supabaseKey, {
        auth: {
          persistSession: true,
          autoRefreshToken: true,
          detectSessionInUrl: true,
          storage: window.localStorage,
          storageKey: 'supabase.auth.token',
          flowType: 'pkce',
        },
      });

      // 2. Auth check
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) {
        showLoginForm();
        return;
      }

      // 3. Show app, start fetching
      revealApp(session.access_token);
    }

    // ---- Auth helpers ----
    function revealApp(token) {
      document.getElementById('auth-gate').classList.remove('visible');
      document.getElementById('app').classList.add('visible');
      loadOverview(token);
      startPolling(token);
    }

    function showLoginForm() {
      document.getElementById('auth-gate').classList.add('visible');
      const btn = document.getElementById('login-btn');
      const errEl = document.getElementById('login-error');

      document.getElementById('login-form').addEventListener('submit', async () => {
        const email = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;
        errEl.style.display = 'none';
        btn.disabled = true;
        btn.textContent = 'Signing in…';

        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) {
          errEl.textContent = error.message || 'Sign-in failed. Check your credentials.';
          errEl.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Sign In';
          return;
        }

        // Success — hide gate, show app
        revealApp(data.session.access_token);
      });
    }

    // ---- Overview fetch ----
    async function loadOverview(token) {
      try {
        const res = await fetch('/api/ventures/overview', {
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json',
          },
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({ error: 'Request failed' }));
          throw new Error(err.error || `HTTP ${res.status}`);
        }

        const data = await res.json();
        renderOverview(data);
        hideError();
        pingRefreshDot();
      } catch (e) {
        showError(`Dashboard error: ${e.message}`);
        console.error('[ventures] overview fetch failed', e);
      }
    }

    // ---- Render ----
    function renderOverview(d) {
      // Stat bar
      const mrr = d.totalMrrUsd ?? 0;
      const cust = d.totalCustomers ?? 0;
      // costs.totalFixed is the authoritative number; fall back to legacy burn field if API is stale
      const burn = d.costs?.totalFixed ?? d.burn?.monthlyFixedUsd ?? 149.41;
      const net = mrr - burn;

      setText('stat-mrr', `$${mrr.toLocaleString()}`);
      setText('stat-customers', cust.toString());
      setText('stat-burn', `$${burn.toFixed(2)}`);
      setText('stat-net', net >= 0 ? `$${net.toFixed(2)}` : `-$${Math.abs(net).toFixed(2)}`);

      // Show burn footnote now that we have live data
      const burnFootnote = document.getElementById('burn-footnote');
      if (burnFootnote) burnFootnote.style.display = 'block';

      document.getElementById('stat-net').style.color =
        net >= 0 ? 'var(--sage)' : 'var(--coral)';

      // Company cards
      const grid = document.getElementById('company-grid');
      if (d.companies && d.companies.length > 0) {
        grid.innerHTML = d.companies.map(co => renderCompanyCard(co)).join('');
      }

      // Agents
      const agentRow = document.getElementById('agent-row');
      const agentRoles = {
        cole:             'Chief of Staff',
        hadley:           'General Counsel',
        pierce:           'Growth + CS',
        atlas:            'Platform Eng',
        carter:           'Product Eng',
        sage:             'Social Media',
        content_verifier: 'Fact Check',
      };
      if (d.agents && d.agents.length > 0) {
        agentRow.innerHTML = d.agents.map(a => `
          <div class="agent-chip">
            <span class="agent-dot ${a.status || 'idle'}"></span>
            <span>${escHtml(a.displayName || capitalize(a.name))}</span>
            <span class="agent-role">${agentRoles[a.name] || ''}</span>
          </div>
        `).join('');
      } else {
        // Fallback if ventures_agents returned nothing
        const fallback = [
          { name: 'Cole',   role: 'Chief of Staff'  },
          { name: 'Hadley', role: 'General Counsel'  },
          { name: 'Pierce', role: 'Growth + CS'      },
          { name: 'Atlas',  role: 'Platform Eng'     },
          { name: 'Carter', role: 'Product Eng'      },
          { name: 'Sage',   role: 'Social Media'     },
        ];
        agentRow.innerHTML = fallback.map(a => `
          <div class="agent-chip">
            <span class="agent-dot idle"></span>
            <span>${a.name}</span>
            <span class="agent-role">${a.role}</span>
          </div>
        `).join('');
      }

      // Footer — full cost breakdown
      setText('updated-at', `Updated ${timeAgo(new Date(d.generatedAt))}`);
      const costs = d.costs;
      if (costs && costs.fixed) {
        const paidServices = costs.fixed.filter(s => s.amount > 0);
        const freeServices = costs.fixed.filter(s => s.amount === 0);
        const freeNames = freeServices.map(s => s.name).join(', ');
        const paidLine = paidServices
          .map(s => `${s.name} $${s.amount.toFixed(2)}`)
          .join(' + ');
        const footerEl = document.getElementById('footer-burn');
        if (footerEl) {
          footerEl.innerHTML =
            `<span style="color:var(--blush-deep);">Fixed: ${paidLine}</span>` +
            `<br><span style="opacity:0.55;">Free: ${freeNames}</span>` +
            `<br><span style="opacity:0.45;">Variable: Stripe fees + Anthropic API</span>`;
        }
      } else {
        setText('footer-burn', d.burn?.note || '');
      }
    }

    function renderCompanyCard(co) {
      const isLive = co.status === 'live';
      const badgeClass = isLive ? 'live' : 'planning';
      const badgeLabel = isLive ? 'Live' : 'Planning';
      const statsHtml = isLive
        ? `<div class="company-stats">
             <div class="company-stat-item">
               <span class="company-stat-val">$${(co.mrr ?? 0).toLocaleString()}</span>
               <span class="company-stat-lbl">MRR</span>
             </div>
             <div class="company-stat-item">
               <span class="company-stat-val">${co.customers ?? 0}</span>
               <span class="company-stat-lbl">Customers</span>
             </div>
             ${co.foundingSpots ? `
             <div class="company-stat-item">
               <span class="company-stat-val">${co.foundingSpots.taken}/${co.foundingSpots.total}</span>
               <span class="company-stat-lbl">Founding</span>
             </div>` : ''}
           </div>`
        : `<div style="font-size:0.8rem;color:var(--text-dim);padding-top:4px;">In development</div>`;

      return `
        <div class="company-card ${co.status}">
          <div class="company-card-accent"></div>
          <span class="company-badge ${badgeClass}">
            <span class="badge-dot"></span>${badgeLabel}
          </span>
          <div class="company-name">${escHtml(co.name)}</div>
          <div class="company-tagline">${escHtml(co.tagline || '')}</div>
          ${statsHtml}
        </div>`;
    }

    // ---- Polling ----
    function startPolling(token) {
      // Refresh Supabase session then poll
      pollTimer = setInterval(async () => {
        const { data: { session } } = await supabase.auth.getSession();
        if (!session) {
          clearInterval(pollTimer);
          window.location.href = '/welcome.html';
          return;
        }
        await loadOverview(session.access_token);
      }, POLL_INTERVAL_MS);
    }

    // ---- Helpers ----
    function setText(id, text) {
      const el = document.getElementById(id);
      if (el) el.textContent = text;
    }

    function capitalize(s) {
      return s ? s.charAt(0).toUpperCase() + s.slice(1) : '';
    }

    function escHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function timeAgo(date) {
      const secs = Math.floor((Date.now() - date.getTime()) / 1000);
      if (secs < 5) return 'just now';
      if (secs < 60) return `${secs}s ago`;
      const mins = Math.floor(secs / 60);
      if (mins < 60) return `${mins}m ago`;
      return `${Math.floor(mins / 60)}h ago`;
    }

    function showError(msg) {
      const el = document.getElementById('error-banner');
      el.textContent = msg;
      el.classList.add('visible');
    }

    function hideError() {
      document.getElementById('error-banner').classList.remove('visible');
    }

    function pingRefreshDot() {
      const dot = document.getElementById('refresh-dot');
      dot.classList.add('ping');
      setTimeout(() => dot.classList.remove('ping'), 600);
    }

    // ---- Tasks ----
    let _taskToken = null; // stored after bootstrap so tasks can auth

    async function loadTasks() {
      if (!_taskToken) return;
      try {
        const r = await fetch('/api/ventures/tasks?limit=15', {
          headers: { Authorization: `Bearer ${_taskToken}` },
        });
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        const { tasks } = await r.json();
        renderTasks(tasks || []);
      } catch (e) {
        console.error('[ventures/tasks] fetch failed', e);
        document.getElementById('task-list').innerHTML =
          '<div class="task-empty">Could not load tasks.</div>';
      }
    }

    function renderTasks(tasks) {
      const list = document.getElementById('task-list');
      if (!tasks.length) {
        list.innerHTML = '<div class="task-empty">No open tasks. Tap "+ New Task" to assign one.</div>';
        return;
      }
      list.innerHTML = tasks.map(t => renderTaskRow(t)).join('');
      // Attach expand toggles
      list.querySelectorAll('.task-row').forEach(row => {
        row.addEventListener('click', (e) => {
          if (e.target.closest('.btn-task-action')) return; // let action buttons handle their own clicks
          const detail = row.querySelector('.task-detail');
          if (!detail) return;
          const isOpen = detail.classList.toggle('open');
          row.classList.toggle('expanded', isOpen);
        });
      });
      // Attach action buttons
      list.querySelectorAll('.btn-task-action').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          const id = btn.dataset.id;
          const action = btn.dataset.action;
          await patchTask(id, action === 'complete' ? 'completed' : 'in_progress');
          await loadTasks();
        });
      });
    }

    function renderTaskRow(t) {
      const agentLabel = t.assigned_to
        ? t.assigned_to.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase())
        : 'Unassigned';
      const statusClass = t.status || 'pending';
      const statusLabel = {
        pending: 'Pending', in_progress: 'In Progress',
        blocked: 'Blocked', completed: 'Done',
      }[t.status] || t.status;
      const age = timeAgo(new Date(t.created_at));
      const descHtml = t.description
        ? `<div style="margin-bottom:6px;">${escHtml(t.description)}</div>`
        : '<div style="margin-bottom:6px;font-style:italic;">No description.</div>';
      const blockedHtml = t.blocked_reason
        ? `<div style="color:var(--coral);font-size:0.78rem;margin-bottom:6px;">Blocked: ${escHtml(t.blocked_reason)}</div>` : '';
      const actionBtns = t.status !== 'completed'
        ? `<button class="btn-task-action complete" data-id="${escHtml(t.id)}" data-action="complete">Mark Complete</button>
           ${t.status === 'pending' ? `<button class="btn-task-action" data-id="${escHtml(t.id)}" data-action="start">Start</button>` : ''}`
        : '';
      return `
        <div class="task-row">
          <span class="task-agent-badge">${escHtml(agentLabel)}</span>
          <span class="task-title-text">${escHtml(t.title)}</span>
          <span class="task-status-badge ${statusClass}">${escHtml(statusLabel)}</span>
          <span class="task-age">${escHtml(age)}</span>
          <div class="task-detail">
            ${descHtml}${blockedHtml}
            <div class="task-detail-actions">${actionBtns}</div>
          </div>
        </div>`;
    }

    async function patchTask(id, status) {
      if (!_taskToken) return;
      await fetch('/api/ventures/tasks', {
        method: 'PATCH',
        headers: { Authorization: `Bearer ${_taskToken}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, status }),
      });
    }

    // ---- Task modal ----
    function initTaskModal() {
      const modal = document.getElementById('task-modal');
      const btnOpen = document.getElementById('btn-new-task');
      const btnCancel = document.getElementById('task-cancel');
      const btnSubmit = document.getElementById('task-submit');

      btnOpen.addEventListener('click', () => modal.classList.add('open'));
      btnCancel.addEventListener('click', closeModal);
      modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });

      btnSubmit.addEventListener('click', async () => {
        const title = document.getElementById('task-title').value.trim();
        if (!title) { document.getElementById('task-title').focus(); return; }
        btnSubmit.disabled = true;
        btnSubmit.textContent = 'Creating…';
        try {
          const r = await fetch('/api/ventures/tasks', {
            method: 'POST',
            headers: { Authorization: `Bearer ${_taskToken}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({
              title,
              description: document.getElementById('task-desc').value.trim() || null,
              assigned_to: document.getElementById('task-agent').value || null,
              product: document.getElementById('task-product').value || 'dossie',
              priority: Number(document.getElementById('task-priority').value) || 3,
            }),
          });
          if (!r.ok) throw new Error(`HTTP ${r.status}`);
          closeModal();
          await loadTasks();
        } catch (e) {
          console.error('[ventures/tasks] create failed', e);
          btnSubmit.textContent = 'Error — retry';
        } finally {
          btnSubmit.disabled = false;
          if (btnSubmit.textContent === 'Creating…') btnSubmit.textContent = 'Create Task';
        }
      });
    }

    function closeModal() {
      const modal = document.getElementById('task-modal');
      modal.classList.remove('open');
      document.getElementById('task-title').value = '';
      document.getElementById('task-desc').value = '';
      document.getElementById('task-agent').value = '';
      document.getElementById('task-product').value = 'dossie';
      document.getElementById('task-priority').value = '3';
      document.getElementById('task-submit').textContent = 'Create Task';
      document.getElementById('task-submit').disabled = false;
    }

    // ---- Google OAuth ----
    async function signInWithGoogle() {
      const btn = document.getElementById('google-btn');
      btn.disabled = true;
      btn.textContent = 'Redirecting...';
      const { error } = await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.href },
      });
      if (error) {
        btn.disabled = false;
        btn.innerHTML = 'Continue with Google';
        const err = document.getElementById('login-error');
        err.textContent = error.message;
        err.style.display = 'block';
      }
    }
    window.signInWithGoogle = signInWithGoogle;

    // ---- Sign out ----
    async function signOut() {
      if (supabase) await supabase.auth.signOut();
      localStorage.clear();
      document.getElementById('app').classList.remove('visible');
      document.getElementById('auth-gate').classList.add('visible');
    }
    window.signOut = signOut;

    // ---- Start ----
    initTaskModal();
    bootstrap().then((token) => {
      // bootstrap returns the access token on success; use it for task API calls
      if (token) {
        _taskToken = token;
        loadTasks();
      }
    });
  </script>

</body>
</html>
