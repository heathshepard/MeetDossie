  <!-- ============================================================================
       JARVIS HUD V5 EARTH ORB — ported from today.html (V5 HUD), 2026-06-20.
       Rotating wireframe Earth with city lights (procedural fallback + NASA night-lights
       upgrade if available), atmosphere fresnel shell, shipping lanes, customer dots,
       starfield. Lives BEHIND the push-to-talk button (z-index:1; PTT is z-index:2).
       Mobile-friendly: clamped DPR, no post-processing bloom, lower sphere segment count.
       If three.js fails to load, the SVG fallback already in the DOM remains visible.
       ============================================================================ -->
  <script type="module">
    (async () => {
      const mount = document.getElementById('orb-earth');
      const orbWrap = document.querySelector('.orb-wrap');
      if (!mount) return;
      let THREE;
      try {
        THREE = await import('three');
      } catch (e) {
        console.warn('[jarvis-earth] three.js failed to load — keeping SVG fallback', e);
        return;
      }

      // ----- Renderer / Scene / Camera -----
      const isMobile = (window.innerWidth || 0) <= 900;
      const sphereWidthSegs  = isMobile ? 64 : 96;
      const sphereHeightSegs = isMobile ? 42 : 64;

      function getSize() {
        // Square canvas — match the parent's smaller dimension so the globe stays round.
        const w = mount.clientWidth || 360;
        const h = mount.clientHeight || w;
        const s = Math.max(140, Math.min(w, h));
        return { w: s, h: s };
      }

      const { w: w0, h: h0 } = getSize();
      const renderer = new THREE.WebGLRenderer({ antialias: !isMobile, alpha: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.setSize(w0, h0, false);
      renderer.setClearColor(0x000000, 0);
      mount.appendChild(renderer.domElement);

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
      camera.position.z = 3.2;

      // Lighting — dim ambient so emissive city-lights pop.
      scene.add(new THREE.AmbientLight(0xffffff, 0.20));
      const dirLight = new THREE.DirectionalLight(0xfff0d0, 0.55);
      dirLight.position.set(5, 3, 5);
      scene.add(dirLight);

      // ----- Starfield (subtle, fewer points on mobile) -----
      (function createStarfield() {
        const count = isMobile ? 400 : 900;
        const geo = new THREE.BufferGeometry();
        const positions = new Float32Array(count * 3);
        for (let i = 0; i < count * 3; i += 3) {
          positions[i]   = (Math.random() - 0.5) * 80;
          positions[i+1] = (Math.random() - 0.5) * 80;
          positions[i+2] = (Math.random() - 0.5) * 80;
        }
        geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const mat = new THREE.PointsMaterial({ color: 0x888899, size: 0.05, transparent: true, opacity: 0.55 });
        const stars = new THREE.Points(geo, mat);
        scene.add(stars);
        scene.userData.stars = stars;
      })();

      // ----- Procedural city-lights texture (immediate; NASA texture upgrades it if it loads) -----
      function makeProceduralCityLightsTexture() {
        const W = 1024, H = 512;
        const c = document.createElement('canvas');
        c.width = W; c.height = H;
        const ctx = c.getContext('2d');
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, W, H);
        const regions = [
          [-74, 40, 8, 1.0],   // NYC/Boston
          [-87, 41, 10, 0.7],  // Chicago
          [-118, 36, 9, 0.8],  // LA/SF/Seattle
          [-99, 19, 5, 0.5],   // Mexico City
          [-58, -27, 18, 0.6], // S. America
          [5, 50, 10, 1.0],    // W. Europe
          [12, 42, 8, 0.6],    // Italy/Spain
          [35, 53, 14, 0.5],   // Moscow/Warsaw
          [38, 32, 12, 0.7],   // Middle East
          [78, 22, 14, 0.9],   // India
          [105, 5, 16, 0.7],   // SE Asia
          [115, 30, 14, 1.0],  // China east coast
          [138, 36, 6, 0.9],   // Japan/Korea
          [3, 7, 8, 0.5],      // Africa west
          [32, 5, 18, 0.5],    // Africa east
          [148, -32, 8, 0.5],  // Australia east
        ];
        function lonLatToXY(lon, lat) {
          return [((lon + 180) / 360) * W, ((90 - lat) / 180) * H];
        }
        for (const [lon, lat, spread, weight] of regions) {
          const dotCount = Math.floor((isMobile ? 110 : 180) * weight);
          for (let i = 0; i < dotCount; i++) {
            const r = Math.pow(Math.random(), 1.5) * spread;
            const theta = Math.random() * Math.PI * 2;
            const dLon = r * Math.cos(theta);
            const dLat = r * Math.sin(theta) * 0.6;
            const [x, y] = lonLatToXY(lon + dLon, lat + dLat);
            const size = Math.random() * 1.4 + 0.4;
            const alpha = 0.55 + Math.random() * 0.45;
            ctx.fillStyle = `rgba(255, ${200 + Math.floor(Math.random()*40)}, ${110 + Math.floor(Math.random()*60)}, ${alpha})`;
            ctx.fillRect(x | 0, y | 0, size, size);
            if (Math.random() < 0.18) {
              ctx.fillStyle = `rgba(255, 210, 140, ${alpha * 0.25})`;
              ctx.fillRect((x|0)-1, (y|0)-1, 3, 3);
            }
          }
        }
        const tex = new THREE.CanvasTexture(c);
        tex.colorSpace = THREE.SRGBColorSpace;
        tex.anisotropy = 4;
        return tex;
      }

      // ----- Earth group: sphere + wireframe + atmosphere + customer dots -----
      const orb = new THREE.Group();
      orb.rotation.x = 0.18; // axial tilt for visual interest
      scene.add(orb);

      // Layer 1 — Earth sphere with night-lights emissive map.
      const proceduralLights = makeProceduralCityLightsTexture();
      const earthGeo = new THREE.SphereGeometry(1, sphereWidthSegs, sphereHeightSegs);
      const earthMat = new THREE.MeshStandardMaterial({
        color:           0x0a1428,
        emissive:        0xffd180,
        emissiveMap:     proceduralLights,
        emissiveIntensity: 2.4,
        roughness:       0.92,
        metalness:       0.0,
      });
      const earthMesh = new THREE.Mesh(earthGeo, earthMat);
      orb.add(earthMesh);

      // Upgrade to NASA night-lights texture if reachable (CORS-safe via threejs.org).
      try {
        const loader = new THREE.TextureLoader();
        loader.setCrossOrigin('anonymous');
        loader.load(
          'https://threejs.org/examples/textures/planets/earth_lights_2048.png',
          (tex) => {
            tex.colorSpace = THREE.SRGBColorSpace;
            tex.anisotropy = 8;
            earthMat.emissiveMap = tex;
            earthMat.emissiveIntensity = 1.9;
            earthMat.needsUpdate = true;
          },
          undefined,
          () => { /* keep procedural fallback */ }
        );
      } catch {}

      // Layer 2 — Cyan wireframe (parallels + meridians) — V5 spec calls for this on the Earth.
      (function addWireframe() {
        const mat = new THREE.LineBasicMaterial({
          color: 0x00d4ff,
          transparent: true,
          opacity: 0.28,
          blending: THREE.AdditiveBlending,
          depthWrite: false,
        });
        const radius = 1.005;
        const parallels = isMobile ? 8 : 10;
        const meridians = isMobile ? 12 : 16;
        // Parallels
        for (let i = 1; i < parallels; i++) {
          const lat = (i / parallels) * Math.PI - Math.PI / 2;
          const y = Math.sin(lat) * radius;
          const r = Math.cos(lat) * radius;
          const segs = 64;
          const pts = [];
          for (let j = 0; j <= segs; j++) {
            const a = (j / segs) * Math.PI * 2;
            pts.push(new THREE.Vector3(Math.cos(a) * r, y, Math.sin(a) * r));
          }
          const geo = new THREE.BufferGeometry().setFromPoints(pts);
          orb.add(new THREE.Line(geo, mat));
        }
        // Meridians
        for (let i = 0; i < meridians; i++) {
          const lon = (i / meridians) * Math.PI * 2;
          const segs = 48;
          const pts = [];
          for (let j = 0; j <= segs; j++) {
            const lat = (j / segs) * Math.PI - Math.PI / 2;
            pts.push(new THREE.Vector3(
              Math.cos(lat) * Math.cos(lon) * radius,
              Math.sin(lat) * radius,
              Math.cos(lat) * Math.sin(lon) * radius
            ));
          }
          const geo = new THREE.BufferGeometry().setFromPoints(pts);
          orb.add(new THREE.Line(geo, mat));
        }
      })();

      // Layer 3 — Atmosphere fresnel shell (BackSide additive cyan halo).
      (function addAtmosphere() {
        const shellGeo = new THREE.SphereGeometry(1.15, isMobile ? 48 : 64, isMobile ? 48 : 64);
        const shellMat = new THREE.ShaderMaterial({
          uniforms: { color: { value: new THREE.Color(0x00d4ff) } },
          vertexShader: `
            varying vec3 vNormal;
            varying vec3 vViewDir;
            void main() {
              vNormal = normalize(normalMatrix * normal);
              vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
              vViewDir = normalize(-mvPos.xyz);
              gl_Position = projectionMatrix * mvPos;
            }
          `,
          fragmentShader: `
            uniform vec3 color;
            varying vec3 vNormal;
            varying vec3 vViewDir;
            void main() {
              float fresnel = pow(1.0 - max(dot(vNormal, vViewDir), 0.0), 3.4);
              gl_FragColor = vec4(color, fresnel * 0.55);
            }
          `,
          transparent: true,
          blending: THREE.AdditiveBlending,
          side: THREE.BackSide,
          depthWrite: false,
        });
        orb.add(new THREE.Mesh(shellGeo, shellMat));
      })();

      // Layer 4 — Customer dots (Texas cluster) — V5 R6 polish.
      let customerDotsMat = null;
      (function addCustomerDots() {
        const sites = [
          { lon: -98.49, lat: 29.42, weight: 1.0 }, // San Antonio
          { lon: -97.74, lat: 30.27, weight: 0.9 }, // Austin
          { lon: -96.80, lat: 32.78, weight: 0.7 }, // Dallas
          { lon: -95.36, lat: 29.76, weight: 0.7 }, // Houston
          { lon: -97.33, lat: 32.75, weight: 0.5 }, // Fort Worth
          { lon: -98.62, lat: 30.40, weight: 0.4 }, // Boerne
        ];
        const c = document.createElement('canvas');
        c.width = 64; c.height = 64;
        const g = c.getContext('2d');
        const grad = g.createRadialGradient(32, 32, 0, 32, 32, 32);
        grad.addColorStop(0,    'rgba(120, 230, 255, 1.0)');
        grad.addColorStop(0.35, 'rgba(0, 212, 255, 0.55)');
        grad.addColorStop(1.0,  'rgba(0, 212, 255, 0)');
        g.fillStyle = grad;
        g.fillRect(0, 0, 64, 64);
        const dotTex = new THREE.CanvasTexture(c);
        customerDotsMat = new THREE.SpriteMaterial({
          map: dotTex,
          color: 0x00d4ff,
          transparent: true,
          blending: THREE.AdditiveBlending,
          depthWrite: false,
          opacity: 1.0,
        });
        function lonLatToVec3(lon, lat, r) {
          const phi = (90 - lat) * Math.PI / 180;
          const theta = (lon + 180) * Math.PI / 180;
          return new THREE.Vector3(
            -r * Math.sin(phi) * Math.cos(theta),
             r * Math.cos(phi),
             r * Math.sin(phi) * Math.sin(theta)
          );
        }
        for (const site of sites) {
          const sprite = new THREE.Sprite(customerDotsMat);
          sprite.position.copy(lonLatToVec3(site.lon, site.lat, 1.012));
          const s = 0.05 + site.weight * 0.045;
          sprite.scale.set(s, s, s);
          orb.add(sprite);
        }
      })();

      // Earth ready — fade out the static SVG fallback.
      if (orbWrap) orbWrap.classList.add('has-earth');

      // ----- Resize handling — canvas square, matches container -----
      function onResize() {
        const { w, h } = getSize();
        renderer.setSize(w, h, false);
        camera.aspect = 1;
        camera.updateProjectionMatrix();
      }
      window.addEventListener('resize', onResize);
      if (window.visualViewport) window.visualViewport.addEventListener('resize', onResize);
      window.addEventListener('orientationchange', () => setTimeout(onResize, 100));

      // ----- Animation loop — time-based, seamless infinite rotation (~30s per revolution) -----
      const clock = new THREE.Clock();
      let rafId = 0;
      let lastVisible = true;
      function animate() {
        rafId = requestAnimationFrame(animate);
        // Pause render when tab hidden — saves battery, mic, everything.
        if (document.hidden) { lastVisible = false; return; }
        if (!lastVisible) { clock.getDelta(); lastVisible = true; } // discard accumulated dt on resume
        const t = clock.getElapsedTime();
        // ~30s per revolution = 2π/30 ≈ 0.21 rad/s. V5 used 0.05; we boost slightly so
        // the rotation reads on first glance instead of feeling frozen.
        orb.rotation.y = t * 0.21;
        if (scene.userData.stars) {
          scene.userData.stars.rotation.y = t * 0.005;
          scene.userData.stars.rotation.x = t * 0.003;
        }
        if (customerDotsMat) {
          customerDotsMat.opacity = 0.55 + (Math.sin(t * 1.8) + 1) * 0.225;
        }
        renderer.render(scene, camera);
      }
      animate();

      // Release WebGL context on pagehide (PWA lifecycle hygiene).
      window.addEventListener('pagehide', () => {
        try { cancelAnimationFrame(rafId); } catch {}
        try { renderer.dispose(); } catch {}
      });
    })();
  </script>

  <script type="module">
    // ============================================================================
    // Jarvis PWA v1 — Session 1 client
    // ============================================================================
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.49.8';

    // --- config: loaded from /api/config at boot ---
    const API_BASE = ''; // same-origin

    // --- state ---
    let supabase = null;
    let session = null;
    let tenant = null;
    let jarvisUser = null;
    let conversationId = null;
    let conversation = { messages: [] };
    // Jarvis Session 2: context federation. Loaded once per session via
    // /api/jarvis-context-load, passed back to chat as system_prompt_extension.
    let systemPromptExtension = null;
    let systemPromptExtensionAt = 0;
    const CTX_REFRESH_MS = 60 * 1000;
    let mediaRecorder = null;
    let micStream = null; // active MediaStream — MUST be stopped after every use to release mic LED
    let chunks = [];
    let pttState = 'idle'; // idle | listening | thinking | speaking | error

    // ============================================================================
    // CONVERSATION MODE (continuous, VAD-driven)
    // ----------------------------------------------------------------------------
    // UX: TAP 1 = open conversation; mic stays held continuously. Voice Activity
    //     Detection (VAD) auto-cuts each utterance after ~1.5s of silence,
    //     submits to STT, runs chat + TTS, then reopens the mic for the next
    //     utterance — same conversation_id. TAP 2 = close conversation entirely.
    //
    // Walkie-talkie (single-turn) code path is preserved behind ?ptt=1 flag.
    // Default = continuous conversation mode.
    // ============================================================================
    const FORCE_PTT = new URLSearchParams(location.search).get('ptt') === '1';
    const VAD = {
      silenceMs:     600,  // ms of below-threshold amplitude that ends an utterance
      minSpeechMs:   180,  // ms of above-threshold amplitude required to register as speech
      threshold:   0.020,  // RMS amplitude (0–1) above which we consider audio "voice"
      pollMs:         50,  // VAD poll interval
      maxUtteranceMs: 30000, // hard cap per utterance (safety)
    };
    let conversationActive = false;     // true once user taps to start
    let audioCtx = null;
    let analyser = null;
    let vadIntervalId = null;
    let vadState = {
      speaking: false,
      speechStartedAt: 0,
      lastVoiceAt: 0,
      utteranceStartedAt: 0,
    };
    let processingTurn = false;         // true while STT+chat+TTS round-trip runs
    let pendingEndConversation = false; // set if user taps end mid-turn

    // --- elements ---
    const $ = (id) => document.getElementById(id);
    const pttBtn = $('ptt');
    const pttLabel = $('ptt-label');
    const pttStatus = $('ptt-status');
    const authGate = $('auth-gate');
    const authBtn = $('auth-btn');
    const authMsg = $('auth-msg');
    const authEmail = $('auth-email');
    const authPw = $('auth-pw');
    const messages = $('messages');
    const tenantDisplay = $('tenant-display');
    const deviceDisplay = $('device-display');
    const connState = $('conn-state');
    const convIdDisp = $('conv-id-display');
    const toast = $('toast');

    function showToast(text, ms = 2400) {
      toast.textContent = text;
      toast.classList.add('show');
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => toast.classList.remove('show'), ms);
    }

    function setPttState(s, label) {
      pttState = s;
      pttBtn.dataset.state = s;
      const labels = {
        idle: 'TAP TO START',
        listening: 'LISTENING',
        thinking: 'THINKING',
        speaking: 'SPEAKING',
        error: 'TAP TO RETRY',
      };
      pttLabel.textContent = label || labels[s] || 'TAP';
      if (s === 'idle') pttStatus.textContent = '';
    }

    function appendMessage(role, content, createdAt) {
      const el = document.createElement('div');
      el.className = `msg ${role}`;
      const tsSource = createdAt ? new Date(createdAt) : new Date();
      const ts = tsSource.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      el.innerHTML = `
        <div class="msg-role">${role === 'user' ? 'YOU' : 'JARVIS'}</div>
        <div class="msg-content"></div>
        <div class="msg-time">${ts}</div>
      `;
      el.querySelector('.msg-content').textContent = content;
      messages.appendChild(el);
      messages.parentElement.scrollTop = messages.parentElement.scrollHeight;
    }

    // ===== Supabase boot — fetch publishable key from API to avoid hard-coding =====
    async function bootSupabase() {
      // Pull publishable key from a safe-to-expose endpoint. The /config API on
      // MeetDossie already exposes the publishable Supabase URL + anon key.
      try {
        const res = await fetch(`${API_BASE}/api/config`);
        if (res.ok) {
          const data = await res.json();
          const url = data?.supabaseUrl || data?.supabase?.url;
          const key = data?.supabaseKey || data?.supabase?.anonKey;
          if (url && key) {
            supabase = createClient(url, key, {
              auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true },
            });
            window.__JARVIS_SB_URL = url;
            window.__JARVIS_SB_KEY = key;
            return;
          }
        }
      } catch (err) {
        console.warn('[jarvis] config fetch failed', err);
      }
      throw new Error('Unable to load Supabase config from /api/config');
    }

    // ===== Auth =====
    async function checkSession() {
      const { data, error } = await supabase.auth.getSession();
      if (error) { console.error(error); return false; }
      if (!data.session) return false;
      session = data.session;
      return true;
    }

    // Returns a fresh `Bearer <access_token>` Authorization header value.
    // Refreshes the Supabase session if the access_token is expired or within
    // the 5-minute pre-expiry window. Safe to call on every fetch — Supabase
    // dedupes concurrent refresh requests internally.
    async function getAuthHeader() {
      let current = session;
      try {
        const { data } = await supabase.auth.getSession();
        if (data && data.session) current = data.session;
      } catch (err) {
        console.warn('[jarvis] getSession failed', err);
      }
      if (!current || !current.access_token) {
        throw new Error('Not signed in');
      }
      const expiresAtMs = (current.expires_at || 0) * 1000;
      const msUntilExpiry = expiresAtMs - Date.now();
      // Refresh when within 5 minutes of expiry, or already expired.
      if (!expiresAtMs || msUntilExpiry < 5 * 60 * 1000) {
        try {
          const { data, error } = await supabase.auth.refreshSession();
          if (error || !data || !data.session) {
            throw new Error(error?.message || 'Session refresh failed');
          }
          current = data.session;
        } catch (err) {
          console.error('[jarvis] refreshSession failed', err);
          throw new Error('Session refresh failed');
        }
      }
      session = current;
      return `Bearer ${current.access_token}`;
    }

    async function signIn() {
      const email = authEmail.value.trim();
      const password = authPw.value;
      if (!email || !password) {
        authMsg.textContent = 'Email and password required.';
        authMsg.className = 'auth-msg err';
        return;
      }
      authMsg.textContent = 'Signing in…';
      authMsg.className = 'auth-msg';
      authBtn.disabled = true;
      try {
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) {
          authMsg.textContent = error.message || 'Sign-in failed.';
          authMsg.className = 'auth-msg err';
          return;
        }
        session = data.session;
        authMsg.textContent = 'Signed in.';
        authMsg.className = 'auth-msg ok';
        await afterSignIn();
      } catch (err) {
        authMsg.textContent = err.message || 'Sign-in error.';
        authMsg.className = 'auth-msg err';
      } finally {
        authBtn.disabled = false;
      }
    }

    async function afterSignIn() {
      authGate.classList.add('hidden');
      // Pull tenant via REST (RLS will scope to this user)
      const res = await fetch(`${window.__JARVIS_SB_URL}/rest/v1/jarvis_users?select=id,tenant_id,role,tenants(id,slug,display_name,addressing_pref,voice_id,theme)&auth_user_id=eq.${session.user.id}&limit=1`, {
        headers: {
          apikey: window.__JARVIS_SB_KEY,
          Authorization: await getAuthHeader(),
        },
      });
      if (res.ok) {
        const rows = await res.json();
        if (rows.length) {
          jarvisUser = rows[0];
          tenant = rows[0].tenants;
          tenantDisplay.textContent = `tenant · ${tenant.slug}`;
          deviceDisplay.textContent = `device · ${getDeviceLabel()}`;
        } else {
          tenantDisplay.textContent = 'tenant · UNASSIGNED';
          showToast('No tenant assigned to this account. Heath only for now.');
        }
      }
      // Start conversation
      await startConversation();
      subscribeAgentEvents();
    }

    function getDeviceLabel() {
      const ua = navigator.userAgent;
      if (/SM-F|Fold/i.test(ua)) return 'Z Fold';
      if (/iPad/i.test(ua)) return 'iPad';
      if (/Mac/i.test(ua) && !/iPad/i.test(ua)) return 'MacBook';
      if (/iPhone/i.test(ua)) return 'iPhone';
      if (/Android/i.test(ua)) return 'Android';
      return 'Browser';
    }

    // localStorage key for the most recent open conversation. Scoped by
    // auth user so a sign-out + different sign-in doesn't surface another
    // user's history.
    const CONV_LS_KEY = 'jarvis:lastConversationId';
    function lsGetLastConv() {
      try {
        const raw = localStorage.getItem(CONV_LS_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        if (!parsed || parsed.userId !== session?.user?.id) return null;
        return parsed.conversationId || null;
      } catch { return null; }
    }
    function lsSetLastConv(conversationId) {
      try {
        if (!session?.user?.id || !conversationId) return;
        localStorage.setItem(CONV_LS_KEY, JSON.stringify({
          userId: session.user.id,
          conversationId,
          savedAt: Date.now(),
        }));
      } catch { /* private mode */ }
    }
    function lsClearLastConv() {
      try { localStorage.removeItem(CONV_LS_KEY); } catch {}
    }

    async function startConversation() {
      try {
        const resumeId = lsGetLastConv();
        const res = await fetch(`${API_BASE}/api/jarvis-voice?op=conversation_start`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: await getAuthHeader(),
          },
          body: JSON.stringify({
            device_label: getDeviceLabel(),
            user_agent: navigator.userAgent.slice(0, 256),
            resume_conversation_id: resumeId || undefined,
          }),
        });
        if (res.ok) {
          const data = await res.json();
          conversationId = data.conversation_id;
          convIdDisp.textContent = `session · ${conversationId.slice(0, 8)}`;
          lsSetLastConv(conversationId);
          // Hydrate scrollback with prior messages on resume.
          if (data.resumed && Array.isArray(data.messages) && data.messages.length) {
            hydrateScrollback(data.messages);
            showToast(`Resumed (${data.messages.length} prior msgs).`, 1800);
          }
          // Kick off context federation in parallel (fire-and-forget; chat
          // will await it on first turn if not yet ready).
          ensureContextLoaded(true).catch(() => {});
        }
      } catch (err) {
        console.warn('[jarvis] startConversation failed', err);
      }
    }

    function hydrateScrollback(msgs) {
      // Clear any placeholder/idle row content, then append in order.
      msgs.forEach((m) => {
        if (!m || !m.content) return;
        if (m.role !== 'user' && m.role !== 'assistant') return;
        appendMessage(m.role, m.content, m.created_at);
      });
    }

    // ===== Context federation (Session 2) =====
    // Pulls Heath's full context (memory backbone, live MRR, open todos,
    // agent status, recent conversation titles, active DoDs) so Jarvis on
    // the PWA knows what Cole knows on Telegram.
    //
    // Cached for CTX_REFRESH_MS so the chat loop doesn't pay the load cost
    // on every turn.
    async function ensureContextLoaded(force) {
      const now = Date.now();
      if (!force && systemPromptExtension && (now - systemPromptExtensionAt) < CTX_REFRESH_MS) {
        return systemPromptExtension;
      }
      try {
        const res = await fetch(`${API_BASE}/api/jarvis-context-load`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: await getAuthHeader(),
          },
          body: JSON.stringify({ conversation_id: conversationId || undefined }),
        });
        if (!res.ok) {
          console.warn('[jarvis] context-load failed', res.status);
          return null;
        }
        const data = await res.json();
        if (data.ok && data.system_prompt_extension) {
          systemPromptExtension = data.system_prompt_extension;
          systemPromptExtensionAt = now;
          console.log(`[jarvis] context loaded (~${data.token_estimate} tokens)`);
          return systemPromptExtension;
        }
      } catch (err) {
        console.warn('[jarvis] context-load error', err);
      }
      return null;
    }

    // ===== Push-to-talk pipeline =====
    // Centralized mic release. Safe to call any number of times. Releases the
    // OS-level microphone (mic LED off, other apps can acquire it).
    function stopMicStream() {
      try {
        if (micStream) {
          micStream.getTracks().forEach((t) => {
            try { t.stop(); } catch (e) { /* ignore */ }
          });
        }
      } catch (e) {
        console.warn('[jarvis] stopMicStream error', e);
      } finally {
        micStream = null;
      }
      // Also drop the MediaRecorder reference so it can't be reused with a dead stream.
      if (mediaRecorder) {
        try {
          if (mediaRecorder.state !== 'inactive') mediaRecorder.stop();
        } catch (e) { /* ignore */ }
        mediaRecorder = null;
      }
    }

    async function ensureMic() {
      // ALWAYS release any prior stream before requesting a new one.
      // Reusing an old stream is what previously held the mic open across conversations.
      stopMicStream();
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          audio: { echoCancellation: true, noiseSuppression: true, sampleRate: 16000, channelCount: 1 },
        });
        micStream = stream;
        return stream;
      } catch (err) {
        console.error('[jarvis] mic error', err);
        return null;
      }
    }

    // ====================================================================
    // CONTINUOUS CONVERSATION MODE — main click handler
    // ====================================================================
    async function onPttClick() {
      if (FORCE_PTT) return onPttClickWalkieTalkie();

      // TAP 2 — end conversation (any active state)
      if (conversationActive) {
        await endConversation();
        return;
      }

      // TAP 1 — start a conversation
      if (pttState === 'error') {
        // recover from prior error
        setPttState('idle');
      }
      const stream = await ensureMic();
      if (!stream) {
        setPttState('error', 'MIC BLOCKED');
        showToast('Microphone blocked. Tap address bar lock icon to allow.');
        return;
      }
      conversationActive = true;
      pendingEndConversation = false;
      try {
        startVadLoop(stream);
        startUtteranceRecorder(stream);
        setPttState('listening');
        pttLabel.textContent = 'TAP TO END';
        pttStatus.textContent = 'Listening — speak, then pause.';
      } catch (err) {
        console.error('[jarvis] start conversation failed', err);
        stopVadLoop();
        stopMicStream();
        conversationActive = false;
        setPttState('error', 'MIC ERROR');
        showToast(`Mic error: ${err.message}`);
      }
    }

    async function endConversation() {
      conversationActive = false;
      pendingEndConversation = false;
      stopVadLoop();
      try {
        if (mediaRecorder && mediaRecorder.state !== 'inactive') {
          // Tell the in-flight recorder to stop without triggering a new turn.
          mediaRecorder._suppressFinalize = true;
          try { mediaRecorder.stop(); } catch {}
        }
      } catch {}
      stopMicStream();
      setPttState('idle');
      pttLabel.textContent = 'TAP TO START';
      pttStatus.textContent = '';
      // Inform server the conversation is closed. Best-effort.
      try {
        if (conversationId) {
          await fetch(`${API_BASE}/api/jarvis-voice?op=conversation_end`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              Authorization: await getAuthHeader(),
            },
            body: JSON.stringify({ conversation_id: conversationId }),
          }).catch(() => {});
        }
      } catch {}
    }

    // ===== VAD =====
    function startVadLoop(stream) {
      stopVadLoop();
      try {
        const AC = window.AudioContext || window.webkitAudioContext;
        audioCtx = new AC();
        const src = audioCtx.createMediaStreamSource(stream);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 1024;
        analyser.smoothingTimeConstant = 0.7;
        src.connect(analyser);
      } catch (err) {
        console.warn('[jarvis] VAD init failed', err);
        return;
      }
      const buf = new Uint8Array(analyser.fftSize);
      vadState = { speaking: false, speechStartedAt: 0, lastVoiceAt: 0, utteranceStartedAt: Date.now() };
      vadIntervalId = setInterval(() => {
        if (!analyser) return;
        analyser.getByteTimeDomainData(buf);
        // RMS of normalized (-1,1) signal
        let sumSq = 0;
        for (let i = 0; i < buf.length; i++) {
          const v = (buf[i] - 128) / 128;
          sumSq += v * v;
        }
        const rms = Math.sqrt(sumSq / buf.length);
        const now = Date.now();
        const above = rms > VAD.threshold;

        if (above) {
          if (!vadState.speaking) {
            vadState.speechStartedAt = now;
            vadState.speaking = true;
          }
          vadState.lastVoiceAt = now;
        }

        // Hard utterance cap — finalize even mid-talk to avoid runaway uploads
        if (vadState.speaking && (now - vadState.utteranceStartedAt) > VAD.maxUtteranceMs) {
          finalizeUtteranceIfReady(true);
          return;
        }

        // Silence-after-speech → finalize this utterance
        if (vadState.speaking && vadState.lastVoiceAt && (now - vadState.lastVoiceAt) >= VAD.silenceMs) {
          // require minimum speech duration to avoid clicks/coughs
          if ((vadState.lastVoiceAt - vadState.speechStartedAt) >= VAD.minSpeechMs) {
            finalizeUtteranceIfReady(false);
          } else {
            // reset and keep listening
            vadState.speaking = false;
            vadState.speechStartedAt = 0;
            vadState.lastVoiceAt = 0;
            vadState.utteranceStartedAt = now;
          }
        }
      }, VAD.pollMs);
    }

    function stopVadLoop() {
      if (vadIntervalId) {
        clearInterval(vadIntervalId);
        vadIntervalId = null;
      }
      try { if (audioCtx) audioCtx.close(); } catch {}
      audioCtx = null;
      analyser = null;
    }

    function startUtteranceRecorder(stream) {
      const mime = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
        ? 'audio/webm;codecs=opus'
        : 'audio/webm';
      try {
        mediaRecorder = new MediaRecorder(stream, { mimeType: mime, audioBitsPerSecond: 64000 });
      } catch (err) {
        mediaRecorder = new MediaRecorder(stream);
      }
      chunks = [];
      const recRef = mediaRecorder;
      recRef.ondataavailable = (e) => { if (e.data && e.data.size) chunks.push(e.data); };
      recRef.onstop = async () => {
        if (recRef._suppressFinalize) {
          chunks = [];
          return;
        }
        const blob = new Blob(chunks, { type: recRef.mimeType || 'audio/webm' });
        chunks = [];
        await handleUtteranceBlob(blob);
      };
      recRef.onerror = (e) => {
        console.error('[jarvis] mediaRecorder error', e);
      };
      recRef.start();
      vadState.utteranceStartedAt = Date.now();
    }

    function finalizeUtteranceIfReady(hardCap) {
      if (!conversationActive) return;
      if (processingTurn) return;
      if (!mediaRecorder || mediaRecorder.state === 'inactive') return;
      processingTurn = true;
      try {
        mediaRecorder.stop(); // triggers handleUtteranceBlob via onstop
      } catch (err) {
        console.warn('[jarvis] recorder.stop failed', err);
        processingTurn = false;
      }
      // reset VAD bookkeeping for next utterance
      vadState.speaking = false;
      vadState.speechStartedAt = 0;
      vadState.lastVoiceAt = 0;
    }

    async function handleUtteranceBlob(blob) {
      try {
        if (!conversationActive) { processingTurn = false; return; }
        if (blob.size < 1000) {
          // too short, skip — keep mic open
          processingTurn = false;
          if (conversationActive && micStream) {
            startUtteranceRecorder(micStream);
            setPttState('listening');
            pttLabel.textContent = 'TAP TO END';
            pttStatus.textContent = 'Listening — speak, then pause.';
          }
          return;
        }
        setPttState('thinking');
        pttLabel.textContent = 'TAP TO END';
        pttStatus.textContent = 'Transcribing…';

        // STT
        let transcript = '';
        try {
          const sttRes = await fetch(`${API_BASE}/api/jarvis-voice?op=stt`, {
            method: 'POST',
            headers: {
              'Content-Type': blob.type,
              Authorization: await getAuthHeader(),
            },
            body: blob,
          });
          const sttData = await sttRes.json();
          if (sttRes.ok && sttData.ok) {
            transcript = (sttData.transcript || '').trim();
          } else if (sttRes.status === 400 && sttData?.error === 'audio_empty_or_too_short') {
            transcript = '';
          } else {
            throw new Error(sttData?.error || `STT failed (${sttRes.status})`);
          }
        } catch (err) {
          showToast(`STT: ${err.message}`);
          await resumeListening();
          return;
        }
        if (!transcript) {
          // ignore noise, keep conversation open
          await resumeListening();
          return;
        }

        appendMessage('user', transcript);
        pttStatus.textContent = 'Thinking…';

        // ===== Route: tool-likely turn -> non-streaming chat (tool_use); else stream =====
        // Streaming endpoint doesn't support tool_use (yet). If the message
        // hints at needing a tool, route to the non-streaming /op=chat which
        // does the full Anthropic tool-use loop. Latency penalty: ~500ms.
        const TOOL_INTENT_RE = /\b(mrr|customers?|subscribers?|brittney|miki|search|google|browse|telegram|sms|message|email|spawn|atlas|carter|hadley|pierce|sage|quinn|ridge|sterling|jarvis|remind|reminder|todo|calendar|schedule|today|brief|dashboard|status|posts?|pending|approve|approval|how many|how much|what's our|when did|find|look up|check on)\b/i;
        const isToolIntent = TOOL_INTENT_RE.test(transcript);

        if (isToolIntent) {
          console.log('[jarvis] tool-intent detected -> non-streaming chat');
          try {
            await runLegacyChatTTS(transcript);
          } catch (err) {
            console.error('[jarvis] non-streaming chat failed:', err);
            speakFallback('Connection hiccup, sir. Try again.', /*resume*/true);
          }
          return;
        }

        // ===== STREAMING chat + TTS pipeline =====
        // Server streams Claude tokens, extracts sentences, fires ElevenLabs
        // TTS per sentence, pipes audio chunks down via SSE. Client appends
        // text live + plays each sentence's audio sequentially. First audio
        // typically starts ~1.0-1.5s after the user finishes speaking.
        const streamResult = await runStreamingChatTTS({
          conversationId,
          transcript,
        });

        if (streamResult.fallback) {
          // Stream broke before any audio — fall back to legacy chat+tts path
          console.warn('[jarvis] streaming failed, using legacy path:', streamResult.error);
          await runLegacyChatTTS(transcript).catch(async (err) => {
            console.error('[jarvis] legacy fallback also failed:', err);
            speakFallback('Connection hiccup, sir. Try again.', /*resume*/true);
          });
          return;
        }
        if (streamResult.conversationId) {
          conversationId = streamResult.conversationId;
          convIdDisp.textContent = `session · ${conversationId.slice(0, 8)}`;
          lsSetLastConv(conversationId);
        }
        // Audio playback chain handles resumeListening() onended of last clip.
      } catch (outer) {
        console.error('[jarvis] handleUtteranceBlob outer error', outer);
        await resumeListening();
      }
    }

    // ====================================================================
    // STREAMING CHAT + TTS pipeline
    // ====================================================================
    // Calls /api/jarvis-voice?op=chat_tts_stream and consumes SSE events:
    //   meta     -> { conversation_id }
    //   text     -> { delta }   (token-level text for UI)
    //   sentence -> { seq, text }
    //   audio    -> { seq, base64 }  (MP3 bytes for that sentence)
    //   done     -> { conversation_id, full, sentences }
    //   error    -> { error, fallback? }
    //
    // Audio playback strategy: a queue of {seq, audioElement}. Sequential
    // playback via .onended chaining. First audio plays as soon as it lands.
    // When the queue runs dry AND the SSE stream is done, resumeListening().
    //
    // Returns { fallback: bool, error?, conversationId? }. fallback=true
    // when the stream broke before any audio played — caller should retry
    // via the legacy chat+tts path.
    async function runStreamingChatTTS({ conversationId: convIdIn, transcript }) {
      let convId = convIdIn || null;
      let assistantEl = null;
      let assistantText = '';
      let streamDone = false;
      let anyAudioPlayed = false;
      let playbackCompletedResolve;
      const playbackCompleted = new Promise((r) => { playbackCompletedResolve = r; });

      // Audio queue — items are { seq, audio, ready, playPromiseResolve }
      const audioQueue = [];
      let currentlyPlayingSeq = -1;
      let nextPlaySeq = 0;

      // When an audio MP3 arrives, build an <audio> element and queue it.
      // If nothing is currently playing AND this is the next-expected seq,
      // start it. Otherwise wait for chain.
      function enqueueAudio(seq, base64) {
        const byteStr = atob(base64);
        const bytes = new Uint8Array(byteStr.length);
        for (let i = 0; i < byteStr.length; i++) bytes[i] = byteStr.charCodeAt(i);
        const blob = new Blob([bytes], { type: 'audio/mpeg' });
        const url = URL.createObjectURL(blob);
        const audio = new Audio(url);
        audio.preload = 'auto';
        audioQueue.push({ seq, url, audio });
        audioQueue.sort((a, b) => a.seq - b.seq);
        tryPlayNext();
      }

      function tryPlayNext() {
        if (currentlyPlayingSeq !== -1) return; // something playing
        const idx = audioQueue.findIndex((it) => it.seq === nextPlaySeq);
        if (idx === -1) return; // next-expected not yet arrived
        const item = audioQueue.splice(idx, 1)[0];
        currentlyPlayingSeq = item.seq;
        item.audio.onended = () => {
          URL.revokeObjectURL(item.url);
          currentlyPlayingSeq = -1;
          nextPlaySeq = item.seq + 1;
          if (audioQueue.length || !streamDone) {
            tryPlayNext();
          } else {
            // queue dry + stream done -> conversation turn complete
            playbackCompletedResolve && playbackCompletedResolve();
          }
        };
        item.audio.onerror = () => {
          URL.revokeObjectURL(item.url);
          currentlyPlayingSeq = -1;
          nextPlaySeq = item.seq + 1;
          if (audioQueue.length || !streamDone) {
            tryPlayNext();
          } else {
            playbackCompletedResolve && playbackCompletedResolve();
          }
        };
        anyAudioPlayed = true;
        setPttState('speaking');
        pttLabel.textContent = 'TAP TO END';
        pttStatus.textContent = 'Speaking…';
        item.audio.play().catch((err) => {
          console.warn('[jarvis] audio.play() rejected:', err);
        });
      }

      function ensureAssistantBubble() {
        if (assistantEl) return assistantEl;
        const el = document.createElement('div');
        el.className = 'msg assistant';
        const ts = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        el.innerHTML = `
          <div class="msg-role">JARVIS</div>
          <div class="msg-content"></div>
          <div class="msg-time">${ts}</div>
        `;
        messages.appendChild(el);
        messages.parentElement.scrollTop = messages.parentElement.scrollHeight;
        assistantEl = el.querySelector('.msg-content');
        return assistantEl;
      }

      try {
        const ctxExt = await ensureContextLoaded(false);
        const res = await fetch(`${API_BASE}/api/jarvis-voice?op=chat_tts_stream`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: await getAuthHeader(),
            Accept: 'text/event-stream',
          },
          body: JSON.stringify({
            conversation_id: convId,
            message: transcript,
            system_prompt_extension: ctxExt || undefined,
          }),
        });
        if (!res.ok || !res.body) {
          return { fallback: true, error: `stream HTTP ${res.status}` };
        }
        const ct = (res.headers.get('content-type') || '').toLowerCase();
        if (!ct.includes('text/event-stream')) {
          // Server returned JSON error
          let errBody = null;
          try { errBody = await res.json(); } catch {}
          return { fallback: true, error: errBody?.error || 'non-SSE response' };
        }

        // Parse SSE stream
        const reader = res.body.getReader();
        const decoder = new TextDecoder('utf-8');
        let leftover = '';
        let streamError = null;

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          leftover += decoder.decode(value, { stream: true });
          let nlIdx;
          while ((nlIdx = leftover.indexOf('\n\n')) !== -1) {
            const block = leftover.slice(0, nlIdx);
            leftover = leftover.slice(nlIdx + 2);
            const lines = block.split('\n');
            let eventName = 'message';
            let dataStr = '';
            for (const line of lines) {
              if (line.startsWith('event:')) eventName = line.slice(6).trim();
              else if (line.startsWith('data:')) dataStr += line.slice(5).trim();
            }
            if (!dataStr) continue;
            let payload;
            try { payload = JSON.parse(dataStr); } catch { continue; }
            if (eventName === 'meta') {
              convId = payload.conversation_id || convId;
            } else if (eventName === 'text') {
              assistantText += payload.delta || '';
              const bubble = ensureAssistantBubble();
              bubble.textContent = assistantText;
              messages.parentElement.scrollTop = messages.parentElement.scrollHeight;
            } else if (eventName === 'sentence') {
              // Server says a sentence boundary was hit. UI noop — audio
              // will follow shortly.
            } else if (eventName === 'audio') {
              enqueueAudio(payload.seq, payload.base64);
            } else if (eventName === 'audio_error') {
              // One sentence's TTS failed. Skip it in the play sequence.
              if (nextPlaySeq === payload.seq) {
                nextPlaySeq = payload.seq + 1;
                tryPlayNext();
              }
            } else if (eventName === 'done') {
              if (payload.conversation_id) convId = payload.conversation_id;
              if (!assistantText && payload.full) {
                ensureAssistantBubble().textContent = payload.full;
                assistantText = payload.full;
              }
              streamDone = true;
            } else if (eventName === 'error') {
              streamError = payload.error || 'stream error';
              streamDone = true;
            }
          }
        }
        streamDone = true;

        // If no audio EVER played, treat as fallback
        if (!anyAudioPlayed) {
          if (assistantText) {
            // We got text but no audio — speak the text via fallback synth
            speakFallback(assistantText, /*resume*/true);
            return { conversationId: convId, fallback: false };
          }
          return { fallback: true, error: streamError || 'no audio produced' };
        }

        // If the last audio's onended already fired before stream ended,
        // the queue is dry now — resolve immediately so we don't deadlock.
        if (currentlyPlayingSeq === -1 && audioQueue.length === 0) {
          playbackCompletedResolve && playbackCompletedResolve();
        }

        // Wait for the audio queue to drain (last clip's onended fires)
        // then resume listening.
        const drainTimeout = setTimeout(() => {
          // Safety: if onended never fires, force resume after 30s
          playbackCompletedResolve && playbackCompletedResolve();
        }, 30000);
        await playbackCompleted;
        clearTimeout(drainTimeout);

        await resumeListening();
        return { conversationId: convId, fallback: false };
      } catch (err) {
        console.error('[jarvis] runStreamingChatTTS error:', err);
        if (anyAudioPlayed) {
          // We were mid-playback when stream broke — let queue finish, then resume
          streamDone = true;
          tryPlayNext();
          const safety = setTimeout(() => playbackCompletedResolve && playbackCompletedResolve(), 15000);
          await playbackCompleted;
          clearTimeout(safety);
          await resumeListening();
          return { conversationId: convId, fallback: false };
        }
        return { fallback: true, error: err.message };
      }
    }

    // Legacy non-streaming chat + tts. Used as fallback when stream breaks
    // before any audio plays. Mirrors the original code path 1:1.
    async function runLegacyChatTTS(transcript) {
      let reply = '';
      const ctxExt = await ensureContextLoaded(false);
      const chatRes = await fetch(`${API_BASE}/api/jarvis-voice?op=chat`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          Authorization: await getAuthHeader(),
        },
        body: JSON.stringify({
          conversation_id: conversationId,
          message: transcript,
          system_prompt_extension: ctxExt || undefined,
        }),
      });
      const chatData = await chatRes.json();
      if (!chatRes.ok || !chatData.ok) {
        throw new Error(chatData?.error || `Chat failed (${chatRes.status})`);
      }
      reply = chatData.response || '';
      if (chatData.conversation_id) {
        conversationId = chatData.conversation_id;
        convIdDisp.textContent = `session · ${conversationId.slice(0, 8)}`;
        lsSetLastConv(conversationId);
      }
      appendMessage('assistant', reply);
      setPttState('speaking');
      pttLabel.textContent = 'TAP TO END';
      pttStatus.textContent = 'Speaking…';
      const ttsRes = await fetch(`${API_BASE}/api/jarvis-voice?op=tts`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          Authorization: await getAuthHeader(),
        },
        body: JSON.stringify({ text: reply }),
      });
      if (!ttsRes.ok) {
        const errBody = await ttsRes.json().catch(() => ({}));
        if (errBody.fallback === 'speech-synthesis') {
          speakFallback(reply, /*resume*/true);
          return;
        }
        throw new Error(errBody.error || `TTS failed (${ttsRes.status})`);
      }
      const audioBlob = await ttsRes.blob();
      const audioUrl = URL.createObjectURL(audioBlob);
      const audio = new Audio(audioUrl);
      audio.onended = async () => {
        URL.revokeObjectURL(audioUrl);
        await resumeListening();
      };
      audio.onerror = async () => { await resumeListening(); };
      await audio.play();
    }

    async function resumeListening() {
      processingTurn = false;
      if (!conversationActive) return;
      if (pendingEndConversation) {
        pendingEndConversation = false;
        await endConversation();
        return;
      }
      // Mic stream is still alive (we never released it during a turn in
      // continuous mode). Spin up a new recorder for the next utterance.
      if (!micStream) {
        const stream = await ensureMic();
        if (!stream) {
          conversationActive = false;
          setPttState('error', 'MIC BLOCKED');
          showToast('Mic lost. Tap to retry.');
          return;
        }
        startVadLoop(stream);
      } else if (!vadIntervalId) {
        startVadLoop(micStream);
      }
      startUtteranceRecorder(micStream);
      setPttState('listening');
      pttLabel.textContent = 'TAP TO END';
      pttStatus.textContent = 'Listening — speak, then pause.';
    }

    // ====================================================================
    // WALKIE-TALKIE FALLBACK (legacy single-turn, behind ?ptt=1 flag)
    // ====================================================================
    async function onPttClickWalkieTalkie() {
      if (pttState === 'idle' || pttState === 'error') {
        // Start — always a fresh getUserMedia, never reused.
        const stream = await ensureMic();
        if (!stream) {
          setPttState('error', 'MIC BLOCKED');
          showToast('Microphone blocked. Tap address bar lock icon to allow.');
          return;
        }
        setPttState('listening');
        pttStatus.textContent = 'Listening…';

        const mime = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
          ? 'audio/webm;codecs=opus'
          : 'audio/webm';
        try {
          mediaRecorder = new MediaRecorder(stream, { mimeType: mime, audioBitsPerSecond: 64000 });
        } catch (err) {
          mediaRecorder = new MediaRecorder(stream);
        }
        chunks = [];
        mediaRecorder.ondataavailable = (e) => { if (e.data && e.data.size) chunks.push(e.data); };
        mediaRecorder.onstop = async () => {
          stopMicStream();
          await processCapturedAudioPtt();
        };
        mediaRecorder.onerror = (e) => {
          console.error('[jarvis] mediaRecorder error', e);
          stopMicStream();
          setPttState('error');
          showToast('Recording error. Tap to retry.');
        };
        mediaRecorder.start();
      } else if (pttState === 'listening') {
        pttStatus.textContent = 'Stopping…';
        if (mediaRecorder && mediaRecorder.state !== 'inactive') {
          mediaRecorder.stop();
        } else {
          stopMicStream();
          setPttState('idle');
        }
      }
    }

    async function processCapturedAudioPtt() {
      const blobMime = (mediaRecorder && mediaRecorder.mimeType) || 'audio/webm';
      stopMicStream();
      const blob = new Blob(chunks, { type: blobMime });
      chunks = [];
      if (blob.size < 1000) {
        setPttState('idle');
        showToast('Too short. Try again.');
        return;
      }
      setPttState('thinking');
      pttStatus.textContent = 'Transcribing…';

      let transcript = '';
      try {
        const sttRes = await fetch(`${API_BASE}/api/jarvis-voice?op=stt`, {
          method: 'POST',
          headers: {
            'Content-Type': blob.type,
            Authorization: await getAuthHeader(),
          },
          body: blob,
        });
        const sttData = await sttRes.json();
        if (sttRes.ok && sttData.ok) {
          transcript = (sttData.transcript || '').trim();
        } else if (sttRes.status === 400 && sttData?.error === 'audio_empty_or_too_short') {
          setPttState('idle');
          showToast("I didn't catch that, sir.");
          speakFallback("I didn't catch that, sir.");
          return;
        } else {
          throw new Error(sttData?.error || `STT failed (${sttRes.status})`);
        }
      } catch (err) {
        setPttState('error');
        pttStatus.textContent = err.message;
        showToast(`STT: ${err.message}`);
        return;
      }
      if (!transcript) {
        setPttState('idle');
        showToast("I didn't catch that, sir.");
        speakFallback("I didn't catch that, sir.");
        return;
      }
      appendMessage('user', transcript);
      pttStatus.textContent = 'Thinking…';

      let reply = '';
      try {
        const ctxExt = await ensureContextLoaded(false);
        const chatRes = await fetch(`${API_BASE}/api/jarvis-voice?op=chat`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: await getAuthHeader(),
          },
          body: JSON.stringify({
            conversation_id: conversationId,
            message: transcript,
            system_prompt_extension: ctxExt || undefined,
          }),
        });
        const chatData = await chatRes.json();
        if (!chatRes.ok || !chatData.ok) {
          throw new Error(chatData?.error || `Chat failed (${chatRes.status})`);
        }
        reply = chatData.response || '';
        if (chatData.conversation_id) {
          conversationId = chatData.conversation_id;
          convIdDisp.textContent = `session · ${conversationId.slice(0, 8)}`;
          lsSetLastConv(conversationId);
        }
      } catch (err) {
        setPttState('error');
        pttStatus.textContent = err.message;
        showToast(`Chat: ${err.message}`);
        speakFallback('Connection hiccup, sir. Try again.');
        return;
      }
      appendMessage('assistant', reply);
      setPttState('speaking');
      pttStatus.textContent = 'Speaking…';
      try {
        const ttsRes = await fetch(`${API_BASE}/api/jarvis-voice?op=tts`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: await getAuthHeader(),
          },
          body: JSON.stringify({ text: reply }),
        });
        if (!ttsRes.ok) {
          const errBody = await ttsRes.json().catch(() => ({}));
          if (errBody.fallback === 'speech-synthesis') {
            speakFallback(reply);
          } else {
            throw new Error(errBody.error || `TTS failed (${ttsRes.status})`);
          }
        } else {
          const audioBlob = await ttsRes.blob();
          const audioUrl = URL.createObjectURL(audioBlob);
          const audio = new Audio(audioUrl);
          audio.onended = () => { URL.revokeObjectURL(audioUrl); setPttState('idle'); };
          audio.onerror = () => { setPttState('idle'); };
          await audio.play();
          return;
        }
      } catch (err) {
        showToast(`TTS: ${err.message}`);
        speakFallback(reply);
      }
      setPttState('idle');
    }

    function speakFallback(text, resumeAfter) {
      try {
        if (!('speechSynthesis' in window)) {
          if (resumeAfter && conversationActive) { resumeListening(); }
          else setPttState('idle');
          return;
        }
        const utter = new SpeechSynthesisUtterance(text);
        utter.rate = 1.0;
        utter.pitch = 1.0;
        utter.onend = () => {
          if (resumeAfter && conversationActive) resumeListening();
          else setPttState('idle');
        };
        speechSynthesis.speak(utter);
      } catch (err) {
        console.warn(err);
        if (resumeAfter && conversationActive) resumeListening();
        else setPttState('idle');
      }
    }

    // ===== Realtime agent events =====
    function subscribeAgentEvents() {
      if (!tenant) return;
      const ch = supabase
        .channel(`jarvis_agent_events:${tenant.id}`)
        .on(
          'postgres_changes',
          { event: 'INSERT', schema: 'public', table: 'jarvis_agent_events', filter: `tenant_id=eq.${tenant.id}` },
          (payload) => updateAgentRow(payload.new),
        )
        .subscribe((status) => {
          if (status === 'SUBSCRIBED') connState.textContent = 'CONNECTED';
          else if (status === 'CHANNEL_ERROR' || status === 'CLOSED') connState.textContent = 'OFFLINE';
        });
    }

    function updateAgentRow(event) {
      const row = document.querySelector(`.agent-row[data-agent="${event.agent_name}"]`);
      if (!row) return;
      const statusEl = row.querySelector('.agent-status');
      const summaryEl = row.querySelector('.agent-summary');
      statusEl.className = `agent-status ${event.event_type}`;
      statusEl.textContent = event.event_type.toUpperCase();
      summaryEl.textContent = event.summary || '—';
    }

    // ===== PWA: service worker =====
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/jarvis-pwa-sw.js').catch((err) => {
          console.warn('[jarvis] SW register failed', err);
        });
      });
    }

    // ===== Boot =====
    (async function boot() {
      await bootSupabase();
      const signedIn = await checkSession();
      if (signedIn) {
        await afterSignIn();
      } else {
        authGate.classList.remove('hidden');
      }
      authBtn.addEventListener('click', signIn);
      authPw.addEventListener('keydown', (e) => { if (e.key === 'Enter') signIn(); });
      pttBtn.addEventListener('click', onPttClick);

      // Page-lifecycle handlers: release the mic so Telegram dictation / other
      // apps can acquire it whenever the user navigates away or backgrounds the PWA.
      const lifecycleCleanup = () => {
        try { stopVadLoop(); } catch {}
        try { stopMicStream(); } catch {}
        conversationActive = false;
      };
      window.addEventListener('pagehide', lifecycleCleanup);
      window.addEventListener('beforeunload', lifecycleCleanup);
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'hidden') {
          // Page hidden — end any active conversation so mic LED goes dark.
          if (conversationActive) {
            endConversation().catch(() => lifecycleCleanup());
          } else if (pttState !== 'listening') {
            stopMicStream();
          }
        }
      });

      // dev convenience: ?demo=1 prefills demo creds
      const usp = new URLSearchParams(location.search);
      if (usp.get('demo') === '1') {
        authEmail.value = 'demo@meetdossie.com';
      }
    })();
  </script>
</body>
