<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0a0a1f" />
<title>Cole — Prototype v1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --coral: #E8836B;
    --peach: #F5C5A8;
    --gold:  #C9A96E;
    --teal:  #6FB4B0;
    --blush: #F5E6E0;
    --indigo:#1A1A2E;
    --deep:  #0a0a1f;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    overflow-x: hidden;
    background: #0a0a1f;
    color: #f5e6e0;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    font-weight: 300;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  body {
    /* Ambient breathing background layer (CSS fallback under the canvas) */
    background:
      radial-gradient(ellipse at 30% 20%, rgba(232,131,107,0.10), transparent 55%),
      radial-gradient(ellipse at 70% 80%, rgba(111,180,176,0.10), transparent 55%),
      radial-gradient(ellipse at 50% 50%, rgba(201,169,110,0.06), transparent 65%),
      #0a0a1f;
  }

  /* Full-screen background canvas behind everything */
  #bg-canvas {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    z-index: 0;
    pointer-events: none;
  }

  .section {
    position: relative;
    width: 100%;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1;
    padding: 6vh 5vw;
    overflow: hidden;
  }

  .hero-title {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-weight: 300;
    font-style: italic;
    font-size: clamp(2.2rem, 6.5vw, 4.5rem);
    letter-spacing: 0.01em;
    margin: 0 0 2vh 0;
    text-align: center;
    background: linear-gradient(135deg, #F5E6E0 0%, #F5C5A8 35%, #C9A96E 65%, #6FB4B0 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    background-size: 200% 200%;
    animation: shimmer 8s ease-in-out infinite;
    text-shadow: 0 0 60px rgba(232,131,107,0.15);
  }

  @keyframes shimmer {
    0%, 100% { background-position: 0% 50%; }
    50%      { background-position: 100% 50%; }
  }

  .hint {
    font-family: 'Inter', system-ui, sans-serif;
    font-weight: 300;
    font-size: clamp(0.75rem, 1.6vw, 0.95rem);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(245, 230, 224, 0.45);
    margin-top: 3vh;
    text-align: center;
    animation: hintBreath 4s ease-in-out infinite;
  }

  @keyframes hintBreath {
    0%, 100% { opacity: 0.35; }
    50%      { opacity: 0.7; }
  }

  /* "Hear me speak" CTA — sits below the Tap-to-listen hint.
     More prominent now: bigger, warmer fill, soft outer glow, gentle
     attention-pulse so it's the next obvious thing after the orb. */
  #speak-btn {
    margin-top: 2.8vh;
    padding: 1.05rem 2.2rem;
    font-family: 'Inter', system-ui, sans-serif;
    font-weight: 500;
    font-size: clamp(0.85rem, 1.5vw, 1rem);
    letter-spacing: 0.20em;
    text-transform: uppercase;
    color: #fff;
    background: linear-gradient(135deg, rgba(232,131,107,0.55) 0%, rgba(201,169,110,0.45) 100%);
    border: 1px solid rgba(245, 197, 168, 0.7);
    border-radius: 999px;
    cursor: pointer;
    transition: background 0.3s ease, border-color 0.3s ease, transform 0.2s ease, box-shadow 0.3s ease;
    display: inline-flex;
    align-items: center;
    gap: 0.7rem;
    -webkit-tap-highlight-color: transparent;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    box-shadow:
      0 0 24px rgba(232, 131, 107, 0.35),
      0 6px 24px rgba(0, 0, 0, 0.25);
    animation: speakBtnBreath 3.2s ease-in-out infinite;
    position: relative;
  }
  @keyframes speakBtnBreath {
    0%, 100% {
      box-shadow: 0 0 24px rgba(232, 131, 107, 0.30), 0 6px 24px rgba(0, 0, 0, 0.25);
      transform: scale(1);
    }
    50% {
      box-shadow: 0 0 36px rgba(232, 131, 107, 0.55), 0 6px 28px rgba(0, 0, 0, 0.25);
      transform: scale(1.03);
    }
  }
  #speak-btn:hover {
    background: linear-gradient(135deg, rgba(232,131,107,0.70) 0%, rgba(201,169,110,0.55) 100%);
    border-color: rgba(245, 197, 168, 0.95);
  }
  #speak-btn:active { transform: scale(0.97); }
  #speak-btn[disabled] {
    opacity: 0.6;
    cursor: default;
    animation: none;
  }
  #speak-btn.playing {
    animation: none;
    background: linear-gradient(135deg, rgba(232,131,107,0.75) 0%, rgba(201,169,110,0.6) 100%);
  }
  #speak-btn .speak-btn-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 0 14px rgba(255, 255, 255, 0.95);
    transition: transform 0.2s ease;
  }
  #speak-btn.playing .speak-btn-dot {
    animation: dotPulse 0.6s ease-in-out infinite;
  }
  @keyframes dotPulse {
    0%, 100% { transform: scale(1);   opacity: 1; }
    50%      { transform: scale(1.6); opacity: 0.6; }
  }
  /* Subline below the button explaining what tapping does. */
  .speak-subline {
    margin-top: 1.4vh;
    font-family: 'Inter', system-ui, sans-serif;
    font-weight: 300;
    font-size: 0.78rem;
    letter-spacing: 0.10em;
    color: rgba(245, 230, 224, 0.55);
    text-align: center;
    max-width: 28ch;
    line-height: 1.5;
  }
  .speak-subline em {
    font-style: italic;
    color: rgba(255, 200, 130, 0.85);
  }
  #cole-audio { display: none; }

  /* === Orb section === */
  #orb-section {
    padding-top: 8vh;
  }
  #orb-stage {
    position: relative;
    width: min(85vw, 60vh);
    height: min(85vw, 60vh);
    max-width: 720px;
    max-height: 720px;
    margin: 1vh auto;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  }
  #orb-stage.listening { transform: scale(1.04); }
  /* Soft outer halo — atmospheric, no hard edge.
     Mask feathers video opacity; glow layers create "sun through clouds" effect. */
  #orb-mask {
    position: relative;
    width: 100%;
    height: 100%;
    /* No border-radius, no overflow:hidden — let smoke feather out organically. */
    filter: drop-shadow(0 0 80px rgba(255, 180, 100, 0.30))
            drop-shadow(0 0 160px rgba(255, 160, 80, 0.20))
            drop-shadow(0 0 240px rgba(255, 140, 60, 0.10));
    transition: filter 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  }
  #orb-stage.listening #orb-mask {
    filter: drop-shadow(0 0 100px rgba(255, 210, 130, 0.55))
            drop-shadow(0 0 200px rgba(255, 180, 90, 0.35))
            drop-shadow(0 0 320px rgba(255, 150, 70, 0.20));
  }

  /* Inner glow — sun core BEHIND the smoke. Sized smaller than the orb so the
     bright spot only blooms in the middle, with screen-blend intensifying the
     video's center without washing out color.

     Audio-reactive: --pulse-intensity (0-1) driven by Web Audio analyser
     during TTS playback. Ambient breath (CSS keyframe) provides the idle
     motion when no audio is playing. */
  #orb-stage {
    --pulse-intensity: 0;
  }
  #orb-inner-glow {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 70%;
    height: 70%;
    /* The translate is the resting transform; scale stacks on top.
       --pulse-intensity adds up to +55% scale at peak amplitude — boosted
       from the previous 18% because real speech RMS rarely peaks above
       0.3-0.4 (observed Bill voice ~0.16 max in Playwright), so the
       visible response was muted. Now even modest amplitude reads. */
    transform: translate(-50%, -50%) scale(calc(1 + var(--pulse-intensity) * 0.55));
    border-radius: 50%;
    background: radial-gradient(circle,
      rgba(255, 200, 130, 0.9) 0%,
      rgba(255, 180, 100, 0.55) 15%,
      rgba(255, 160, 80, 0.18) 30%,
      transparent 60%);
    mix-blend-mode: screen;
    pointer-events: none;
    z-index: 1;
    /* Opacity ranges from 0.5 (silence) to 1.0 (loud) — wider swing so the
       brightness change is unmistakable. */
    opacity: calc(0.5 + var(--pulse-intensity) * 0.9);
    animation: glowBreath 6s ease-in-out infinite;
    /* Audio reactivity overrides the keyframe via the CSS var — when intensity
       is held at 0 the keyframe still runs; when intensity is being written
       every frame it dominates visually. */
    transition: opacity 60ms linear;
    /* Filter brightness also responds — adds a "lamp turning brighter" cue
       independent of scale, so the change is visible even on slow phones. */
    filter: brightness(calc(1 + var(--pulse-intensity) * 0.8));
  }
  /* When the orb is in "speaking" mode, suspend the ambient keyframe so the
     audio amplitude is the only driver of inner-glow opacity + scale. */
  #orb-stage.speaking #orb-inner-glow {
    animation: none;
  }
  @keyframes glowBreath {
    0%, 100% { opacity: 0.85; transform: translate(-50%, -50%) scale(1.0); }
    50%      { opacity: 1.0;  transform: translate(-50%, -50%) scale(1.08); }
  }

  #orb-video {
    position: relative;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    z-index: 2;
    /* Soft radial mask — fully opaque in the middle, feathering atmospherically. */
    -webkit-mask: radial-gradient(circle,
      black 0%,
      black 55%,
      transparent 95%);
    mask: radial-gradient(circle,
      black 0%,
      black 55%,
      transparent 95%);
    /* Subtle ambient breathing — independent of video loop */
    animation: orbBreath 14s ease-in-out infinite;
  }
  @keyframes orbBreath {
    0%, 100% { transform: scale(1); filter: brightness(1.0); }
    50%      { transform: scale(1.015); filter: brightness(1.05); }
  }

  /* Outer light wash — sits IN FRONT of video, lower opacity, overlay-blend.
     Adds the final "light filtering through clouds" cue. */
  #orb-outer-glow {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 80%;
    height: 80%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: radial-gradient(circle,
      rgba(255, 220, 150, 0.6) 0%,
      rgba(255, 190, 110, 0.30) 18%,
      rgba(255, 170, 90, 0.10) 35%,
      transparent 65%);
    mix-blend-mode: overlay;
    opacity: 0.4;
    pointer-events: none;
    z-index: 3;
  }

  /* Listening overlay — warm sun-yellow flash across full stage on tap. */
  #orb-listen-flash {
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% 50%,
      rgba(255, 230, 150, 0.55) 0%,
      rgba(255, 200, 110, 0.30) 25%,
      rgba(255, 170, 80, 0.12) 50%,
      transparent 80%);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
    mix-blend-mode: screen;
    z-index: 4;
  }
  #orb-stage.listening #orb-listen-flash { opacity: 1; }

  /* === Web section === */
  #web-section {
    border-top: 1px solid rgba(245,230,224,0.04);
  }
  #web-stage {
    position: relative;
    width: 100%;
    max-width: 1100px;
    height: min(65vh, 600px);
    margin: 2vh auto 0;
    border-radius: 22px;
    overflow: hidden;
    background: rgba(10, 10, 31, 0.4);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(245, 230, 224, 0.06);
    box-shadow:
      0 30px 100px rgba(232, 131, 107, 0.07),
      0 10px 40px rgba(111, 180, 176, 0.06),
      inset 0 0 60px rgba(201, 169, 110, 0.04);
  }
  #web-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
    cursor: grab;
    touch-action: none;
  }
  #web-canvas:active { cursor: grabbing; }

  #node-tooltip {
    position: absolute;
    pointer-events: none;
    padding: 10px 16px;
    background: rgba(10,10,31,0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(245,230,224,0.12);
    border-radius: 12px;
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 0.85rem;
    font-weight: 400;
    color: #f5e6e0;
    opacity: 0;
    transform: translate(-50%, -120%);
    transition: opacity 0.25s ease;
    white-space: nowrap;
    box-shadow:
      0 8px 30px rgba(0,0,0,0.4),
      0 0 30px rgba(232,131,107,0.15);
    z-index: 10;
    letter-spacing: 0.02em;
  }
  #node-tooltip.visible { opacity: 1; }
  #node-tooltip .label-kind {
    display: block;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: rgba(232,131,107,0.85);
    margin-bottom: 2px;
  }

  /* Performance: hide overscroll bg flash on iOS */
  @supports (-webkit-touch-callout: none) {
    body { background-attachment: scroll; }
  }

  /* Footer subtle credit */
  .meta-footer {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 4vh 5vw 6vh;
    font-size: 0.7rem;
    color: rgba(245,230,224,0.25);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<!-- SECTION 1: ORB -->
<section class="section" id="orb-section">
  <h1 class="hero-title">Meet your agent.</h1>
  <div id="orb-stage" role="button" aria-label="Tap to listen">
    <div id="orb-mask">
      <div id="orb-inner-glow"></div>
      <video
        id="orb-video"
        src="/orb-smoke-v5.mp4"
        autoplay
        muted
        loop
        playsinline
        preload="auto"
        aria-hidden="true"></video>
      <div id="orb-outer-glow"></div>
      <div id="orb-listen-flash"></div>
    </div>
  </div>
  <div class="hint">Tap to listen</div>
  <button id="speak-btn" type="button" aria-label="Hear Cole speak">
    <span class="speak-btn-dot"></span>
    Hear me speak
  </button>
  <div class="speak-subline">Tap to hear Cole &mdash; <em>watch the glow pulse with each syllable.</em></div>
  <audio id="cole-audio" src="/cole-sample.mp3" preload="auto" crossorigin="anonymous"></audio>
</section>

<!-- SECTION 2: WEB -->
<section class="section" id="web-section">
  <h1 class="hero-title">Your life, remembered.</h1>
  <div id="web-stage">
    <canvas id="web-canvas"></canvas>
    <div id="node-tooltip"><span class="label-kind"></span><span class="label-text"></span></div>
  </div>
  <div class="hint">Tap any node</div>
</section>

<div class="meta-footer">Cole Â· Prototype v1</div>

<!-- Three.js for the constellation web -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
/* =====================================================================
   COLE PROTOTYPE v1
   - Background: animated breathing color field (2D canvas, cheap, GPU-friendly)
   - Orb: WebGL fragment shader with simplex noise + radial mask, breath cycle
   - Web: Three.js 3D constellation with Points + LineSegments, auto-rotate + hover
   ===================================================================== */

/* ---------------------------------------------------------------------
   1. BACKGROUND: breathing smoke (2D canvas, ultra-cheap)
   --------------------------------------------------------------------- */
(function bgLayer() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let w = 0, h = 0, dpr = 1;

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    w = window.innerWidth;
    h = window.innerHeight;
    canvas.width = Math.floor(w * dpr);
    canvas.height = Math.floor(h * dpr);
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);

  // 5 floating color blobs that drift forever
  const blobs = [
    { x: 0.2, y: 0.3, r: 0.55, color: 'rgba(232,131,107,', a: 0.18, vx: 0.00012, vy: 0.00008 },
    { x: 0.8, y: 0.7, r: 0.6,  color: 'rgba(111,180,176,', a: 0.16, vx: -0.0001, vy: -0.00009 },
    { x: 0.5, y: 0.5, r: 0.7,  color: 'rgba(201,169,110,', a: 0.10, vx: 0.00007, vy: -0.00011 },
    { x: 0.15,y: 0.85,r: 0.45, color: 'rgba(245,197,168,', a: 0.10, vx: 0.00013, vy: -0.00007 },
    { x: 0.85,y: 0.15,r: 0.5,  color: 'rgba(26,26,46,',    a: 0.20, vx: -0.00009,vy: 0.00010 }
  ];

  let t0 = performance.now();
  function frame(now) {
    const t = (now - t0) * 0.001;
    // ambient breath modulates overall opacity
    const breath = 0.85 + 0.15 * Math.sin(t * 0.6);

    // base wash
    ctx.fillStyle = '#0a0a1f';
    ctx.fillRect(0, 0, w, h);

    ctx.globalCompositeOperation = 'lighter';
    for (let i = 0; i < blobs.length; i++) {
      const b = blobs[i];
      b.x += b.vx;
      b.y += b.vy;
      // gentle wander — bounce softly off edges
      if (b.x < 0.05 || b.x > 0.95) b.vx *= -1;
      if (b.y < 0.05 || b.y > 0.95) b.vy *= -1;

      // breathing radius
      const rPx = (Math.min(w, h) * b.r) * (1 + 0.06 * Math.sin(t * 0.5 + i));
      const cx = b.x * w;
      const cy = b.y * h;
      const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, rPx);
      grad.addColorStop(0, b.color + (b.a * breath).toFixed(3) + ')');
      grad.addColorStop(1, b.color + '0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(cx, cy, rPx, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalCompositeOperation = 'source-over';

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();


/* ---------------------------------------------------------------------
   2. ORB: Kling video loop + tap-to-listen handler
   --------------------------------------------------------------------- */
(function orb() {
  const stage = document.getElementById('orb-stage');
  const video = document.getElementById('orb-video');
  if (!stage || !video) return;

  // Mobile autoplay safety: muted + playsinline are set, but some browsers
  // still defer until first interaction. If autoplay was blocked, kick it
  // on the first tap.
  video.play().catch(() => {
    const kick = () => { video.play().catch(() => {}); document.removeEventListener('touchstart', kick); document.removeEventListener('click', kick); };
    document.addEventListener('touchstart', kick, { passive: true, once: true });
    document.addEventListener('click', kick, { once: true });
  });

  // Tap â†’ "listening" cue: scale up + flash overlay for ~1s.
  let listenTimer = null;
  function fireListening() {
    stage.classList.add('listening');
    clearTimeout(listenTimer);
    listenTimer = setTimeout(() => stage.classList.remove('listening'), 1000);
  }
  stage.addEventListener('click', fireListening);
  stage.addEventListener('touchstart', fireListening, { passive: true });

  // Pause when scrolled off-screen to save battery.
  if ('IntersectionObserver' in window) {
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        if (e.isIntersecting) video.play().catch(() => {});
        else video.pause();
      });
    }, { threshold: 0.05 });
    io.observe(stage);
  }
})();

/* WebGL orb shader removed 2026-06-10 — replaced by /orb-smoke-v1.mp4 (Kling 2.5 loop). */


/* ---------------------------------------------------------------------
   2.5 AUDIO-REACTIVE PULSE
   - "Hear me speak" button fires a short pre-rendered TTS sample.
   - Web Audio API reads time-domain amplitude every frame, smoothed via
     exponential moving average, and writes --pulse-intensity (0-1) to
     the orb stage. CSS handles the visual: inner-glow scale + opacity.
   - User gesture (button tap) satisfies iOS Safari autoplay policy
     and the AudioContext resume requirement.
   --------------------------------------------------------------------- */
(function speak() {
  const btn   = document.getElementById('speak-btn');
  const audio = document.getElementById('cole-audio');
  const stage = document.getElementById('orb-stage');
  if (!btn || !audio || !stage) return;

  let ctx = null;
  let source = null;
  let analyser = null;
  let dataArray = null;
  let rafId = 0;
  // Smoothed amplitude state — exponential moving average makes the pulse
  // feel organic rather than jittering on every frame's noise floor.
  let smoothed = 0;
  const ALPHA = 0.3; // 0..1, higher = more responsive, lower = more smoothing

  function ensureAudioGraph() {
    if (ctx) return;
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return; // Web Audio unavailable — button still plays sound, just no pulse
    ctx = new AC();
    source = ctx.createMediaElementSource(audio);
    analyser = ctx.createAnalyser();
    analyser.fftSize = 256;
    dataArray = new Uint8Array(analyser.fftSize);
    source.connect(analyser);
    analyser.connect(ctx.destination);
  }

  function readAmplitude() {
    if (!analyser) return 0;
    analyser.getByteTimeDomainData(dataArray);
    // RMS over the window, normalized so silence ≈ 0 and loud ≈ 1.
    // Time-domain bytes center on 128; deviation from center = signal magnitude.
    let sum = 0;
    for (let i = 0; i < dataArray.length; i++) {
      const v = (dataArray[i] - 128) / 128; // -1..1
      sum += v * v;
    }
    const rms = Math.sqrt(sum / dataArray.length); // 0..~1
    // Gain tuned from Playwright trace: Bill voice RMS peaks ~0.165.
    // 4.0x gain → ~0.66 peak intensity → ~36% scale + ~60% opacity swing.
    // Loud audio still clamps to 1.0 so we don't oversaturate.
    return Math.min(1, rms * 4.0);
  }

  function tick() {
    const raw = readAmplitude();
    smoothed = ALPHA * raw + (1 - ALPHA) * smoothed;
    stage.style.setProperty('--pulse-intensity', smoothed.toFixed(3));
    rafId = requestAnimationFrame(tick);
  }

  function stopTick() {
    cancelAnimationFrame(rafId);
    rafId = 0;
    // Decay to zero so the orb settles back to ambient breath.
    const decay = () => {
      smoothed *= 0.85;
      stage.style.setProperty('--pulse-intensity', smoothed.toFixed(3));
      if (smoothed > 0.005) requestAnimationFrame(decay);
      else stage.style.setProperty('--pulse-intensity', 0);
    };
    decay();
  }

  async function play() {
    try {
      ensureAudioGraph();
      // iOS Safari: resume the AudioContext within the user gesture.
      if (ctx && ctx.state === 'suspended') await ctx.resume();
      audio.currentTime = 0;
      await audio.play();
      btn.classList.add('playing');
      stage.classList.add('speaking');
      btn.disabled = true;
      if (!rafId) rafId = requestAnimationFrame(tick);
    } catch (err) {
      // Autoplay block or decode error — re-enable button so user can retry.
      btn.disabled = false;
      btn.classList.remove('playing');
      stage.classList.remove('speaking');
      console.warn('[speak] play failed:', err);
    }
  }

  audio.addEventListener('ended', () => {
    btn.classList.remove('playing');
    stage.classList.remove('speaking');
    btn.disabled = false;
    stopTick();
  });
  audio.addEventListener('pause', () => {
    if (audio.ended) return;
    btn.classList.remove('playing');
    stage.classList.remove('speaking');
    btn.disabled = false;
    stopTick();
  });

  btn.addEventListener('click', play);

  /* PREVIEW PULSE — fires once ~1.2s after page load so visitors who never
     tap the button still SEE that the orb is meant to pulse with speech.
     Synthesizes a short envelope that mimics 3 spoken syllables, writes it
     to --pulse-intensity, decays out. Pure visual demo — no audio plays.
     If Heath taps the speak button first, this is canceled so we don't
     compete with real amplitude. */
  let previewRaf = 0;
  let previewCanceled = false;
  function runPreviewPulse() {
    if (previewCanceled) return;
    stage.classList.add('speaking'); // suspend ambient keyframe so demo dominates
    const start = performance.now();
    const DURATION = 2400; // ms
    // 3 syllable envelopes, attack+release shape
    const syllables = [
      { t: 0,    peak: 0.65 },
      { t: 0.42, peak: 0.85 },
      { t: 0.78, peak: 0.55 }
    ];
    function envelope(progress) {
      // sum of attack-decay bumps
      let v = 0;
      for (const s of syllables) {
        const local = progress - s.t;
        if (local < 0) continue;
        // 0.18-wide bump, fast attack ~30ms, slower release
        const a = Math.max(0, 1 - Math.abs(local - 0.04) / 0.14);
        v = Math.max(v, s.peak * a * a);
      }
      return Math.min(1, v);
    }
    function step(now) {
      if (previewCanceled) {
        stage.classList.remove('speaking');
        stage.style.setProperty('--pulse-intensity', 0);
        return;
      }
      const progress = (now - start) / DURATION;
      if (progress >= 1) {
        // decay to zero
        let v = parseFloat(getComputedStyle(stage).getPropertyValue('--pulse-intensity')) || 0;
        const decay = () => {
          if (previewCanceled) return;
          v *= 0.85;
          stage.style.setProperty('--pulse-intensity', v.toFixed(3));
          if (v > 0.005) requestAnimationFrame(decay);
          else {
            stage.style.setProperty('--pulse-intensity', 0);
            stage.classList.remove('speaking');
          }
        };
        decay();
        return;
      }
      const val = envelope(progress);
      stage.style.setProperty('--pulse-intensity', val.toFixed(3));
      previewRaf = requestAnimationFrame(step);
    }
    previewRaf = requestAnimationFrame(step);
  }
  function cancelPreview() {
    previewCanceled = true;
    cancelAnimationFrame(previewRaf);
  }
  btn.addEventListener('click', cancelPreview, { once: true });
  // Fire preview after ~1.2s so the page settles first
  setTimeout(runPreviewPulse, 1200);
})();


/* ---------------------------------------------------------------------

(function web() {

  const stage = document.getElementById('web-stage');

  const tooltipKind = tooltip.querySelector('.label-kind');

  // Sample memory data — Heath-flavored

    { kind: 'idea',    label: 'TX-specific config layer' },
    { kind: 'home',    label: 'San Antonio — KW City View' },
    { kind: 'home',    label: 'KW Boerne office' },
    { kind: 'today',   label: 'Founding Files post queued' },
    { kind: 'family',  label: 'Birthday — call sister Sunday' },
    { kind: 'work',    label: 'Sage — autonomous social' },
    { kind: 'work',    label: 'Atlas — platform engineering' },
    { kind: 'idea',    label: 'Cole — Jarvis-style voice agent' },
    { kind: 'milestone', label: 'EIN 42-2807262 received' }
  ];

  // Three.js boilerplate
  const renderer = new THREE.WebGLRenderer({
    canvas,
    antialias: true,
    alpha: true,
    powerPreference: 'high-performance'
  });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.setClearColor(0x000000, 0);

  let width = stage.clientWidth;
  let height = stage.clientHeight;
  renderer.setSize(width, height, false);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(55, width / height, 0.1, 100);
  camera.position.set(0, 0, 14);

  // Distribute nodes inside a sphere (fibonacci-ish, plus jitter)
  const N = memories.length;
  const positions = new Float32Array(N * 3);
  const colors    = new Float32Array(N * 3);
  const sizes     = new Float32Array(N);
  const kindColors = {
    family:    new THREE.Color(0xE8836B), // coral
    travel:    new THREE.Color(0x6FB4B0), // teal
    today:     new THREE.Color(0xF5C5A8), // peach
    work:      new THREE.Color(0xC9A96E), // gold
    people:    new THREE.Color(0xF5E6E0), // blush
    milestone: new THREE.Color(0xFFD8A8), // warm gold-cream
    health:    new THREE.Color(0x8BA888), // sage
    idea:      new THREE.Color(0xFFB088), // warm coral
    home:      new THREE.Color(0xD4A0A0)  // blush-deep
  };

  const radius = 5.5;
  const nodes = [];
  for (let i = 0; i < N; i++) {
    // fibonacci sphere
    const k = i + 0.5;
    const phi = Math.acos(1 - 2 * k / N);
    const theta = Math.PI * (1 + Math.sqrt(5)) * k;
    let x = Math.cos(theta) * Math.sin(phi) * radius;
    let y = Math.sin(theta) * Math.sin(phi) * radius;
    let z = Math.cos(phi) * radius;
    // small jitter to avoid a too-perfect look
    x += (Math.random() - 0.5) * 0.6;
    y += (Math.random() - 0.5) * 0.6;
    z += (Math.random() - 0.5) * 0.6;

    positions[i*3]     = x;
    positions[i*3 + 1] = y;
    positions[i*3 + 2] = z;

    const c = kindColors[memories[i].kind] || kindColors.work;
    colors[i*3]     = c.r;
    colors[i*3 + 1] = c.g;
    colors[i*3 + 2] = c.b;
    sizes[i] = 1.0;

    nodes.push({
      pos: new THREE.Vector3(x, y, z),
      baseColor: c.clone(),
      currentColor: c.clone(),
      baseSize: 1.0,
      currentSize: 1.0,
      brightness: 0.0,      // ripple amount
      ripplePhase: 0.0,
      memory: memories[i]
    });
  }

  // Custom shader points — round, glowing, size-attenuating
  const pointGeo = new THREE.BufferGeometry();
  pointGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  pointGeo.setAttribute('color',    new THREE.BufferAttribute(colors, 3));
  pointGeo.setAttribute('size',     new THREE.BufferAttribute(sizes, 1));

  const pointMat = new THREE.ShaderMaterial({
    uniforms: { u_pixelRatio: { value: renderer.getPixelRatio() } },
    vertexShader: `
      attribute float size;
      varying vec3 vColor;
      uniform float u_pixelRatio;
      void main() {
        vColor = color;
        vec4 mv = modelViewMatrix * vec4(position, 1.0);
        gl_Position = projectionMatrix * mv;
        float dist = -mv.z;
        gl_PointSize = size * 24.0 * u_pixelRatio * (10.0 / dist);
      }
    `,
    fragmentShader: `
      varying vec3 vColor;
      void main() {
        vec2 c = gl_PointCoord - vec2(0.5);
        float d = length(c);
        if (d > 0.5) discard;
        float core = smoothstep(0.5, 0.0, d);
        float glow = smoothstep(0.5, 0.15, d);
        vec3 col = vColor * (0.4 + 1.4 * core);
        gl_FragColor = vec4(col, glow);
      }
    `,
    vertexColors: true,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending
  });

  const points = new THREE.Points(pointGeo, pointMat);
  scene.add(points);

  // Connection lines — connect each node to its K nearest neighbors
  const K = 3;
  const linePairs = []; // { a, b, baseAlpha }
  for (let i = 0; i < N; i++) {
    const dists = [];
    for (let j = 0; j < N; j++) {
      if (i === j) continue;
      dists.push({ j, d: nodes[i].pos.distanceTo(nodes[j].pos) });
    }
    dists.sort((a, b) => a.d - b.d);
    for (let k = 0; k < K; k++) {
      const j = dists[k].j;
      // dedupe undirected pairs
      if (j > i) linePairs.push({ a: i, b: j, baseAlpha: 0.18 });
    }
  }
  const lineCount = linePairs.length;
  const lineVerts  = new Float32Array(lineCount * 6);
  const lineCols   = new Float32Array(lineCount * 6);
  for (let i = 0; i < lineCount; i++) {
    const { a, b } = linePairs[i];
    lineVerts[i*6]     = nodes[a].pos.x;
    lineVerts[i*6 + 1] = nodes[a].pos.y;
    lineVerts[i*6 + 2] = nodes[a].pos.z;
    lineVerts[i*6 + 3] = nodes[b].pos.x;
    lineVerts[i*6 + 4] = nodes[b].pos.y;
    lineVerts[i*6 + 5] = nodes[b].pos.z;
    const c = new THREE.Color(0xF5E6E0);
    for (let k = 0; k < 2; k++) {
      lineCols[i*6 + k*3]     = c.r;
      lineCols[i*6 + k*3 + 1] = c.g;
      lineCols[i*6 + k*3 + 2] = c.b;
    }
  }
  const lineGeo = new THREE.BufferGeometry();
  lineGeo.setAttribute('position', new THREE.BufferAttribute(lineVerts, 3));
  lineGeo.setAttribute('color',    new THREE.BufferAttribute(lineCols, 3));
  const lineMat = new THREE.LineBasicMaterial({
    vertexColors: true,
    transparent: true,
    opacity: 0.35,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  });
  const lines = new THREE.LineSegments(lineGeo, lineMat);
  scene.add(lines);

  // Neighbor map for ripple
  const neighborMap = new Map();
  for (let i = 0; i < N; i++) neighborMap.set(i, []);
  linePairs.forEach(({ a, b }) => {
    neighborMap.get(a).push(b);
    neighborMap.get(b).push(a);
  });

  // Interaction
  const raycaster = new THREE.Raycaster();
  // forgiving threshold so phones can tap
  raycaster.params.Points.threshold = 0.45;
  const mouse = new THREE.Vector2(-10, -10);
  let hoverIndex = -1;
  let activeIndex = -1;
  let activeAt = 0;

  function setHover(index, clientX, clientY) {
    hoverIndex = index;
    if (index >= 0) {
      const mem = nodes[index].memory;
      tooltipKind.textContent = mem.kind;
      tooltipText.textContent = mem.label;
      const rect = stage.getBoundingClientRect();
      tooltip.style.left = (clientX - rect.left) + 'px';
      tooltip.style.top  = (clientY - rect.top) + 'px';
      tooltip.classList.add('visible');
    } else {
      tooltip.classList.remove('visible');
    }
  }

  function pickAt(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    mouse.x = ((clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((clientY - rect.top) / rect.height) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObject(points);
    return hits.length ? hits[0].index : -1;
  }

  function triggerRipple(index) {
    if (index < 0) return;
    activeIndex = index;
    activeAt = performance.now();
    nodes[index].brightness = 1.0;
    nodes[index].ripplePhase = 1.0;
    // neighbors ripple after a small delay (handled in animate)
  }

  canvas.addEventListener('mousemove', (e) => {
    const idx = pickAt(e.clientX, e.clientY);
    setHover(idx, e.clientX, e.clientY);
  });
  canvas.addEventListener('mouseleave', () => setHover(-1, 0, 0));
  canvas.addEventListener('click', (e) => {
    const idx = pickAt(e.clientX, e.clientY);
    if (idx >= 0) triggerRipple(idx);
  });
  canvas.addEventListener('touchstart', (e) => {
    if (e.touches.length === 0) return;
    const t = e.touches[0];
    const idx = pickAt(t.clientX, t.clientY);
    if (idx >= 0) {
      setHover(idx, t.clientX, t.clientY);
      triggerRipple(idx);
    }
  }, { passive: true });

  // Auto-rotate the whole web (camera orbit)
  let camAngle = 0;
  const camRadius = 14;

  // Resize handling
  function onResize() {
    width = stage.clientWidth;
    height = stage.clientHeight;
    camera.aspect = width / height;
    camera.updateProjectionMatrix();
    renderer.setSize(width, height, false);
    pointMat.uniforms.u_pixelRatio.value = renderer.getPixelRatio();
  }
  window.addEventListener('resize', onResize);

  // IntersectionObserver — pause when off-screen to save battery
  let visible = true;
  if ('IntersectionObserver' in window) {
    const io = new IntersectionObserver((entries) => {
      visible = entries[0].isIntersecting;
    }, { threshold: 0.01 });
    io.observe(stage);
  }

  // Ripple propagation queue: when active node fires, after 200ms its
  // neighbors brighten; after 400ms, neighbors-of-neighbors brighten.
  const rippleQueue = [];
  function scheduleRipple(index, depth, delayMs) {
    if (depth > 2) return;
    setTimeout(() => {
      const neighbors = neighborMap.get(index) || [];
      neighbors.forEach(n => {
        nodes[n].brightness = Math.max(nodes[n].brightness, 0.7 - depth * 0.25);
        scheduleRipple(n, depth + 1, 180);
      });
    }, delayMs);
  }

  let lastRippleTrigger = -1;
  let t0 = performance.now();
  function animate(now) {
    requestAnimationFrame(animate);
    if (!visible) return;

    const t = (now - t0) * 0.001;

    // gentle camera orbit — 60s for full revolution
    camAngle = t * (Math.PI * 2 / 60);
    camera.position.x = Math.sin(camAngle) * camRadius;
    camera.position.z = Math.cos(camAngle) * camRadius;
    camera.position.y = Math.sin(t * 0.15) * 1.2;
    camera.lookAt(0, 0, 0);

    // fire neighbor ripples on a fresh trigger
    if (activeIndex !== lastRippleTrigger && activeIndex >= 0) {
      lastRippleTrigger = activeIndex;
      scheduleRipple(activeIndex, 0, 200);
    }

    // update per-node visual state
    const posAttr  = pointGeo.attributes.position;
    const colAttr  = pointGeo.attributes.color;
    const sizeAttr = pointGeo.attributes.size;
    for (let i = 0; i < N; i++) {
      const node = nodes[i];
      // brightness decays
      node.brightness *= 0.965;

      // distance-dim: nodes farther from camera fade slightly
      const dz = camera.position.distanceTo(node.pos);
      const dim = THREE.MathUtils.clamp(1.4 - (dz - 8) * 0.07, 0.45, 1.4);

      const base = node.baseColor;
      // brighten by mixing toward white-warm
      const boost = node.brightness;
      const r = base.r * dim + boost * (1.0 - base.r) * 0.8;
      const g = base.g * dim + boost * (1.0 - base.g) * 0.6;
      const b = base.b * dim + boost * (1.0 - base.b) * 0.4;
      colAttr.array[i*3]     = r;
      colAttr.array[i*3 + 1] = g;
      colAttr.array[i*3 + 2] = b;
      sizeAttr.array[i] = node.baseSize * (1.0 + boost * 1.2);
    }
    colAttr.needsUpdate  = true;
    sizeAttr.needsUpdate = true;

    // update line colors — brighten lines whose endpoints are active
    const lcol = lineGeo.attributes.color;
    for (let i = 0; i < lineCount; i++) {
      const { a, b } = linePairs[i];
      const bright = Math.max(nodes[a].brightness, nodes[b].brightness);
      const base = 0.55;       // base off-white
      const r = base + bright * 0.45;
      const g = base * 0.95 + bright * 0.35;
      const bl = base * 0.92 + bright * 0.2;
      for (let k = 0; k < 2; k++) {
        lcol.array[i*6 + k*3]     = r;
        lcol.array[i*6 + k*3 + 1] = g;
        lcol.array[i*6 + k*3 + 2] = bl;
      }
    }
    lcol.needsUpdate = true;
    lineMat.opacity = 0.30 + 0.05 * Math.sin(t * 0.7);

    renderer.render(scene, camera);
  }
  requestAnimationFrame(animate);
})();
